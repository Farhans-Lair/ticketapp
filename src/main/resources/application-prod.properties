# ── application-prod.properties ──────────────────────────────────────────────
# Applied when SPRING_PROFILES_ACTIVE=prod (set in .env on EC2 / ECS).
# These values OVERRIDE the matching keys in application.properties.
#
# ACTIVATION:  Add to your .env file:
#   SPRING_PROFILES_ACTIVE=prod
#
# The prod profile enforces three production-safety changes:
#   1. ddl-auto=validate  → Hibernate checks schema matches entities but never
#                           mutates it. Flyway owns all schema changes.
#   2. show-sql=false     → Suppresses per-query SQL from logs; prevents query
#                           structure leaks in CloudWatch / log aggregators.
#   3. format_sql=false   → No multi-line SQL formatting in logs (redundant
#                           when show-sql=false but explicit for clarity).
# ─────────────────────────────────────────────────────────────────────────────

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
# NEVER use 'update' or 'create-drop' in production — it can silently drop
# columns or corrupt data on renames. 'validate' will start-fail fast if the
# DB schema does not match the JPA entities, catching migration mistakes before
# traffic hits the app.
spring.jpa.hibernate.ddl-auto=validate

# ── Logging ──────────────────────────────────────────────────────────────────
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── HikariCP connection pool ─────────────────────────────────────────────────
# Formula: max_pool_size × num_instances ≤ RDS max_connections
# db.t3.small: max_connections ≈ 180 (based on 2 GB RAM)
# With up to 3 ASG instances: 5 × 3 = 15 connections (very safe headroom)
# Increase to 10 if you run a single instance.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.pool-name=TicketVersePool
# Validates connection before handing it to the application.
# Catches stale connections after RDS failover / maintenance.
spring.datasource.hikari.connection-test-query=SELECT 1

# ── Flyway ───────────────────────────────────────────────────────────────────
# Enabled by flyway-core on the classpath. Migrations in
# src/main/resources/db/migration run in V-version order at startup.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# On first deploy to an existing database, set baseline-on-migrate=true
# once and then remove it. It tells Flyway to treat the current DB state
# as V1 without re-running the baseline script.
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:false}
spring.flyway.baseline-version=1

# ── Spring Cache (Caffeine TTL) ──────────────────────────────────────────────
# Cache type is set to CAFFEINE in CacheConfig.java.
# TTL is 30 s for events (high read, low write).
# No property needed here — CacheConfig wires Caffeine spec directly.
