<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TicketVerse — Movies</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--bg:#0a0a14;--text:#f0eee8;--muted:rgba(240,238,232,0.55);--glass:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.1);--gold:#f5c842;--gold-dark:#d4a520;--accent:#7c6af7;--red:#f74a6a;--green:#42e695;}
    html,body{min-height:100%;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--bg);}
    #bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
    .app{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:36px 28px 80px;}
    .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px;}
    .logo{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:900;color:var(--gold);}
    .nav-actions{display:flex;gap:10px;flex-wrap:wrap;}
    .btn-ghost{padding:9px 20px;background:var(--glass);border:1px solid var(--border);border-radius:10px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:0.85rem;cursor:pointer;transition:all 0.2s;backdrop-filter:blur(8px);text-decoration:none;display:inline-flex;align-items:center;gap:5px;}
    .btn-ghost:hover{background:rgba(255,255,255,0.1);color:var(--text);}
    /* city + search bar */
    .controls{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap;}
    .search-input{flex:1;min-width:200px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:12px;padding:11px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;}
    .search-input:focus{border-color:var(--gold);}
    .search-input::placeholder{color:rgba(240,238,232,0.3);}
    .city-select{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:12px;padding:11px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;cursor:pointer;min-width:150px;}
    .city-select option{background:#1a1a2e;}
    /* genre chips */
    .genre-filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:26px;}
    .genre-chip{padding:7px 16px;border-radius:20px;font-size:0.82rem;font-weight:500;cursor:pointer;border:1.5px solid rgba(255,255,255,0.12);background:var(--glass);color:var(--muted);backdrop-filter:blur(8px);transition:all 0.2s;}
    .genre-chip:hover{border-color:rgba(255,255,255,0.25);color:var(--text);}
    .genre-chip.active{background:var(--gold);color:#0a0a14;border-color:transparent;font-weight:700;}
    /* page header */
    .page-header{margin-bottom:22px;}
    .page-header h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:900;margin-bottom:6px;}
    .page-header h1 em{font-style:normal;background:linear-gradient(135deg,var(--gold),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    /* movies grid */
    #movies-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px;}
    .movie-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;overflow:hidden;cursor:pointer;transition:transform 0.25s,box-shadow 0.25s,border-color 0.3s;animation:card-in 0.4s cubic-bezier(0.16,1,0.3,1) both;}
    .movie-card:hover{transform:translateY(-4px);box-shadow:0 20px 48px rgba(0,0,0,0.45);border-color:rgba(255,255,255,0.16);}
    @keyframes card-in{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
    .movie-poster{position:relative;width:100%;aspect-ratio:2/3;background:rgba(255,255,255,0.04);overflow:hidden;}
    .movie-poster img{width:100%;height:100%;object-fit:cover;display:block;}
    .no-poster{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:3rem;opacity:0.25;}
    .cert-badge{position:absolute;top:8px;left:8px;padding:2px 8px;background:rgba(10,10,20,0.8);border-radius:6px;font-size:0.7rem;font-weight:700;color:var(--gold);border:1px solid rgba(245,200,66,0.3);}
    .movie-info{padding:14px 14px 14px;}
    .movie-title{font-family:'Playfair Display',serif;font-size:0.95rem;font-weight:700;margin-bottom:5px;line-height:1.3;}
    .movie-meta{font-size:0.75rem;color:var(--muted);display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;}
    .genre-pill{padding:2px 8px;background:rgba(124,106,247,0.1);border:1px solid rgba(124,106,247,0.2);border-radius:8px;color:#a89cf7;font-size:0.7rem;}
    .lang-pill{padding:2px 8px;background:rgba(66,230,149,0.08);border:1px solid rgba(66,230,149,0.15);border-radius:8px;color:var(--green);font-size:0.7rem;}
    .movie-rating{display:flex;align-items:center;gap:4px;font-size:0.78rem;}
    .movie-rating .stars{color:var(--gold);}
    /* Detail modal */
    .modal-overlay{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.8);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:20px;}
    .modal-overlay.open{display:flex;}
    .modal-box{background:#12121f;border:1px solid rgba(255,255,255,0.1);border-radius:22px;width:100%;max-width:720px;max-height:92vh;overflow-y:auto;position:relative;box-shadow:0 32px 80px rgba(0,0,0,0.7);}
    .modal-close{position:sticky;top:14px;float:right;margin:14px 14px 0 0;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:var(--text);font-size:1rem;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;}
    .modal-close:hover{background:rgba(247,74,106,0.4);}
    .modal-hero{position:relative;width:100%;height:220px;overflow:hidden;border-radius:22px 22px 0 0;background:rgba(255,255,255,0.03);}
    .modal-hero img{width:100%;height:100%;object-fit:cover;filter:brightness(0.55);}
    .modal-hero-info{position:absolute;bottom:20px;left:24px;right:24px;}
    .modal-hero-info h2{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:900;margin-bottom:6px;}
    .modal-body{padding:20px 26px 28px;}
    .modal-divider{border:none;border-top:1px solid rgba(255,255,255,0.08);margin:16px 0;}
    .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
    .detail-item{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:10px 14px;}
    .detail-item .label{font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);margin-bottom:4px;}
    .detail-item .value{font-size:0.88rem;color:var(--text);font-weight:600;}
    .movie-desc{font-size:0.87rem;color:var(--muted);line-height:1.65;margin-bottom:16px;}
    /* Showtimes */
    .showtimes-section h4{font-size:0.88rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);margin-bottom:14px;}
    .cinema-group{margin-bottom:16px;}
    .cinema-name{font-weight:700;font-size:0.95rem;margin-bottom:4px;}
    .cinema-address{font-size:0.78rem;color:var(--muted);margin-bottom:8px;}
    .showtime-chips{display:flex;flex-wrap:wrap;gap:8px;}
    .showtime-chip{padding:8px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;cursor:pointer;transition:all 0.2s;}
    .showtime-chip:hover{background:rgba(245,200,66,0.12);border-color:rgba(245,200,66,0.35);}
    .showtime-chip .time{font-size:0.88rem;font-weight:700;color:var(--text);}
    .showtime-chip .meta{font-size:0.72rem;color:var(--muted);margin-top:2px;}
    .showtime-chip .price{font-size:0.78rem;color:var(--gold);margin-top:2px;}
    .btn-trailer{padding:10px 20px;background:rgba(247,74,106,0.12);border:1px solid rgba(247,74,106,0.28);border-radius:10px;color:var(--red);font-weight:700;font-size:0.88rem;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
    .btn-trailer:hover{background:rgba(247,74,106,0.22);}
    .no-showtimes{font-size:0.85rem;color:var(--muted);padding:12px 0;}
    .loading{color:var(--muted);font-size:0.9rem;padding:40px;text-align:center;}
    @media(max-width:500px){#movies-list{grid-template-columns:1fr 1fr;}.detail-grid{grid-template-columns:1fr;}.modal-body{padding:14px;}}
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="app">
  <div class="topbar">
    <span class="logo">TicketVerse</span>
    <div class="nav-actions">
      <a class="btn-ghost" href="/events-page">🎟 Events</a>
      <button class="btn-ghost" onclick="window.location.replace('/my-bookings')">My Bookings</button>
      <button class="btn-ghost" id="logoutBtn">Logout</button>
    </div>
  </div>

  <div class="page-header">
    <h1>Now <em>Showing</em></h1>
    <p>Pick a city to see showtimes near you.</p>
  </div>

  <div class="controls">
    <input class="search-input" type="text" id="search-input" placeholder="🔍  Search movies, cast, director…" oninput="debounceSearch()"/>
    <select class="city-select" id="city-select" onchange="/* showtimes reload on modal open */"><option value="">🌆 Select City</option></select>
  </div>

  <div class="genre-filters" id="genre-filters"></div>
  <div id="movies-list"><div class="loading">Loading movies…</div></div>
</div>

<!-- Detail modal -->
<div class="modal-overlay" id="movie-modal" onclick="handleOverlayClick(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
/* canvas bg */
const canvas=document.getElementById('bg-canvas'),ctx=canvas.getContext('2d');let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();
const stars=Array.from({length:200},()=>({x:Math.random()*5000,y:Math.random()*5000,r:Math.random()*1.2+.2,a:Math.random(),da:(Math.random()*.007+.002)*(Math.random()>.5?1:-1)}));
const pts=Array.from({length:120},()=>({x:Math.random()*W||600,y:Math.random()*H||400,r:Math.random()*2+.4,speed:Math.random()*.5+.15,dx:(Math.random()-.5)*.35,alpha:Math.random()*.4+.1,fadeDir:1,col:['rgba(245,200,66,','rgba(124,106,247,','rgba(247,74,106,'][Math.floor(Math.random()*3)]}));
function draw(){ctx.clearRect(0,0,W,H);ctx.fillStyle='#0a0a14';ctx.fillRect(0,0,W,H);stars.forEach(s=>{s.a+=s.da;if(s.a>1||s.a<0)s.da*=-1;ctx.beginPath();ctx.arc(s.x%W,s.y%H,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${Math.max(0,s.a)*.5})`;ctx.fill();});pts.forEach(p=>{p.y-=p.speed;p.x+=p.dx;p.alpha+=.003*p.fadeDir;if(p.alpha>.55||p.alpha<.08)p.fadeDir*=-1;if(p.y<-20){p.x=Math.random()*W;p.y=H+20;}ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.col+p.alpha+')';ctx.fill();});requestAnimationFrame(draw);}
draw();

let allMovies=[],activeGenre=null,searchTimer=null;

function starsHtml(r,max=5){if(!r)return'';const f=Math.floor(r),h=r-f>=0.5;return Array.from({length:max},(_,i)=>i<f?'★':i===f&&h?'⯨':'☆').join('');}

document.addEventListener('DOMContentLoaded',async()=>{
  try{const s=await apiRequest('/auth/me','GET');sessionStorage.setItem('userId',String(s.userId));}catch{return;}
  await loadCities();await loadMovies();
  document.getElementById('logoutBtn').addEventListener('click',logout);
});

async function loadCities(){
  try{const c=await apiRequest('/search/cities','GET',null,true);const s=document.getElementById('city-select');(c||[]).forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v.charAt(0).toUpperCase()+v.slice(1);s.appendChild(o);});}catch{}
}

async function loadMovies(genre=null){
  const list=document.getElementById('movies-list');list.innerHTML='<div class="loading">Loading…</div>';
  try{
    const url=genre?`/movies/genre/${encodeURIComponent(genre)}`:'/movies';
    const movies=await apiRequest(url,'GET',null,true);
    allMovies=movies||[];renderMovies(allMovies);buildGenreFilters(allMovies);
  }catch(err){list.innerHTML=`<p style="color:var(--red)">Error: ${err.message}</p>`;}
}

function buildGenreFilters(movies){
  const genres=[...new Set(movies.map(m=>m.genre).filter(Boolean))].sort();
  const c=document.getElementById('genre-filters');c.innerHTML='';
  const all=document.createElement('button');all.className='genre-chip active';all.textContent='🎬 All';all.onclick=()=>{selectGenre(null,all);};c.appendChild(all);
  genres.forEach(g=>{const b=document.createElement('button');b.className='genre-chip';b.textContent=g;b.onclick=()=>selectGenre(g,b);c.appendChild(b);});
}
function selectGenre(genre,btn){
  activeGenre=genre;document.querySelectorAll('.genre-chip').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  genre?loadMovies(genre):renderMovies(allMovies);
}

function debounceSearch(){clearTimeout(searchTimer);searchTimer=setTimeout(runSearch,400);}
async function runSearch(){const q=document.getElementById('search-input').value.trim();if(!q){renderMovies(allMovies);return;}try{const m=await apiRequest(`/movies/search?q=${encodeURIComponent(q)}`,'GET',null,true);renderMovies(m||[]);}catch{}}

function renderMovies(movies){
  const list=document.getElementById('movies-list');list.innerHTML='';
  if(!movies.length){list.innerHTML='<p style="color:var(--muted);text-align:center;padding:60px;">No movies found.</p>';return;}
  movies.forEach((m,i)=>{
    const card=document.createElement('div');card.className='movie-card';card.style.animationDelay=`${i*0.05}s`;card.onclick=()=>openMovieModal(m.id);
    card.innerHTML=`
      <div class="movie-poster">
        ${m.posterUrl?`<img src="${m.posterUrl}" alt="${m.title}" loading="lazy"/>`:`<div class="no-poster">🎬</div>`}
        ${m.certification?`<span class="cert-badge">${m.certification}</span>`:''}
      </div>
      <div class="movie-info">
        <div class="movie-title">${m.title}</div>
        <div class="movie-meta">
          ${m.genre?`<span class="genre-pill">${m.genre}</span>`:''}
          ${m.language?`<span class="lang-pill">${m.language}</span>`:''}
          ${m.runtimeMinutes?`<span>${m.runtimeMinutes} min</span>`:''}
        </div>
        ${m.averageRating?`<div class="movie-rating"><span class="stars">${starsHtml(m.averageRating)}</span><span style="color:var(--muted)">${m.averageRating}</span></div>`:''}
      </div>`;
    list.appendChild(card);
  });
}

async function openMovieModal(movieId){
  const movie=allMovies.find(m=>m.id===movieId);if(!movie)return;
  const city=document.getElementById('city-select').value;
  document.getElementById('modal-content').innerHTML=`<div class="loading">Loading showtimes…</div>`;
  document.getElementById('movie-modal').classList.add('open');document.body.style.overflow='hidden';

  let showtimeGroups=[];
  try{
    const url=city?`/showtimes/movie/${movieId}/city/${encodeURIComponent(city)}`:`/showtimes/movie/${movieId}`;
    showtimeGroups=await apiRequest(url,'GET',null,true);
  }catch{}

  const posterHtml=movie.posterUrl?`<img src="${movie.posterUrl}" alt="${movie.title}"/>`:'';
  const showtimesHtml=buildShowtimesHtml(showtimeGroups,movieId);

  document.getElementById('modal-content').innerHTML=`
    <div class="modal-hero">
      ${posterHtml}
      <div class="modal-hero-info">
        <h2>${movie.title}</h2>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          ${movie.certification?`<span class="cert-badge" style="position:relative;top:auto;left:auto;">${movie.certification}</span>`:''}
          ${movie.genre?`<span class="genre-pill">${movie.genre}</span>`:''}
          ${movie.language?`<span class="lang-pill">${movie.language}</span>`:''}
        </div>
      </div>
    </div>
    <div class="modal-body">
      ${movie.averageRating?`<div class="movie-rating" style="margin-bottom:12px;"><span class="stars" style="font-size:1rem;">${starsHtml(movie.averageRating)}</span><span style="color:var(--muted);margin-left:6px;">${movie.averageRating} / 5</span></div>`:''}
      ${movie.description?`<div class="movie-desc">${movie.description}</div>`:''}
      <div class="detail-grid">
        ${movie.director?`<div class="detail-item"><div class="label">Director</div><div class="value">${movie.director}</div></div>`:''}
        ${movie.runtimeMinutes?`<div class="detail-item"><div class="label">Runtime</div><div class="value">${movie.runtimeMinutes} min</div></div>`:''}
        ${movie.cast?`<div class="detail-item" style="grid-column:1/-1"><div class="label">Cast</div><div class="value">${movie.cast}</div></div>`:''}
      </div>
      ${movie.trailerUrl?`<a class="btn-trailer" href="${movie.trailerUrl}" target="_blank" rel="noopener">▶ Watch Trailer</a><div style="margin-bottom:16px;"></div>`:''}
      <hr class="modal-divider"/>
      <div class="showtimes-section">
        <h4>🎬 Showtimes${city?' in '+city.charAt(0).toUpperCase()+city.slice(1):''}</h4>
        ${showtimesHtml}
      </div>
    </div>`;
}

function buildShowtimesHtml(groups,movieId){
  if(!groups||!groups.length)return`<div class="no-showtimes">No upcoming showtimes found${document.getElementById('city-select').value?' for this city':''}.${!document.getElementById('city-select').value?' Select a city above.':''}</div>`;
  return groups.map(g=>`
    <div class="cinema-group">
      <div class="cinema-name">🏛 ${g.cinema_name||'Cinema'}</div>
      <div class="cinema-address">${g.cinema_address||''} · ${g.screen_name||''} · ${g.screen_type||'2D'}</div>
      <div class="showtime-chips">
        ${(g.showtimes||[]).map(st=>{
          const t=new Date(st.startTime||st.start_time);
          const avail=st.availableSeats!=null?st.availableSeats:st.available_seats;
          const soldOut=avail===0;
          return`<div class="showtime-chip${soldOut?' booked':''}" ${soldOut?'title="Sold Out"':''} onclick="${soldOut?'':``selectShowtime(${st.id||st.showtimeId},${movieId})``}">
            <div class="time">${t.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</div>
            <div class="meta">${st.language||''} ${st.format||''}</div>
            <div class="price">${soldOut?'Sold Out':'₹'+(st.basePrice||st.base_price||0)}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`).join('');
}

function selectShowtime(showtimeId,movieId){
  // Store showtime context and go to seat-selection
  sessionStorage.setItem('seat_selection_meta',JSON.stringify({showtime_id:showtimeId,movie_id:movieId,tickets_booked:1}));
  alert('Showtime selected! For now please also select the number of tickets on the events page. Full showtime-to-seat flow coming soon.');
  // TODO: extend seat-selection to support showtime_id
}

function closeModal(){document.getElementById('movie-modal').classList.remove('open');document.body.style.overflow='';}
function handleOverlayClick(e){if(e.target===document.getElementById('movie-modal'))closeModal();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
function logout(){const u=sessionStorage.getItem('userId');if(window._authChannel&&u)window._authChannel.postMessage({type:'LOGOUT',userId:u});fetch('/auth/logout',{method:'POST',credentials:'include'}).finally(()=>{sessionStorage.clear();window.location.replace('/');});}
</script>
<script src="/js/api.js"></script>
<script src="/js/auth-channel.js"></script>
</body>
</html>
