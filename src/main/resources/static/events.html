<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TicketVerse — Events</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0a0a14;--text:#f0eee8;--text-muted:rgba(240,238,232,0.55);
      --glass:rgba(255,255,255,0.05);--glass-border:rgba(255,255,255,0.1);
      --accent:#f5c842;--cat-a:#f5c842;--cat-b:#7c6af7;--cat-c:#f74a6a;
      --green:#42e695;--red:#f74a6a;
    }
    html,body{min-height:100%;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--bg);}
    #scene{position:fixed;inset:0;z-index:0;}#scene canvas{position:absolute;inset:0;width:100%;height:100%;}
    .app{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:36px 28px 80px;}
    .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
    .logo{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:900;color:var(--accent);}
    .nav-actions{display:flex;gap:10px;flex-wrap:wrap;}
    .btn-ghost{padding:9px 20px;background:var(--glass);border:1px solid var(--glass-border);border-radius:10px;color:var(--text-muted);font-family:'DM Sans',sans-serif;font-size:0.85rem;cursor:pointer;transition:all 0.2s;backdrop-filter:blur(8px);text-decoration:none;display:inline-flex;align-items:center;gap:5px;}
    .btn-ghost:hover{background:rgba(255,255,255,0.1);color:var(--text);}
    /* Search + city */
    .search-bar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
    .search-input{flex:1;min-width:200px;background:rgba(255,255,255,0.06);border:1px solid var(--glass-border);border-radius:12px;padding:11px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s;}
    .search-input:focus{border-color:var(--accent);}
    .search-input::placeholder{color:rgba(240,238,232,0.3);}
    .city-select{background:rgba(255,255,255,0.06);border:1px solid var(--glass-border);border-radius:12px;padding:11px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;cursor:pointer;min-width:150px;}
    .city-select option{background:#1a1a2e;}
    .filter-toggle{padding:11px 16px;background:rgba(255,255,255,0.06);border:1px solid var(--glass-border);border-radius:12px;color:var(--text-muted);font-size:0.85rem;cursor:pointer;white-space:nowrap;}
    .filter-toggle:hover{background:rgba(255,255,255,0.1);color:var(--text);}
    /* filter panel */
    .filter-panel{background:rgba(255,255,255,0.04);border:1px solid var(--glass-border);border-radius:14px;padding:18px 22px;margin-bottom:18px;display:none;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px;backdrop-filter:blur(16px);}
    .filter-panel.open{display:grid;}
    .filter-field label{display:block;font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:6px;}
    .filter-field input,.filter-field select{width:100%;background:rgba(255,255,255,0.06);border:1px solid var(--glass-border);border-radius:9px;padding:9px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.85rem;outline:none;}
    .filter-field input:focus,.filter-field select:focus{border-color:var(--accent);}
    .filter-field select option{background:#1a1a2e;}
    .filter-actions{display:flex;gap:10px;align-items:flex-end;}
    .btn-apply{padding:9px 20px;background:linear-gradient(135deg,var(--accent),#d4a520);border:none;border-radius:9px;color:#0a0a14;font-weight:700;font-size:0.85rem;cursor:pointer;}
    .btn-clear{padding:9px 16px;background:rgba(255,255,255,0.06);border:1px solid var(--glass-border);border-radius:9px;color:var(--text-muted);font-size:0.85rem;cursor:pointer;}
    .page-header{margin-bottom:16px;}
    .page-header h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:900;margin-bottom:6px;}
    .page-header h1 .highlight{background:linear-gradient(135deg,var(--cat-a),var(--cat-b));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .page-header p{font-size:0.9rem;color:var(--text-muted);}
    #category-filters{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:26px;}
    .cat-btn{padding:9px 20px;border-radius:24px;font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:500;cursor:pointer;transition:all 0.28s;border:1.5px solid rgba(255,255,255,0.12);background:var(--glass);color:var(--text-muted);backdrop-filter:blur(8px);display:flex;align-items:center;gap:7px;}
    .cat-btn:hover{border-color:rgba(255,255,255,0.25);color:var(--text);transform:translateY(-1px);}
    .cat-btn.active{background:var(--cat-a);color:#0a0a14;border-color:transparent;font-weight:700;box-shadow:0 4px 18px rgba(0,0,0,0.3);transform:translateY(-2px);}
    #events-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:22px;}
    .event-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:18px;overflow:hidden;backdrop-filter:blur(16px);transition:transform 0.25s,box-shadow 0.25s,border-color 0.3s;animation:card-in 0.4s cubic-bezier(0.16,1,0.3,1) both;cursor:pointer;position:relative;}
    .event-card:hover{transform:translateY(-4px);box-shadow:0 20px 48px rgba(0,0,0,0.4);border-color:rgba(255,255,255,0.16);}
    @keyframes card-in{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    .wishlist-btn{position:absolute;top:12px;right:12px;z-index:3;width:34px;height:34px;border-radius:50%;background:rgba(10,10,20,0.7);border:1px solid rgba(255,255,255,0.15);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;transition:all 0.2s;}
    .wishlist-btn:hover{background:rgba(247,74,106,0.3);border-color:var(--red);transform:scale(1.12);}
    .wishlist-btn.saved{background:rgba(247,74,106,0.25);border-color:var(--red);}
    .event-slideshow{position:relative;width:100%;height:200px;background:rgba(255,255,255,0.03);overflow:hidden;}
    .event-slideshow .slide{position:absolute;inset:0;opacity:0;transition:opacity 0.55s ease;}
    .event-slideshow .slide.active{opacity:1;}
    .event-slideshow .slide img{width:100%;height:100%;object-fit:cover;display:block;}
    .slide-dots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:2;}
    .slide-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.4);cursor:pointer;transition:all 0.2s;border:none;padding:0;}
    .slide-dot.active{background:#fff;transform:scale(1.35);}
    .slide-arrow{position:absolute;top:50%;transform:translateY(-50%);width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,0.45);border:none;color:#fff;font-size:0.9rem;cursor:pointer;z-index:2;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
    .slide-arrow.prev{left:10px;}.slide-arrow.next{right:10px;}
    .no-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--text-muted);font-size:0.85rem;}
    .no-img-placeholder .icon{font-size:2.2rem;opacity:0.35;}
    .card-body{padding:18px 20px 16px;}
    .card-top-row{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
    .category-badge{display:inline-block;padding:3px 12px;border-radius:12px;font-size:0.72rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;background:rgba(255,255,255,0.08);color:var(--cat-a);border:1px solid rgba(255,255,255,0.1);}
    .card-rating{display:flex;align-items:center;gap:4px;font-size:0.78rem;}
    .card-rating .stars{color:#f5c842;}
    .card-rating .count{color:var(--text-muted);}
    .city-tag{font-size:0.72rem;color:var(--text-muted);padding:2px 8px;background:rgba(255,255,255,0.05);border-radius:8px;}
    .event-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;margin-bottom:10px;color:var(--text);line-height:1.3;}
    .event-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
    .meta-item{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:7px 11px;font-size:0.79rem;}
    .meta-item .label{color:var(--text-muted);font-size:0.7rem;margin-bottom:2px;}
    .meta-item .value{color:var(--text);font-weight:600;}
    .card-footer{display:flex;align-items:center;justify-content:space-between;}
    .card-view-hint{font-size:0.78rem;color:var(--text-muted);opacity:0.7;}
    .sold-out-tag{font-size:0.78rem;color:var(--red);font-weight:700;}
    .no-events{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-muted);font-size:1.1rem;}
    /* Modal */
    .modal-overlay{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.78);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:20px;}
    .modal-overlay.open{display:flex;}
    .modal-box{background:#12121f;border:1px solid rgba(255,255,255,0.1);border-radius:22px;width:100%;max-width:660px;max-height:92vh;overflow-y:auto;position:relative;box-shadow:0 32px 80px rgba(0,0,0,0.7);}
    .modal-close{position:sticky;top:14px;float:right;margin:14px 14px 0 0;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:var(--text);font-size:1rem;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;transition:background 0.2s;}
    .modal-close:hover{background:rgba(247,74,106,0.45);}
    .modal-slideshow{position:relative;width:100%;height:260px;background:rgba(255,255,255,0.03);overflow:hidden;border-radius:22px 22px 0 0;}
    .modal-slideshow .slide{position:absolute;inset:0;opacity:0;transition:opacity 0.55s ease;}
    .modal-slideshow .slide.active{opacity:1;}
    .modal-slideshow .slide img{width:100%;height:100%;object-fit:cover;display:block;}
    .modal-body{padding:22px 26px 28px;}
    .modal-title{font-family:'Playfair Display',serif;font-size:1.45rem;font-weight:900;margin-bottom:8px;line-height:1.2;}
    .modal-desc{font-size:0.87rem;color:var(--text-muted);line-height:1.65;margin-bottom:16px;}
    .modal-meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
    .modal-meta .meta-item{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:10px 14px;}
    .modal-divider{border:none;border-top:1px solid rgba(255,255,255,0.08);margin:16px 0;}
    .modal-city-row{font-size:0.82rem;color:var(--text-muted);margin-bottom:12px;}
    .modal-actions-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
    .btn-wishlist{flex:1;min-width:120px;padding:10px 14px;border-radius:10px;background:rgba(247,74,106,0.1);border:1px solid rgba(247,74,106,0.3);color:var(--red);font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.2s;}
    .btn-wishlist:hover{background:rgba(247,74,106,0.2);}
    .btn-wishlist.saved{background:rgba(247,74,106,0.25);border-color:var(--red);}
    .btn-notify{flex:1;min-width:140px;padding:10px 14px;border-radius:10px;background:rgba(124,106,247,0.1);border:1px solid rgba(124,106,247,0.3);color:#a89cf7;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.2s;}
    .btn-notify:hover{background:rgba(124,106,247,0.2);}
    .sold-out-section{background:rgba(247,74,106,0.07);border:1px solid rgba(247,74,106,0.2);border-radius:12px;padding:16px 18px;}
    .sold-out-section h4{color:var(--red);margin-bottom:8px;font-size:0.95rem;}
    .sold-out-section p{font-size:0.83rem;color:var(--text-muted);margin-bottom:10px;}
    .waitlist-stats{font-size:0.78rem;color:var(--text-muted);margin-bottom:10px;}
    .btn-waitlist{width:100%;padding:12px;background:rgba(247,74,106,0.12);border:1px solid rgba(247,74,106,0.35);border-radius:10px;color:var(--red);font-weight:700;font-size:0.9rem;cursor:pointer;transition:all 0.2s;}
    .btn-waitlist:hover{background:rgba(247,74,106,0.22);}
    .ticket-input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;margin-bottom:10px;}
    .ticket-input:focus{border-color:var(--accent);}
    .btn-book{width:100%;padding:12px;background:linear-gradient(135deg,var(--cat-a),var(--cat-b));border:none;border-radius:11px;color:#0a0a14;font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;transition:transform 0.15s;box-shadow:0 4px 16px rgba(0,0,0,0.3);}
    .btn-book:hover{transform:translateY(-2px);}
    /* Reviews */
    .reviews-section{margin-top:18px;}
    .reviews-section h4{font-size:0.88rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-muted);margin-bottom:12px;}
    .rating-summary{display:flex;align-items:center;gap:14px;margin-bottom:14px;padding:12px 16px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:12px;}
    .big-rating{font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;color:var(--accent);}
    .rating-stars{font-size:1rem;margin-bottom:2px;}
    .rating-count{font-size:0.78rem;color:var(--text-muted);}
    .review-list{display:flex;flex-direction:column;gap:8px;max-height:220px;overflow-y:auto;margin-bottom:14px;}
    .review-item{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:10px 14px;}
    .rev-header{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px;}
    .rev-stars{color:#f5c842;font-size:0.85rem;}
    .rev-verified{font-size:0.7rem;color:var(--green);}
    .rev-date{font-size:0.7rem;color:var(--text-muted);margin-left:auto;}
    .rev-text{font-size:0.83rem;color:var(--text-muted);line-height:1.5;}
    .write-review{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px;}
    .write-review h5{font-size:0.83rem;font-weight:700;margin-bottom:10px;}
    .star-picker{display:flex;gap:5px;margin-bottom:10px;}
    .star-btn{background:none;border:none;font-size:1.35rem;cursor:pointer;color:rgba(255,255,255,0.2);transition:color 0.15s;padding:0;}
    .star-btn.lit{color:#f5c842;}
    .review-textarea{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:9px;padding:9px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.85rem;outline:none;resize:vertical;min-height:66px;margin-bottom:10px;}
    .btn-submit-review{padding:9px 18px;background:linear-gradient(135deg,var(--accent),#d4a520);border:none;border-radius:9px;color:#0a0a14;font-weight:700;font-size:0.85rem;cursor:pointer;}
    #cat-label{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.8);font-family:'Playfair Display',serif;font-size:clamp(3rem,8vw,7rem);font-weight:900;color:rgba(255,255,255,0.06);pointer-events:none;z-index:0;letter-spacing:0.05em;transition:opacity 0.4s,transform 0.5s;opacity:0;white-space:nowrap;text-transform:uppercase;}
    #cat-label.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
    @media(max-width:600px){#events-list{grid-template-columns:1fr;}.modal-meta{grid-template-columns:1fr;}.modal-body{padding:14px;}}
  </style>
</head>
<body>
<div id="scene"><canvas id="bg-canvas"></canvas></div>
<div id="cat-label"></div>
<div class="app">
  <div class="topbar">
    <span class="logo">TicketVerse</span>
    <div class="nav-actions">
      <a class="btn-ghost" href="/my-bookings">🎟 My Bookings</a>
      <a class="btn-ghost" href="/my-profile">👤 My Profile</a>
      <button class="btn-ghost" id="logoutBtn">Logout</button>
    </div>
  </div>

  <div class="search-bar">
    <input class="search-input" type="text" id="search-input" placeholder="🔍  Search events, artists, venues…" oninput="debounceSearch()" />
    <select class="city-select" id="city-select" onchange="onCityChange()">
      <option value="">🌆 All Cities</option>
    </select>
    <button class="filter-toggle" onclick="document.getElementById('filter-panel').classList.toggle('open')">⚙ Filters</button>
  </div>

  <div class="filter-panel" id="filter-panel">
    <div class="filter-field"><label>Min Price (₹)</label><input type="number" id="f-min-price" placeholder="0" min="0"/></div>
    <div class="filter-field"><label>Max Price (₹)</label><input type="number" id="f-max-price" placeholder="Any" min="0"/></div>
    <div class="filter-field"><label>Date From</label><input type="date" id="f-date-from"/></div>
    <div class="filter-field"><label>Date To</label><input type="date" id="f-date-to"/></div>
    <div class="filter-actions" style="grid-column:1/-1;">
      <button class="btn-apply" onclick="applyFilters()">Apply Filters</button>
      <button class="btn-clear" onclick="clearFilters()">Clear</button>
    </div>
  </div>

  <div class="page-header">
    <h1>Discover <span class="highlight" id="active-category-name">All Events</span></h1>
    <p>Choose a category or search — your next unforgettable night starts here.</p>
  </div>
  <div id="category-filters"></div>
  <div id="events-list"></div>
</div>

<div class="modal-overlay" id="event-modal" onclick="handleModalOverlayClick(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="closeEventModal()">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
const CATEGORY_THEMES={All:{icon:'🌟',a:'#f5c842',b:'#7c6af7',c:'#f74a6a',label:'ALL EVENTS',bg:'all'},Music:{icon:'🎵',a:'#f74a6a',b:'#ff8a65',c:'#ffd740',label:'MUSIC',bg:'music'},Sports:{icon:'🏆',a:'#42e695',b:'#3bb78f',c:'#0cbd8f',label:'SPORTS',bg:'sports'},Comedy:{icon:'😂',a:'#ffd740',b:'#ff6f00',c:'#ff5252',label:'COMEDY',bg:'comedy'},Theatre:{icon:'🎭',a:'#ce93d8',b:'#7b1fa2',c:'#4a148c',label:'THEATRE',bg:'theatre'},Conference:{icon:'🎙️',a:'#4fc3f7',b:'#0277bd',c:'#81d4fa',label:'CONFERENCE',bg:'conference'},Festival:{icon:'🎪',a:'#ff80ab',b:'#f06292',c:'#ff5c8d',label:'FESTIVAL',bg:'festival'},Workshop:{icon:'🔧',a:'#a5d6a7',b:'#388e3c',c:'#69f0ae',label:'WORKSHOP',bg:'workshop'},Other:{icon:'✨',a:'#b0bec5',b:'#546e7a',c:'#cfd8dc',label:'OTHER',bg:'other'}};
const CATEGORIES=['All','Music','Sports','Comedy','Theatre','Conference','Festival','Workshop','Other'];
let currentTheme=CATEGORY_THEMES['All'],allEvents=[],wishlistEventIds=new Set(),currentCategory=null,searchTimer=null,selectedRating={};

/* canvas */
const canvas=document.getElementById('bg-canvas'),ctx=canvas.getContext('2d');let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();
function hexToRgb(h){return`${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)}`;}
const pts=Array.from({length:150},()=>({x:Math.random()*W||600,y:Math.random()*H||400,r:Math.random()*3+.5,speed:Math.random()*.6+.2,dx:(Math.random()-.5)*.5,alpha:Math.random()*.5+.1,fadeDir:1,ci:Math.floor(Math.random()*3)}));
const stars=Array.from({length:200},()=>({x:Math.random()*5000,y:Math.random()*5000,r:Math.random()*1.2+.2,a:Math.random(),da:(Math.random()*.008+.002)*(Math.random()>.5?1:-1)}));
function drawBg(){ctx.clearRect(0,0,W,H);ctx.fillStyle='#0a0a14';ctx.fillRect(0,0,W,H);stars.forEach(s=>{s.a+=s.da;if(s.a>1||s.a<0)s.da*=-1;ctx.beginPath();ctx.arc(s.x%W,s.y%H,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${Math.max(0,s.a)*.5})`;ctx.fill();});const c=[currentTheme.a,currentTheme.b,currentTheme.c];pts.forEach(p=>{p.y-=p.speed;p.x+=p.dx;p.alpha+=.003*p.fadeDir;if(p.alpha>.65||p.alpha<.08)p.fadeDir*=-1;if(p.y<-20){p.x=Math.random()*W;p.y=H+20;}ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(${hexToRgb(c[p.ci]||c[0])},${p.alpha})`;ctx.fill();});requestAnimationFrame(drawBg);}
drawBg();

function applyTheme(th){currentTheme=th;document.documentElement.style.setProperty('--cat-a',th.a);document.documentElement.style.setProperty('--cat-b',th.b);document.documentElement.style.setProperty('--cat-c',th.c);const hl=document.querySelector('.highlight');if(hl){hl.style.background=`linear-gradient(135deg,${th.a},${th.b})`;hl.style.webkitBackgroundClip='text';hl.style.webkitTextFillColor='transparent';}const lbl=document.getElementById('cat-label');lbl.textContent=th.label;lbl.classList.remove('show');setTimeout(()=>lbl.classList.add('show'),50);}

function makeSlideshowHandlers(id,total,pre=''){
  let cur=0;
  function goTo(idx){const sl=document.querySelectorAll(`#${pre}slides-${id} .slide`),dt=document.querySelectorAll(`#${pre}dots-${id} .slide-dot`);if(!sl.length)return;sl[cur].classList.remove('active');if(dt[cur])dt[cur].classList.remove('active');cur=(idx+total)%total;sl[cur].classList.add('active');if(dt[cur])dt[cur].classList.add('active');}
  window[`${pre}slidePrev_${id}`]=()=>goTo(cur-1);window[`${pre}slideNext_${id}`]=()=>goTo(cur+1);window[`${pre}slideTo_${id}`]=i=>goTo(i);setInterval(()=>goTo(cur+1),4000);
}
function parseImages(raw){if(!raw)return[];if(Array.isArray(raw))return raw;try{const p=JSON.parse(raw);return Array.isArray(p)?p:[];}catch{return[];}}
function buildSlideshow(id,imgs,pre='',cls='event-slideshow'){
  if(!imgs.length)return`<div class="${cls}"><div class="no-img-placeholder"><div class="icon">🎟️</div><span>No images</span></div></div>`;
  const s=imgs.map((src,si)=>`<div class="slide${si===0?' active':''}"><img src="${src}" loading="lazy"/></div>`).join('');
  const d=imgs.length>1?`<div class="slide-dots" id="${pre}dots-${id}">${imgs.map((_,si)=>`<button class="slide-dot${si===0?' active':''}" onclick="event.stopPropagation();${pre}slideTo_${id}(${si})"></button>`).join('')}</div>`:'';
  const a=imgs.length>1?`<button class="slide-arrow prev" onclick="event.stopPropagation();${pre}slidePrev_${id}()">&#8249;</button><button class="slide-arrow next" onclick="event.stopPropagation();${pre}slideNext_${id}()">&#8250;</button>`:'';
  return`<div class="${cls}"><div id="${pre}slides-${id}">${s}</div>${d}${a}</div>`;
}
function starsHtml(r,max=5){if(!r)return'';const f=Math.floor(r),h=r-f>=0.5;return Array.from({length:max},(_,i)=>i<f?'★':i===f&&h?'⯨':'☆').join('');}

/* city */
async function loadCities(){try{const c=await apiRequest('/search/cities','GET',null,true);const s=document.getElementById('city-select');(c||[]).forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v.charAt(0).toUpperCase()+v.slice(1);s.appendChild(o);});}catch(e){}}
function onCityChange(){loadEvents(currentCategory);}

/* search */
function debounceSearch(){clearTimeout(searchTimer);searchTimer=setTimeout(runSearch,400);}
async function runSearch(){const q=document.getElementById('search-input').value.trim();if(!q){loadEvents(currentCategory);return;}try{const d=await apiRequest(`/search?q=${encodeURIComponent(q)}`,'GET',null,true);allEvents=d.events||[];renderEventList(allEvents);}catch(e){console.error(e);}}

/* filters */
async function applyFilters(){
  const city=document.getElementById('city-select').value,cat=currentCategory,min=document.getElementById('f-min-price').value,max=document.getElementById('f-max-price').value,df=document.getElementById('f-date-from').value,dt=document.getElementById('f-date-to').value;
  const p=new URLSearchParams();if(city)p.set('city',city);if(cat)p.set('category',cat);if(min)p.set('minPrice',min);if(max)p.set('maxPrice',max);if(df)p.set('dateFrom',df);if(dt)p.set('dateTo',dt);
  try{const e=await apiRequest(`/search/events?${p}`,'GET',null,true);allEvents=e||[];renderEventList(allEvents);}catch(e){console.error(e);}
}
function clearFilters(){['f-min-price','f-max-price','f-date-from','f-date-to'].forEach(id=>document.getElementById(id).value='');loadEvents(currentCategory);}

/* wishlist */
async function loadWishlist(){try{const w=await apiRequest('/wishlist','GET',null,true);wishlistEventIds=new Set((w||[]).map(x=>x.eventId||x.event_id));}catch(e){}}
async function toggleWishlist(e,id){e.stopPropagation();try{if(wishlistEventIds.has(id)){await apiRequest(`/wishlist/${id}`,'DELETE',null,true);wishlistEventIds.delete(id);}else{await apiRequest(`/wishlist/${id}`,'POST',{notify:false},true);wishlistEventIds.add(id);}document.querySelectorAll(`.wishlist-btn[data-eid="${id}"]`).forEach(b=>{const s=wishlistEventIds.has(id);b.textContent=s?'❤️':'🤍';b.classList.toggle('saved',s);});}catch(err){alert(err.message||'Could not update wishlist');}}

/* init */
window.addEventListener("pageshow",e=>{if(e.persisted)window.location.reload();});
document.addEventListener("DOMContentLoaded",async()=>{
  try{const s=await apiRequest("/auth/me","GET");sessionStorage.setItem("role",s.role);sessionStorage.setItem("userId",String(s.userId));}catch{return;}
  await loadCities();await loadWishlist();renderCategoryFilters();await loadEvents();
  document.getElementById("logoutBtn").addEventListener("click",logout);
  applyTheme(CATEGORY_THEMES['All']);document.getElementById('active-category-name').textContent='All Events';
  // Auto-open event if navigated from wishlist
  const autoOpenId=sessionStorage.getItem('open_event_id');
  if(autoOpenId){sessionStorage.removeItem('open_event_id');setTimeout(()=>openEventModal(parseInt(autoOpenId,10)),400);}
});

function renderCategoryFilters(){const c=document.getElementById("category-filters");CATEGORIES.forEach(cat=>{const th=CATEGORY_THEMES[cat]||CATEGORY_THEMES['All'];const btn=document.createElement("button");btn.className="cat-btn"+(cat==="All"?" active":"");btn.innerHTML=`<span>${th.icon}</span>${cat}`;btn.onclick=()=>{document.querySelectorAll(".cat-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");applyTheme(th);currentCategory=cat==="All"?null:cat;document.getElementById('active-category-name').textContent=cat==="All"?'All Events':cat;loadEvents(currentCategory);};c.appendChild(btn);});}

async function loadEvents(category=null){
  const city=document.getElementById('city-select').value;
  let url;
  if(city||category){const p=new URLSearchParams();if(city)p.set('city',city);if(category)p.set('category',category);url=`/search/events?${p}`;}else{url='/events';}
  try{const e=await apiRequest(url,'GET',null,true);allEvents=e||[];renderEventList(allEvents);}catch(err){console.error(err);}
}

function renderEventList(events){
  const list=document.getElementById("events-list");list.innerHTML="";
  if(!events.length){list.innerHTML='<p class="no-events">No events found.</p>';return;}
  events.forEach((ev,i)=>{
    const div=document.createElement("div");div.className="event-card";div.style.animationDelay=`${i*0.06}s`;div.onclick=()=>openEventModal(ev.id);
    const imgs=parseImages(ev.images),saved=wishlistEventIds.has(ev.id),r=ev.average_rating,soldOut=ev.available_tickets===0;
    const ratingHtml=r?`<span class="card-rating"><span class="stars">${starsHtml(r)}</span><span class="count">${r}(${ev.review_count||0})</span></span>`:'';
    const cityTag=ev.city?`<span class="city-tag">📍 ${ev.city}</span>`:'';
    div.innerHTML=`
      <button class="wishlist-btn${saved?' saved':''}" data-eid="${ev.id}" onclick="toggleWishlist(event,${ev.id})">${saved?'❤️':'🤍'}</button>
      ${buildSlideshow(ev.id,imgs)}
      <div class="card-body">
        <div class="card-top-row"><span class="category-badge">${ev.category||'Other'}</span>${ratingHtml}${cityTag}</div>
        <div class="event-title">${ev.title}</div>
        <div class="event-meta">
          <div class="meta-item"><div class="label">📅 Date</div><div class="value">${new Date(ev.event_date).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</div></div>
          <div class="meta-item"><div class="label">💰 Price</div><div class="value">₹${ev.price}</div></div>
        </div>
        <div class="card-footer">${soldOut?'<span class="sold-out-tag">🚫 Sold Out</span>':'<span class="card-view-hint">👆 Tap to view &amp; book</span>'}</div>
      </div>`;
    list.appendChild(div);if(imgs.length>1)makeSlideshowHandlers(ev.id,imgs.length);
  });
}

/* modal */
async function openEventModal(eventId){
  const ev=allEvents.find(e=>e.id===eventId);if(!ev)return;
  const imgs=parseImages(ev.images),saved=wishlistEventIds.has(ev.id),soldOut=ev.available_tickets===0;
  let reviews=[],summary={};
  try{[reviews,summary]=await Promise.all([apiRequest(`/reviews/events/${eventId}`,'GET',null,true).catch(()=>[]),apiRequest(`/reviews/events/${eventId}/summary`,'GET',null,true).catch(()=>({}))]);} catch(e){}
  let wlCount=0;if(soldOut){try{const ws=await apiRequest(`/waitlist/${eventId}/stats`,'GET',null,true);wlCount=ws.waitlist_count||0;}catch(e){}}

  // Feature 5: only allow review if user has an active paid booking for this event
  let hasBooking=false;
  try{
    const bookings=await apiRequest('/bookings/my-bookings','GET',null,true).catch(()=>[]);
    hasBooking=(bookings||[]).some(b=>
      (b.eventId===eventId||b.event_id===eventId||(b.Event&&b.Event.id===eventId))
      &&b.payment_status==='paid'
      &&(!b.cancellation_status||b.cancellation_status==='active')
    );
  }catch(e){}

  const bookingSection=soldOut
    ?`<div class="sold-out-section"><h4>🚫 Sold Out</h4><p>All tickets have been claimed.</p><div class="waitlist-stats">${wlCount} people on the waitlist</div><button class="btn-waitlist" onclick="joinWaitlist(${eventId})">🔔 Join Waitlist — Notify Me</button></div>`
    :`<input type="number" class="ticket-input" min="1" max="${ev.available_tickets}" id="modal-qty-${eventId}" placeholder="Number of tickets"/><button class="btn-book" onclick="goToSeatSelection(${eventId})">Select Seats &amp; Book →</button>`;

  const avg=summary.average_rating||0,cnt=summary.review_count||0;
  const sumBlock=avg>0?`<div class="rating-summary"><div class="big-rating">${avg}</div><div><div class="rating-stars">${starsHtml(avg)}</div><div class="rating-count">${cnt} verified review${cnt!==1?'s':''}</div></div></div>`:'';
  const revItems=(reviews||[]).slice(0,6).map(r=>`<div class="review-item"><div class="rev-header"><span class="rev-stars">${starsHtml(r.rating)}</span>${r.verified_booking?'<span class="rev-verified">✓ Verified</span>':''}<span class="rev-date">${new Date(r.created_at).toLocaleDateString('en-IN')}</span></div>${r.text?`<div class="rev-text">${r.text}</div>`:''}</div>`).join('');

  // Build star picker as static HTML (not a nested template literal)
  const starPickerHtml=`<button class="star-btn" data-val="1" onclick="pickStar(${eventId},1)">★</button><button class="star-btn" data-val="2" onclick="pickStar(${eventId},2)">★</button><button class="star-btn" data-val="3" onclick="pickStar(${eventId},3)">★</button><button class="star-btn" data-val="4" onclick="pickStar(${eventId},4)">★</button><button class="star-btn" data-val="5" onclick="pickStar(${eventId},5)">★</button>`;

  // Review write section — only visible to users who have a paid booking
  const writeReviewSection=hasBooking
    ?`<div class="write-review">
        <h5>Write a Review</h5>
        <div class="star-picker" id="stars-${eventId}">${starPickerHtml}</div>
        <textarea class="review-textarea" id="rev-text-${eventId}" placeholder="Share your experience…"></textarea>
        <button class="btn-submit-review" onclick="submitReview(${eventId})">Submit Review</button>
       </div>`
    :`<div style="padding:12px 14px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:10px;font-size:0.83rem;color:var(--text-muted);">
        🎟 Book a ticket to this event to leave a review.
       </div>`;

  document.getElementById('modal-content').innerHTML=`
    ${buildSlideshow(eventId,imgs,'modal-','modal-slideshow')}
    <div class="modal-body">
      <span class="category-badge">${ev.category||'Other'}</span>
      ${ev.city?`<div class="modal-city-row">📍 ${ev.city}</div>`:''}
      <div class="modal-title">${ev.title}</div>
      ${ev.description?`<div class="modal-desc">${ev.description}</div>`:''}
      <div class="modal-meta">
        <div class="meta-item"><div class="label">📍 Location</div><div class="value">${ev.location||'TBA'}</div></div>
        <div class="meta-item"><div class="label">📅 Date</div><div class="value">${new Date(ev.event_date).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})}</div></div>
        <div class="meta-item"><div class="label">🎟 Available</div><div class="value">${ev.available_tickets} / ${ev.total_tickets}</div></div>
        <div class="meta-item"><div class="label">💰 Price/Ticket</div><div class="value">₹${ev.price}</div></div>
      </div>
      <div class="modal-actions-row">
        <button class="btn-wishlist${saved?' saved':''}" data-eid="${ev.id}" onclick="toggleWishlist(event,${ev.id})">${saved?'❤️ Saved':'🤍 Save'}</button>
        ${soldOut?`<button class="btn-notify" onclick="subscribeNotify(${ev.id})">🔔 Notify Me</button>`:''}
      </div>
      <hr class="modal-divider"/>
      ${bookingSection}
      <hr class="modal-divider"/>
      <div class="reviews-section">
        <h4>⭐ Reviews</h4>
        ${sumBlock}
        <div class="review-list">${reviews.length?revItems:'<p style="color:var(--text-muted);font-size:0.83rem;">No reviews yet.</p>'}</div>
        ${writeReviewSection}
      </div>
    </div>`;

  document.getElementById('event-modal').classList.add('open');document.body.style.overflow='hidden';
  if(imgs.length>1)makeSlideshowHandlers(eventId,imgs.length,'modal-');
  selectedRating[eventId]=0;
}

function pickStar(id,val){selectedRating[id]=val;document.querySelectorAll(`#stars-${id} .star-btn`).forEach(b=>b.classList.toggle('lit',parseInt(b.dataset.val)<=val));}
async function submitReview(id){const r=selectedRating[id]||0,t=(document.getElementById(`rev-text-${id}`)||{}).value||'';if(!r){alert('Please select a star rating');return;}try{await apiRequest(`/reviews/events/${id}`,'POST',{rating:r,text:t},true);alert('Review submitted!');openEventModal(id);}catch(err){alert(err.message||'Could not submit review');}}
async function joinWaitlist(id){try{await apiRequest(`/waitlist/${id}`,'POST',{tickets_wanted:1},true);alert("You're on the waitlist! We'll notify you when a ticket opens up.");}catch(err){alert(err.message||'Could not join waitlist');}}
async function subscribeNotify(id){try{await apiRequest(`/wishlist/${id}`,'POST',{notify:true},true);alert("You'll be notified when tickets become available.");}catch(err){alert(err.message||'Could not set notification');}}
function goToSeatSelection(id){const i=document.getElementById(`modal-qty-${id}`),q=parseInt(i?.value||'0',10);if(!q||q<=0){alert("Enter a valid number of tickets");return;}sessionStorage.setItem("seat_selection_meta",JSON.stringify({event_id:id,tickets_booked:q}));window.location.href="/seat-selection";}
function closeEventModal(){document.getElementById('event-modal').classList.remove('open');document.body.style.overflow='';}
function handleModalOverlayClick(e){if(e.target===document.getElementById('event-modal'))closeEventModal();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeEventModal();});
function logout(){const u=sessionStorage.getItem('userId');if(window._authChannel&&u)window._authChannel.postMessage({type:'LOGOUT',userId:u});fetch("/auth/logout",{method:"POST",credentials:"include"}).finally(()=>{sessionStorage.clear();window.location.replace("/");});}
</script>
<script src="/js/api.js"></script>
<script src="/js/auth-channel.js"></script>
</body>
</html>
