<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TicketVerse — Event Moderation</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d0d1a;--surface:#161625;--card:#1e1e35;--border:rgba(255,255,255,.08);
      --text:#e8e6f0;--muted:#7b7a96;--primary:#7c6af7;--success:#22c55e;
      --danger:#ef4444;--warning:#f59e0b;--input-bg:rgba(255,255,255,.05);
    }
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

    nav{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:10}
    .nav-brand{font-size:1.1rem;font-weight:700;color:var(--primary)}
    .nav-links{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
    .nav-links a{color:var(--muted);text-decoration:none;font-size:.84rem;padding:6px 12px;border-radius:8px;transition:all .2s}
    .nav-links a:hover{color:var(--text);background:rgba(255,255,255,.05)}
    .nav-links a.active{color:var(--primary);background:rgba(124,106,247,.12);font-weight:600}
    .btn-logout{background:transparent;border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:.84rem;transition:all .2s;font-family:inherit}
    .btn-logout:hover{border-color:var(--danger);color:var(--danger)}

    .page{max-width:960px;margin:0 auto;padding:36px 24px 80px}
    h1{font-size:1.6rem;font-weight:700;margin-bottom:6px}
    .sub{color:var(--muted);font-size:.88rem;margin-bottom:24px}

    /* Stats */
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:28px}
    .stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px}
    .stat .val{font-size:1.7rem;font-weight:800;margin-bottom:4px}
    .stat .lbl{font-size:.74rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}

    /* Filter tabs */
    .tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
    .tab{padding:7px 18px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;font-size:.85rem;transition:all .2s}
    .tab.active{background:rgba(124,106,247,.15);border-color:rgba(124,106,247,.4);color:var(--primary);font-weight:600}

    /* Event cards */
    .ev-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 22px;margin-bottom:12px}
    .ev-card.pending{border-color:rgba(245,158,11,.25)}
    .ev-card.approved{border-color:rgba(34,197,94,.2)}
    .ev-card.rejected{border-color:rgba(239,68,68,.2);opacity:.8}
    .ev-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:10px}
    .ev-title{font-size:1rem;font-weight:700}
    .ev-meta{font-size:.82rem;color:var(--muted);margin-top:3px;line-height:1.6}
    .ev-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

    /* Badges */
    .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.71rem;font-weight:700;text-transform:uppercase;white-space:nowrap}
    .badge.pending_review{background:rgba(245,158,11,.12);color:var(--warning);border:1px solid rgba(245,158,11,.3)}
    .badge.published{background:rgba(34,197,94,.1);color:var(--success);border:1px solid rgba(34,197,94,.3)}
    .badge.rejected{background:rgba(239,68,68,.1);color:var(--danger);border:1px solid rgba(239,68,68,.3)}
    .badge.draft{background:rgba(124,106,247,.1);color:var(--primary);border:1px solid rgba(124,106,247,.3)}

    /* Action buttons */
    .btn-approve{padding:7px 16px;border-radius:8px;font-family:inherit;font-size:.8rem;font-weight:600;cursor:pointer;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:var(--success);transition:all .18s}
    .btn-approve:hover{background:rgba(34,197,94,.22)}
    .btn-reject{padding:7px 16px;border-radius:8px;font-family:inherit;font-size:.8rem;font-weight:600;cursor:pointer;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.22);color:var(--danger);transition:all .18s}
    .btn-reject:hover{background:rgba(239,68,68,.18)}
    .btn-revoke{padding:7px 16px;border-radius:8px;font-family:inherit;font-size:.8rem;font-weight:600;cursor:pointer;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.22);color:var(--warning);transition:all .18s}
    .btn-revoke:hover{background:rgba(245,158,11,.18)}
    .btn-feature{padding:7px 16px;border-radius:8px;font-family:inherit;font-size:.8rem;font-weight:600;cursor:pointer;background:rgba(124,106,247,.1);border:1px solid rgba(124,106,247,.3);color:var(--primary);transition:all .18s}
    .btn-feature:hover{background:rgba(124,106,247,.22)}

    /* Reject reason row */
    .rej-row{display:none;gap:8px;flex-wrap:wrap;margin-top:10px;align-items:center}
    .rej-row.open{display:flex}
    .rej-row input{flex:1;min-width:220px;padding:8px 12px;background:var(--input-bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:.88rem}
    .rej-row input:focus{outline:none;border-color:rgba(239,68,68,.5)}
    .btn-confirm-rej{padding:7px 14px;border-radius:8px;font-family:inherit;font-size:.8rem;font-weight:700;cursor:pointer;background:var(--danger);border:none;color:#fff}

    .empty{text-align:center;padding:52px 20px;color:var(--muted)}
    .empty .icon{font-size:3rem;margin-bottom:12px}

    .toast{position:fixed;bottom:28px;right:28px;padding:12px 18px;border-radius:10px;font-size:.87rem;z-index:200;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;background:var(--card);border:1px solid var(--border)}
    .toast.show{opacity:1;transform:translateY(0)}
    .toast.ok{border-color:rgba(34,197,94,.4);color:var(--success)}
    .toast.err{border-color:rgba(239,68,68,.4);color:var(--danger)}
  </style>
</head>
<body>

<nav>
  <span class="nav-brand">TicketVerse Admin</span>
  <div class="nav-links">
    <a href="/admin">Dashboard</a>
    <a href="/admin/organizers">Organizers</a>
    <a href="/admin-moderation" class="active">Moderation</a>
    <a href="/admin-categories">Categories</a>
    <a href="/admin-payouts">Payouts</a>
    <a href="/admin-revenue">Revenue</a>
    <button class="btn-logout" id="logoutBtn">Logout</button>
  </div>
</nav>

<div class="page">
  <h1>Event Moderation</h1>
  <p class="sub">Review and approve or reject organizer-submitted events.</p>

  <!-- Stats -->
  <div class="stats">
    <div class="stat"><div class="val" id="statPending" style="color:var(--warning)">—</div><div class="lbl">Pending Review</div></div>
    <div class="stat"><div class="val" id="statApproved" style="color:var(--success)">—</div><div class="lbl">Approved</div></div>
    <div class="stat"><div class="val" id="statRejected" style="color:var(--danger)">—</div><div class="lbl">Rejected</div></div>
    <div class="stat"><div class="val" id="statTotal">—</div><div class="lbl">Total Events</div></div>
  </div>

  <!-- Filter tabs -->
  <div class="tabs">
    <button class="tab active" onclick="filterEvents('all', this)">All</button>
    <button class="tab" onclick="filterEvents('pending_review', this)">Pending</button>
    <button class="tab" onclick="filterEvents('published', this)">Approved</button>
    <button class="tab" onclick="filterEvents('rejected', this)">Rejected</button>
  </div>

  <div id="eventsList"><div class="empty"><div class="icon">⏳</div><p>Loading…</p></div></div>
</div>

<div class="toast" id="toast"></div>

<script src="/js/api.js"></script>
<script src="/js/auth-channel.js"></script>
<script>
  var token = sessionStorage.getItem('token');
  var role  = sessionStorage.getItem('role');
  if (!token || role !== 'admin') window.location.replace('/');
  var H = { 'Content-Type':'application/json', 'Authorization':'Bearer ' + token };

  var _allEvents   = [];
  var _activeFilter = 'all';

  function toast(msg, type) {
    var el = document.getElementById('toast');
    el.textContent = msg; el.className = 'toast ' + type + ' show';
    setTimeout(function(){ el.className = 'toast'; }, 3500);
  }
  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  // ── Load all events ─────────────────────────────────────────────────────────
  async function loadEvents() {
    try {
      var res  = await fetch('/events', { headers: H });
      var data = await res.json();
      _allEvents = Array.isArray(data) ? data : (data.events || data.content || []);

      // Update stats
      var pending  = _allEvents.filter(function(e){ return (e.event_status||e.eventStatus) === 'pending_review'; }).length;
      var approved = _allEvents.filter(function(e){ return (e.event_status||e.eventStatus) === 'published'; }).length;
      var rejected = _allEvents.filter(function(e){ return (e.event_status||e.eventStatus) === 'rejected'; }).length;
      document.getElementById('statPending').textContent  = pending;
      document.getElementById('statApproved').textContent = approved;
      document.getElementById('statRejected').textContent = rejected;
      document.getElementById('statTotal').textContent    = _allEvents.length;

      renderEvents(_allEvents);
    } catch(e) {
      document.getElementById('eventsList').innerHTML =
        '<div class="empty"><p style="color:var(--danger)">Failed to load events.</p></div>';
    }
  }

  function filterEvents(status, btn) {
    _activeFilter = status;
    document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
    btn.classList.add('active');
    var filtered = status === 'all'
      ? _allEvents
      : _allEvents.filter(function(e){ return (e.event_status||e.eventStatus) === status; });
    renderEvents(filtered);
  }

  function renderEvents(events) {
    var el = document.getElementById('eventsList');
    if (!events.length) {
      el.innerHTML = '<div class="empty"><div class="icon">✅</div><p>No events in this category.</p></div>';
      return;
    }
    el.innerHTML = events.map(function(ev) {
      var status   = ev.event_status || ev.eventStatus || 'draft';
      var dateStr  = ev.event_date ? new Date(ev.event_date).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}) : 'TBA';
      var price    = 'Rs.' + Number(ev.price||0).toLocaleString('en-IN');
      var actions  = '';

      if (status === 'pending_review') {
        actions = '<button class="btn-approve" onclick="approveEvent(' + ev.id + ')">✓ Approve</button>'
                + '<button class="btn-reject"  onclick="toggleReject(' + ev.id + ')">✗ Reject</button>';
      } else if (status === 'published') {
        actions = '<button class="btn-revoke"  onclick="revokeEvent(' + ev.id + ')">✕ Revoke</button>';
      } else if (status === 'rejected') {
        actions = '<button class="btn-approve" onclick="approveEvent(' + ev.id + ')">↩ Re-approve</button>';
      }

      return '<div class="ev-card ' + status + '" id="evCard-' + ev.id + '">'
        + '<div class="ev-top">'
        +   '<div>'
        +     '<div class="ev-title">' + esc(ev.title||'Untitled') + '</div>'
        +     '<div class="ev-meta">'
        +       dateStr + ' &middot; ' + esc(ev.location||'No venue') + ' &middot; ' + esc(ev.category||'Other')
        +       ' &middot; ' + price + ' &middot; ' + (ev.total_tickets||0) + ' tickets'
        +       (ev.organizer_id ? ' &middot; <span style="color:var(--primary)">Organizer #' + ev.organizer_id + '</span>' : '')
        +     '</div>'
        +   '</div>'
        +   '<div class="ev-actions"><span class="badge ' + status + '">' + status.replace('_',' ').toUpperCase() + '</span>' + actions + '</div>'
        + '</div>'
        + '<div class="rej-row" id="rejRow-' + ev.id + '">'
        +   '<input id="rejReason-' + ev.id + '" type="text" placeholder="Rejection reason (optional)…" />'
        +   '<button class="btn-confirm-rej" onclick="confirmReject(' + ev.id + ')">Confirm Reject</button>'
        + '</div>'
        + '</div>';
    }).join('');
  }

  // ── Actions ──────────────────────────────────────────────────────────────────
  async function approveEvent(id) {
    try {
      var res = await fetch('/events/' + id + '/approve', { method:'PUT', headers:H });
      var d   = await res.json();
      if (!res.ok) throw new Error(d.error || 'Failed');
      toast('Event approved and published!', 'ok');
      loadEvents();
    } catch(e) { toast(e.message, 'err'); }
  }

  function toggleReject(id) {
    var row = document.getElementById('rejRow-' + id);
    row.classList.toggle('open');
    if (row.classList.contains('open')) document.getElementById('rejReason-' + id).focus();
  }

  async function confirmReject(id) {
    var reason = document.getElementById('rejReason-' + id).value.trim() || null;
    try {
      var res = await fetch('/events/' + id + '/reject', {
        method:'PUT', headers:H,
        body: JSON.stringify({ reason: reason })
      });
      var d = await res.json();
      if (!res.ok) throw new Error(d.error || 'Failed');
      toast('Event rejected.', 'ok');
      loadEvents();
    } catch(e) { toast(e.message, 'err'); }
  }

  async function revokeEvent(id) {
    if (!confirm('Revoke this event? It will be unpublished immediately.')) return;
    try {
      var res = await fetch('/events/' + id + '/revoke', { method:'PUT', headers:H });
      var d   = await res.json();
      if (!res.ok) throw new Error(d.error || 'Failed');
      toast('Event revoked and unpublished.', 'ok');
      loadEvents();
    } catch(e) { toast(e.message, 'err'); }
  }

  // ── Logout ────────────────────────────────────────────────────────────────────
  document.getElementById('logoutBtn').addEventListener('click', function() {
    fetch('/auth/logout', { method:'POST', credentials:'include' })
      .finally(function(){ sessionStorage.clear(); window.location.replace('/'); });
  });

  loadEvents();
</script>
</body>
</html>
