<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TicketVerse — My Bookings</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --gold:#f5c842; --bg:#0a0a14;
      --card:rgba(255,255,255,0.04); --border:rgba(255,255,255,0.09);
      --text:#f0eee8; --muted:rgba(240,238,232,0.5);
      --accent:#7c6af7; --red:#f74a6a; --green:#42e695; --orange:#ff9f43;
    }
    html,body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100%; }
    #bg-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }
    .app { position:relative; z-index:1; max-width:820px; margin:0 auto; padding:36px 28px 80px; }

    /* TOPBAR */
    .topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:44px; padding-bottom:20px; border-bottom:1px solid var(--border); }
    .logo { font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:900; color:var(--gold); }
    .nav-actions { display:flex; gap:10px; }
    .btn-ghost { padding:9px 20px; background:var(--card); border:1px solid var(--border); border-radius:10px; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:0.85rem; cursor:pointer; transition:all 0.2s; backdrop-filter:blur(8px); }
    .btn-ghost:hover { background:rgba(255,255,255,0.09); color:var(--text); }

    /* PAGE HEADER */
    .page-header { margin-bottom:36px; }
    .page-header h1 { font-family:'Playfair Display',serif; font-size:clamp(2rem,4vw,2.8rem); font-weight:900; margin-bottom:8px; }
    .page-header h1 em { font-style:normal; background:linear-gradient(135deg,var(--gold),var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .page-header p { font-size:0.92rem; color:var(--muted); }

    /* BOOKING CARDS — no padding so image bleeds to edges */
    #bookings-list { display:flex; flex-direction:column; gap:20px; }
    .booking-card {
      background:var(--card); border:1px solid var(--border);
      border-radius:18px; overflow:hidden;
      backdrop-filter:blur(16px);
      box-shadow:0 8px 32px rgba(0,0,0,0.25);
      animation:card-in 0.45s cubic-bezier(0.16,1,0.3,1) both;
      transition:transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    .booking-card:hover { transform:translateY(-3px); box-shadow:0 16px 44px rgba(0,0,0,0.35); border-color:rgba(255,255,255,0.15); }
    @keyframes card-in { from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);} }

    /* Colored left border by status */
    .booking-card.status-paid    { border-left:3px solid var(--green); }
    .booking-card.status-pending { border-left:3px solid var(--orange); }
    .booking-card.status-failed  { border-left:3px solid var(--red); }

    /* ── MAIN EVENT IMAGE ── */
    .booking-main-img {
      width:100%; height:180px; overflow:hidden;
      position:relative; flex-shrink:0;
    }
    .booking-main-img img {
      width:100%; height:100%; object-fit:cover; display:block;
      transition:transform 0.4s ease;
    }
    .booking-card:hover .booking-main-img img { transform:scale(1.04); }
    /* gradient fade at bottom so header text is readable */
    .booking-main-img::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(to bottom, transparent 40%, rgba(10,10,20,0.75) 100%);
    }
    /* no-image placeholder */
    .booking-main-img .no-img {
      width:100%; height:100%;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:8px; background:rgba(255,255,255,0.03); color:var(--muted); font-size:0.82rem;
    }
    .booking-main-img .no-img span { font-size:2rem; opacity:0.3; }

    .card-header {
      display:flex; align-items:flex-start; justify-content:space-between;
      padding:18px 24px 14px; flex-wrap:wrap; gap:10px;
      border-bottom:1px solid var(--border);
    }
    .event-name { font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:700; margin-bottom:4px; }
    .event-date { font-size:0.82rem; color:var(--muted); }

    .status-badge { padding:5px 14px; border-radius:20px; font-size:0.75rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; }
    .status-badge.paid    { background:rgba(66,230,149,0.12); color:var(--green); border:1px solid rgba(66,230,149,0.25); }
    .status-badge.pending { background:rgba(255,159,67,0.12); color:var(--orange); border:1px solid rgba(255,159,67,0.25); }
    .status-badge.failed  { background:rgba(247,74,106,0.1); color:var(--red); border:1px solid rgba(247,74,106,0.22); }

    .card-body { padding:20px 24px; }

    .info-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px; margin-bottom:18px; }
    .info-item { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); border-radius:10px; padding:10px 14px; }
    .info-item .label { font-size:0.7rem; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:0.07em; margin-bottom:4px; }
    .info-item .value { font-size:0.92rem; font-weight:600; color:var(--text); }
    .info-item .value.gold { color:var(--gold); }

    .seats-row { margin-bottom:16px; }
    .seats-row .label { font-size:0.72rem; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:0.07em; margin-bottom:8px; }
    .seat-tags { display:flex; flex-wrap:wrap; gap:6px; }
    .seat-tag { padding:4px 12px; border-radius:8px; background:rgba(124,106,247,0.12); border:1px solid rgba(124,106,247,0.22); color:var(--accent); font-size:0.8rem; font-weight:600; }

    .payment-id { font-size:0.78rem; color:var(--muted); font-family:monospace; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:8px; padding:8px 12px; margin-bottom:16px; word-break:break-all; }

    .download-btn { display:inline-flex; align-items:center; gap:8px; padding:11px 22px; border-radius:11px; background:linear-gradient(135deg,var(--green),#3bb78f); color:#0a0a14; font-family:'DM Sans',sans-serif; font-size:0.88rem; font-weight:700; text-decoration:none; cursor:pointer; border:none; transition:transform 0.15s, box-shadow 0.2s; box-shadow:0 4px 16px rgba(66,230,149,0.25); }
    .download-btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(66,230,149,0.38); }

    .empty-state { text-align:center; padding:80px 20px; }
    .empty-state .emoji { font-size:3.5rem; margin-bottom:16px; }
    .empty-state h3 { font-family:'Playfair Display',serif; font-size:1.4rem; margin-bottom:8px; }
    .empty-state p { color:var(--muted); font-size:0.9rem; }

    @media(max-width:500px){ .info-grid{grid-template-columns:1fr 1fr;} }
    /* ── Feature 6/9: Tabs ─── */
    .tabs-bar{display:flex;gap:4px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:14px;padding:4px;margin-bottom:28px;}
    .tab-btn{flex:1;padding:10px;border:none;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:500;border-radius:10px;cursor:pointer;transition:all 0.2s;}
    .tab-btn.active{background:var(--gold);color:#0a0a14;font-weight:700;}
    .tab-pane{display:none;}.tab-pane.active{display:block;}
    /* Feature 8: QR code */
    .qr-section{margin-top:14px;padding:14px 16px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:12px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
    .qr-img{width:88px;height:88px;border-radius:8px;background:#fff;padding:4px;}
    .qr-info{flex:1;}
    .qr-info p{font-size:0.8rem;color:var(--muted);}
    .checked-in-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:0.72rem;font-weight:700;background:rgba(66,230,149,0.12);color:var(--green);border:1px solid rgba(66,230,149,0.25);margin-top:6px;}
    /* Feature 7: discount row */
    .discount-info{font-size:0.8rem;color:var(--green);margin-bottom:4px;}
    /* Feature 5: Write review */
    .btn-review{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:rgba(124,106,247,0.12);color:#a89cf7;border:1px solid rgba(124,106,247,0.28);border-radius:11px;font-size:0.88rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
    .btn-review:hover{background:rgba(124,106,247,0.22);}
    /* Review modal */
    #review-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:2000;align-items:center;justify-content:center;}
    #review-modal-overlay.open{display:flex;}
    #review-modal{background:#1a1a2e;border:1px solid rgba(255,255,255,0.12);border-radius:16px;padding:28px;max-width:420px;width:90%;}
    #review-modal h3{margin:0 0 14px;font-size:1.1rem;}
    .star-picker-modal{display:flex;gap:6px;margin-bottom:12px;}
    .star-btn-m{background:none;border:none;font-size:1.5rem;cursor:pointer;color:rgba(255,255,255,0.2);transition:color 0.15s;padding:0;}
    .star-btn-m.lit{color:#f5c842;}
    .review-ta{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:9px;padding:9px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.85rem;outline:none;resize:vertical;min-height:70px;margin-bottom:12px;}
    .modal-btn-row{display:flex;gap:8px;}
    .modal-btn-row button{flex:1;padding:11px;border-radius:9px;font-weight:700;font-size:0.9rem;cursor:pointer;border:none;}
    #submit-review-btn{background:var(--gold);color:#0a0a14;}
    #close-review-modal-btn{background:rgba(255,255,255,0.08);color:var(--text);}
    /* Wishlist / Waitlist cards */
    .wl-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
    .wl-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;}
    .wl-meta{font-size:0.8rem;color:var(--muted);margin-top:3px;}
    .btn-remove-wl{padding:8px 16px;background:rgba(247,74,106,0.1);border:1px solid rgba(247,74,106,0.25);border-radius:9px;color:var(--red);font-size:0.82rem;font-weight:600;cursor:pointer;}
    .btn-remove-wl:hover{background:rgba(247,74,106,0.2);}


    /* ── Cancellation UI ─────────────────────────────────── */
    .cancel-btn { display:inline-flex; align-items:center; gap:6px; padding:11px 22px;
      background:rgba(247,74,106,0.12); color:var(--red); border:1px solid rgba(247,74,106,0.3);
      border-radius:11px; font-size:0.88rem; font-weight:700; cursor:pointer; transition:all 0.2s; }
    .cancel-btn:hover { background:rgba(247,74,106,0.22); border-color:var(--red); }
    .cancel-invoice-btn { display:inline-flex; align-items:center; gap:6px; padding:11px 22px;
      background:rgba(245,200,66,0.1); color:var(--gold); border:1px solid rgba(245,200,66,0.25);
      border-radius:11px; font-size:0.88rem; font-weight:700; cursor:pointer; transition:all 0.2s; }
    .cancel-invoice-btn:hover { background:rgba(245,200,66,0.2); }
    .cancellation-badge { display:inline-block; margin-left:8px; padding:3px 10px;
      border-radius:20px; font-size:0.72rem; font-weight:700; letter-spacing:0.05em; }
    .cancellation-badge.cancelled     { background:rgba(247,74,106,0.15); color:var(--red); }
    .cancellation-badge.refund_pending{ background:rgba(245,200,66,0.15); color:var(--gold); }
    .cancellation-badge.refunded      { background:rgba(66,230,149,0.15); color:var(--green); }
    .refund-info { margin-top:10px; padding:10px 14px; border-radius:8px; font-size:0.83rem; }
    .refund-info.green { background:rgba(66,230,149,0.07); border:1px solid rgba(66,230,149,0.2); color:var(--green); }
    .refund-info.gold  { background:rgba(245,200,66,0.07); border:1px solid rgba(245,200,66,0.2); color:var(--gold); }
    .refund-info.red   { background:rgba(247,74,106,0.07); border:1px solid rgba(247,74,106,0.2); color:var(--red); }
    /* ── Cancel Preview Modal ── */
    #cancel-modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75);
      z-index:1000; align-items:center; justify-content:center; }
    #cancel-modal-overlay.open { display:flex; }
    #cancel-modal { background:#1a1a2e; border:1px solid rgba(255,255,255,0.12); border-radius:16px;
      padding:32px; max-width:460px; width:90%; }
    #cancel-modal h3 { margin:0 0 10px; font-size:1.15rem; color:var(--red); }
    .breakdown-row { display:flex; justify-content:space-between; padding:7px 0;
      border-bottom:1px solid rgba(255,255,255,0.06); font-size:0.88rem; }
    .breakdown-row:last-child { border:none; }
    .modal-actions { display:flex; gap:10px; margin-top:20px; }
    .modal-actions button { flex:1; padding:12px; border-radius:10px; font-weight:700;
      font-size:0.9rem; cursor:pointer; border:none; }
    #confirm-cancel-btn { background:var(--red); color:#fff; }
    #confirm-cancel-btn:disabled { opacity:0.5; cursor:not-allowed; }
    #close-cancel-modal-btn { background:rgba(255,255,255,0.08); color:var(--text); }
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<div class="app">
  <div class="topbar">
    <span class="logo">TicketVerse</span>
    <div class="nav-actions">
      <button class="btn-ghost" onclick="goBack()">← Back to Events</button>
      <a class="btn-ghost" href="/my-profile">👤 My Profile</a>
      <button class="btn-ghost" id="logoutBtn">Logout</button>
    </div>
  </div>

  <div class="page-header">
    <h1>My <em>Bookings</em></h1>
    <p>All your tickets and reservations in one place</p>
  </div>

  <div class="tabs-bar">
    <button class="tab-btn active" onclick="switchTab('bookings',this)">🎟 My Bookings</button>
    <button class="tab-btn"        onclick="switchTab('wishlist',this)">❤️ Wishlist</button>
    <button class="tab-btn"        onclick="switchTab('waitlist',this)">🔔 Waitlist</button>
  </div>
  <div id="tab-bookings" class="tab-pane active">
    <div id="bookings-list"></div>
  </div>
  <div id="tab-wishlist" class="tab-pane">
    <div id="wishlist-list"></div>
  </div>
  <div id="tab-waitlist" class="tab-pane">
    <div id="waitlist-list"></div>
  </div>
</div>

<script>
/* Canvas BG */
const canvas=document.getElementById('bg-canvas'),ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();
const stars=Array.from({length:200},()=>({x:Math.random()*5000,y:Math.random()*5000,r:Math.random()*1.1+.2,a:Math.random(),da:(Math.random()*.007+.002)*(Math.random()>.5?1:-1)}));
const pts=Array.from({length:70},()=>({x:Math.random()*W||600,y:Math.random()*H||400,r:Math.random()*1.8+.3,speed:Math.random()*.35+.12,dx:(Math.random()-.5)*.25,alpha:Math.random()*.35+.1,fadeDir:1,col:['rgba(245,200,66,','rgba(124,106,247,','rgba(66,230,149,'][Math.floor(Math.random()*3)]}));
function draw(){
  ctx.clearRect(0,0,W,H);
  const g=ctx.createLinearGradient(0,0,W,H);g.addColorStop(0,'#0a0a14');g.addColorStop(1,'#0d0d22');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  [[.8,.2,300,'rgba(124,106,247,0.06)'],[.15,.75,280,'rgba(245,200,66,0.04)'],[.5,.4,200,'rgba(66,230,149,0.03)']].forEach(([ox,oy,r,c])=>{const rg=ctx.createRadialGradient(ox*W,oy*H,0,ox*W,oy*H,r);rg.addColorStop(0,c);rg.addColorStop(1,'transparent');ctx.fillStyle=rg;ctx.fillRect(0,0,W,H);});
  stars.forEach(s=>{s.a+=s.da;if(s.a>1||s.a<0)s.da*=-1;ctx.beginPath();ctx.arc(s.x%W,s.y%H,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${Math.max(0,s.a)*.45})`;ctx.fill();});
  ctx.strokeStyle='rgba(255,255,255,0.016)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=64){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=64){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  pts.forEach(p=>{p.y-=p.speed;p.x+=p.dx;p.alpha+=.003*p.fadeDir;if(p.alpha>.55||p.alpha<.07)p.fadeDir*=-1;if(p.y<-10){p.x=Math.random()*W;p.y=H+10;}ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.col+p.alpha+')';ctx.fill();});
  requestAnimationFrame(draw);
}
draw();
</script>

<script src="/js/api.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  let cookieConflict = false;

  try {
    const session = await apiRequest("/auth/me", "GET");

    // Always store userId from the server — required by auth-channel.js
    // to match logout broadcasts on tabs opened without the login form.
    sessionStorage.setItem("userId", String(session.userId));

    const myUserId = sessionStorage.getItem("userId");

    if (myUserId && String(session.userId) !== myUserId) {
      // Cookie overwritten by another user on a different tab.
      // Do NOT redirect — serve from sessionStorage cache instead.
      cookieConflict = true;
    } else {
      sessionStorage.setItem("role", session.role);
    }
  } catch (err) {
    return; // api.js 401 handler redirects to "/"
  }
  document.getElementById("logoutBtn").addEventListener("click", logout);
  loadBookings(cookieConflict);
});

function _bookingsCacheKey() {
  return 'bookingsCache_' + (sessionStorage.getItem('userId') || 'unknown');
}

function _showConflictBanner() {
  if (document.getElementById('session-conflict-banner')) return;
  const banner = document.createElement('div');
  banner.id = 'session-conflict-banner';
  banner.style.cssText = [
    'background:rgba(245,200,66,0.12)',
    'border:1px solid rgba(245,200,66,0.35)',
    'border-radius:10px',
    'padding:12px 18px',
    'margin-bottom:18px',
    'font-size:0.85rem',
    'color:#f5c842',
    'display:flex',
    'align-items:center',
    'gap:10px',
  ].join(';');
  banner.innerHTML = `
    <span style="font-size:1.1rem">⚠️</span>
    <span>Another user is active in a different tab. Showing your saved bookings —
    they are <strong>your bookings</strong> and have not changed.</span>`;
  const list = document.getElementById('bookings-list');
  list.parentNode.insertBefore(banner, list);
}

async function loadBookings(fromCache = false) {
  const container = document.getElementById('bookings-list');
  const cacheKey  = _bookingsCacheKey();

  if (fromCache) {
    _showConflictBanner();
    const cached = sessionStorage.getItem(cacheKey);
    if (cached) {
      renderBookings(JSON.parse(cached), container);
    } else {
      container.innerHTML = `
        <div class="empty-state">
          <div class="emoji">⚠️</div>
          <h3>Session conflict</h3>
          <p>Another user logged in on a different tab before your bookings could
             be loaded. Please log out and log back in to view your bookings.</p>
        </div>`;
    }
    return;
  }

  try {
    const bookings = await apiRequest("/bookings/my-bookings", "GET", null, true);
    // Cache for this tab — cleared on logout via sessionStorage.clear()
    sessionStorage.setItem(cacheKey, JSON.stringify(bookings));
    renderBookings(bookings, container);
  } catch (err) {
    alert(err.message || "Error loading bookings");
  }
}

function renderBookings(bookings, container) {
  container.innerHTML = "";

  if (!bookings.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="emoji">🎟️</div>
        <h3>No bookings yet</h3>
        <p>Book your first event and it'll appear here.</p>
      </div>`;
    return;
  }

  bookings.forEach((b, i) => {
    const statusClass = b.payment_status === "paid"   ? "paid"
                      : b.payment_status === "failed" ? "failed"
                      : "pending";

    let seatsDisplay = [];
    if (b.selected_seats) {
      try { seatsDisplay = JSON.parse(b.selected_seats); }
      catch (e) { seatsDisplay = [b.selected_seats]; }
    }

    const imgs    = (() => { const r = b.Event && b.Event.images; if (!r) return []; if (Array.isArray(r)) return r; try { const p = JSON.parse(r); return Array.isArray(p) ? p : []; } catch { return []; } })();
    const mainImg = imgs[0] || null;
    const imgHTML = mainImg
      ? `<div class="booking-main-img"><img src="${mainImg}" alt="${b.Event.title}" loading="lazy"/></div>`
      : `<div class="booking-main-img"><div class="no-img"><span>🎟️</span>No event image</div></div>`;

    const card = document.createElement("div");
    card.className = `booking-card status-${statusClass}`;
    card.style.animationDelay = `${i * 0.07}s`;

    card.innerHTML = `
      ${imgHTML}
      <div class="card-header">
        <div>
          <div class="event-name">${b.Event.title}</div>
          <div class="event-date">📅 ${new Date(b.Event.event_date).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})}</div>
        </div>
        <span class="status-badge ${statusClass}">${b.payment_status}</span>

async function downloadTicket(e, bookingId) {
  e.preventDefault();
  try {
    // Direct fetch — must manually attach Authorization header so the backend
    // middleware uses this tab's own JWT, not the shared cookie (which may
    // belong to a different user logged in on another tab).
    const tabToken = sessionStorage.getItem("token");
    const response = await fetch(`/bookings/${bookingId}/download-ticket`, {
      credentials: "include",
      headers: tabToken ? { "Authorization": `Bearer ${tabToken}` } : {}
    });
    if (!response.ok) throw new Error("Failed to download ticket");
    const blob = await response.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = `ticket-${bookingId}.pdf`; a.click();
    URL.revokeObjectURL(url);
  } catch (err) {
    alert("Could not download ticket: " + err.message);
  }
}

function goBack()  { window.location.replace("/events-page"); }
function logout() {
  const userId = sessionStorage.getItem('userId');
  if (window._authChannel && userId) {
    window._authChannel.postMessage({ type: 'LOGOUT', userId });
  }
  fetch("/auth/logout", { method: "POST", credentials: "include" })
    .finally(() => { sessionStorage.clear(); window.location.replace("/"); });
}
</script>

  <script>
  let _cancelBookingId = null;

  async function openCancelModal(bookingId) {
    _cancelBookingId = bookingId;
    const overlay = document.getElementById('cancel-modal-overlay');
    const msg     = document.getElementById('cancel-modal-msg');
    const bd      = document.getElementById('cancel-breakdown');
    const btn     = document.getElementById('confirm-cancel-btn');
    msg.textContent = 'Checking cancellation policy…';
    bd.innerHTML    = '';
    btn.disabled    = true;
    overlay.classList.add('open');

    try {
      const token = sessionStorage.getItem('token');
      const res   = await fetch(`/cancellations/preview/${bookingId}`, {
        credentials: 'include',
        headers: token ? { Authorization: `Bearer ${token}` } : {}
      });
      const data = await res.json();

      if (!data.cancellationAllowed) {
        msg.textContent = data.reason || 'Cancellation not allowed for this booking.';
        return;
      }

      msg.textContent = `Hours until event: ${data.hoursUntilEvent} h  |  ${data.isHighTier ? 'High-tier refund' : 'Low-tier refund'}`;

      const rows = [
        ['Total Paid',            `₹${(data.totalPaid||0).toFixed(2)}`,         ''],
        ['Cancellation Fee (5%)', `₹${(data.cancellationFee||0).toFixed(2)}`,   'color:var(--red)'],
        ['GST on Fee (5%)',       `₹${(data.cancellationFeeGst||0).toFixed(2)}`, 'color:var(--red)'],
        ['Refund to You',         `₹${(data.refundAmount||0).toFixed(2)}`,       'color:var(--green);font-size:1.05rem;font-weight:700'],
      ];

      bd.innerHTML = rows.map(([label, val, style]) =>
        `<div class="breakdown-row">
           <span>${label}</span>
           <span style="${style}">${val}</span>
         </div>`
      ).join('');

      const pct = (data.refundPercent||0).toFixed(0);
      bd.innerHTML += `<p style="margin-top:10px;font-size:0.78rem;color:var(--muted);">
        ${data.isHighTier
          ? 'High-tier (≥72 h): full ticket refunded minus cancellation charges.'
          : `Low-tier: ${pct}% of ticket amount minus charges. Convenience fee retained.`}
      </p>`;

      btn.disabled    = false;
      btn.textContent = `Confirm Cancel & Refund ₹${(data.refundAmount||0).toFixed(2)}`;
    } catch (err) {
      msg.textContent = 'Could not load preview: ' + err.message;
    }
  }

  function closeCancelModal() {
    document.getElementById('cancel-modal-overlay').classList.remove('open');
    _cancelBookingId = null;
    document.getElementById('confirm-cancel-btn').textContent = 'Confirm Cancel';
  }

  async function confirmCancel() {
    if (!_cancelBookingId) return;
    const btn = document.getElementById('confirm-cancel-btn');
    btn.disabled    = true;
    btn.textContent = 'Cancelling…';
    try {
      const token = sessionStorage.getItem('token');
      const res   = await fetch(`/cancellations/${_cancelBookingId}`, {
        method: 'POST', credentials: 'include',
        headers: token ? { Authorization: `Bearer ${token}` } : {}
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Cancellation failed.');
      closeCancelModal();
      alert(`Booking cancelled. Refund of ₹${(data.refundAmount||0).toFixed(2)} initiated.`);
      loadBookings();
    } catch (err) {
      alert('Cancellation failed: ' + err.message);
      btn.disabled    = false;
      btn.textContent = 'Confirm Cancel';
    }
  }

  async function downloadCancellationInvoice(e, bookingId) {

    try {
      const token = sessionStorage.getItem('token');
      const res   = await fetch(`/cancellations/${bookingId}/download-invoice`, {
        credentials: 'include',
        headers: token ? { Authorization: `Bearer ${token}` } : {}
      });

      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = `cancellation-invoice-${bookingId}.pdf`; a.click();
      URL.revokeObjectURL(url);
    } catch (err) {
      alert('Could not download invoice: ' + err.message);
    }
  }

/* Feature 6: Wishlist tab */
async function loadWishlist(){
  const c=document.getElementById('wishlist-list');c.innerHTML='<p style="color:var(--muted);font-size:0.9rem;">Loading…</p>';
  try{
    const items=await apiRequest('/wishlist','GET',null,true);c.innerHTML='';
    if(!items||!items.length){c.innerHTML='<div class="empty-state"><div class="emoji">❤️</div><h3>No saved events</h3><p>Tap the heart on an event to save it here.</p></div>';return;}
    // Fetch event details for all wishlist items in parallel
    const eventIds=[...new Set((items||[]).map(w=>w.eventId||w.event_id))];
    const eventMap={};
    await Promise.all(eventIds.map(async id=>{
      try{const ev=await apiRequest(`/events/${id}`,'GET',null,true).catch(()=>null);if(ev)eventMap[id]=ev;}catch(e){}
    }));
    items.forEach(w=>{
      const eid=w.eventId||w.event_id;
      const ev=eventMap[eid];
      const title=ev?ev.title:`Event #${eid}`;
      const dateStr=ev?new Date(ev.event_date||ev.eventDate).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}):'';
      const city=ev&&ev.city?` · 📍 ${ev.city}`:'';
      const price=ev?` · ₹${ev.price}`:'';
      const soldOut=ev&&ev.available_tickets===0;
      const imgs=(()=>{if(!ev||!ev.images)return[];if(Array.isArray(ev.images))return ev.images;try{const p=JSON.parse(ev.images);return Array.isArray(p)?p:[];}catch{return[];}})();
      const thumb=imgs[0]?`<img src="${imgs[0]}" style="width:52px;height:52px;border-radius:8px;object-fit:cover;flex-shrink:0;" alt=""/>`:'<div style="width:52px;height:52px;border-radius:8px;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;">🎟️</div>';
      const d=document.createElement('div');
      d.className='wl-card';
      d.style.cursor='pointer';
      d.innerHTML=`
        ${thumb}
        <div style="flex:1;min-width:0;">
          <div class="wl-title" style="margin-bottom:3px;">${title}${soldOut?' <span style="font-size:0.72rem;color:var(--red);font-weight:600;">SOLD OUT</span>':''}</div>
          <div class="wl-meta">${dateStr}${city}${price}${w.notifyOnAvailability?'  🔔 Notify on open':''}</div>
          <div style="margin-top:8px;">
            <span style="font-size:0.78rem;color:var(--accent);font-weight:600;text-decoration:underline;">👆 View &amp; Book →</span>
          </div>
        </div>
        <button class="btn-remove-wl" onclick="event.stopPropagation();removeWishlist(${eid},this)">Remove</button>`;
      // Click the card → navigate to events page with this event pre-opened
      d.addEventListener('click',function(e){
        if(e.target.classList.contains('btn-remove-wl')||e.target.closest('.btn-remove-wl'))return;
        sessionStorage.setItem('open_event_id',''+eid);
        window.location.href='/events-page';
      });
      c.appendChild(d);
    });
  }catch(err){c.innerHTML=`<p style="color:var(--red)">${err.message}</p>`;}
}
async function removeWishlist(eventId,btn){try{await apiRequest(`/wishlist/${eventId}`,'DELETE',null,true);btn.closest('.wl-card').remove();}catch(err){alert(err.message);}}

/* Feature 9: Waitlist tab */
async function loadWaitlist(){
