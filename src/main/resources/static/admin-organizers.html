<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Organizer Applications — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/admin-theme.css">
  <style>
    /* ── Organizer card details (page-specific) ── */
    .card-details { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:.7rem; margin-top:1rem; }
    .org-card { display:block; }
  </style>
</head>
<body>

<nav class="admin-nav">
  <span class="nav-brand">TicketVerse Admin</span>
  <div class="nav-links">
    <a href="/admin">Dashboard</a>
    <a href="/admin/organizers" class="active">Organizers</a>
    <a href="/admin-moderation">Moderation</a>
    <a href="/admin-categories">Categories</a>
    <a href="/admin-payouts">Payouts</a>
    <a href="/admin-revenue">Revenue</a>
    <button class="btn-logout" id="logoutBtn">Logout</button>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div>
      <h1>Organizer Applications</h1>
      <p>Review and manage venue / organizer registrations</p>
    </div>
  </div>

  <div class="filter-tabs">
    <button class="filter-tab active" data-status="">All</button>
    <button class="filter-tab" data-status="pending">Pending</button>
    <button class="filter-tab" data-status="approved">Approved</button>
    <button class="filter-tab" data-status="rejected">Rejected</button>
  </div>

  <div id="organizerList">
    <p style="color:var(--muted);text-align:center;padding:2rem;">Loading…</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const token = sessionStorage.getItem("token");
  const role  = sessionStorage.getItem("role");
  if (!token || role !== "admin") window.location.href = "/";

  const headers = { "Content-Type": "application/json", "Authorization": `Bearer ${token}` };
  let currentStatus = "";

  // ── Load organizers ────────────────────────────────────────────────────────
  async function loadOrganizers(status = "") {
    currentStatus = status;
    const url = status ? `/organizer/admin/organizers?status=${status}` : "/organizer/admin/organizers";
    try {
      const res   = await fetch(url, { headers });
      if (res.status === 401) { window.location.href = "/"; return; }
      const data  = await res.json();
      // Backend returns a Spring Page object; extract the content array.
      const list = Array.isArray(data) ? data : (data.content || []);
      renderOrganizers(list);
    } catch {
      document.getElementById("organizerList").innerHTML = "<p style='color:#fca5a5;text-align:center;padding:2rem;'>Failed to load data.</p>";
    }
  }

  function renderOrganizers(list) {
    const container = document.getElementById("organizerList");
    if (!list.length) {
      container.innerHTML = `<div class="empty-state"><div class="icon">👥</div><p>No organizers found for this filter.</p></div>`;
      return;
    }

    container.innerHTML = list.map(org => {
      const isPending  = org.status === "pending";
      const isApproved = org.status === "approved";
      const actionBtns = isPending ? `
        <button class="btn-approve" onclick="approve(${org.id}, this)">✓ Approve</button>
        <button class="btn-reject"  onclick="showRejectBox(${org.id}, this)">✗ Reject</button>
        <div class="reject-reason-wrap" id="rejectBox-${org.id}">
          <input class="reject-input" id="rejectReason-${org.id}" placeholder="Reason for rejection (optional)" />
          <button class="btn-confirm-reject" onclick="confirmReject(${org.id})">Confirm</button>
        </div>` :
        isApproved ? `<button class="btn-reject" onclick="showRejectBox(${org.id}, this)">Revoke Approval</button>
          <div class="reject-reason-wrap" id="rejectBox-${org.id}">
            <input class="reject-input" id="rejectReason-${org.id}" placeholder="Reason (optional)" />
            <button class="btn-confirm-reject" onclick="confirmReject(${org.id})">Confirm</button>
          </div>` : "";

      return `
        <div class="organizer-card" id="orgCard-${org.id}">
          <div class="card-top">
            <div>
              <div class="org-name">${escHtml(org.User?.name || "—")}</div>
              <div class="org-email">${escHtml(org.User?.email || "—")}</div>
            </div>
            <span class="badge ${org.status}">${org.status}</span>
          </div>
          <div class="card-details">
            <div class="detail-item"><label>Business Name</label><span>${escHtml(org.business_name)}</span></div>
            <div class="detail-item"><label>Phone</label><span>${escHtml(org.contact_phone || "—")}</span></div>
            <div class="detail-item"><label>GST</label><span>${escHtml(org.gst_number || "—")}</span></div>
            <div class="detail-item"><label>Applied On</label><span>${new Date(org.created_at).toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"})}</span></div>
            ${org.address ? `<div class="detail-item"><label>Address</label><span>${escHtml(org.address)}</span></div>` : ""}
            ${org.rejection_reason ? `<div class="detail-item"><label>Rejection Reason</label><span style="color:#fca5a5">${escHtml(org.rejection_reason)}</span></div>` : ""}
          </div>
          ${actionBtns ? `<div class="card-actions">${actionBtns}</div>` : ""}
        </div>`;
    }).join("");
  }

  // ── Approve ────────────────────────────────────────────────────────────────
  async function approve(id, btn) {
    btn.disabled = true; btn.textContent = "Approving…";
    try {
      const res  = await fetch(`/organizer/admin/organizers/${id}/approve`, { method: "PUT", headers });
      const data = await res.json();
      if (res.ok) { toast("Organizer approved.", "success"); loadOrganizers(currentStatus); }
      else        { toast(data.error || "Approval failed.", "error"); btn.disabled = false; btn.textContent = "✓ Approve"; }
    } catch { toast("Network error.", "error"); btn.disabled = false; btn.textContent = "✓ Approve"; }
  }

  // ── Reject ─────────────────────────────────────────────────────────────────
  function showRejectBox(id) {
    const box = document.getElementById(`rejectBox-${id}`);
    box.classList.toggle("show");
  }

  async function confirmReject(id) {
    const reason = document.getElementById(`rejectReason-${id}`).value.trim() || null;
    try {
      const res  = await fetch(`/organizer/admin/organizers/${id}/reject`, {
        method: "PUT", headers, body: JSON.stringify({ reason }),
      });
      const data = await res.json();
      if (res.ok) { toast("Organizer rejected.", "success"); loadOrganizers(currentStatus); }
      else        { toast(data.error || "Rejection failed.", "error"); }
    } catch { toast("Network error.", "error"); }
  }

  // ── Filter tabs ────────────────────────────────────────────────────────────
  document.querySelectorAll(".filter-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".filter-tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      loadOrganizers(tab.dataset.status);
    });
  });

  // ── Toast ──────────────────────────────────────────────────────────────────
  function toast(msg, type = "success") {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.className   = `toast ${type} show`;
    setTimeout(() => { el.className = "toast"; }, 3000);
  }

  function escHtml(str) {
    return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  document.getElementById("logoutBtn").addEventListener("click", async () => {
    await fetch("/auth/logout", { method: "POST", headers });
    sessionStorage.clear();
    window.location.href = "/";
  });

  loadOrganizers();
</script>
</body>
</html>
