<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Revenue — Organizer</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    :root {
      --primary:#6c63ff; --bg:#0f0f1a; --card:#1a1a2e; --border:#2a2a45;
      --text:#e2e8f0; --muted:#8b8fa8; --success:#22c55e; --danger:#ef4444; --warning:#f59e0b;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh; }

    nav { background:var(--card); border-bottom:1px solid var(--border); padding:1rem 2rem; display:flex; align-items:center; justify-content:space-between; }
    .nav-brand { font-size:1.2rem; font-weight:700; color:var(--primary); }
    .nav-links { display:flex; gap:1.5rem; align-items:center; }
    .nav-links a { color:var(--muted); text-decoration:none; font-size:.9rem; transition:color .2s; }
    .nav-links a:hover,.nav-links a.active { color:var(--text); }
    .nav-links a.active { border-bottom:2px solid var(--primary); padding-bottom:2px; }
    .btn-logout { background:transparent; border:1px solid var(--border); color:var(--muted); padding:.4rem .9rem; border-radius:8px; cursor:pointer; font-size:.85rem; transition:all .2s; }
    .btn-logout:hover { border-color:var(--danger); color:var(--danger); }

    .page { max-width:1100px; margin:0 auto; padding:2.5rem 1.5rem; }
    .page-header { margin-bottom:2rem; }
    .page-header h1 { font-size:1.7rem; font-weight:700; }

    /* SUMMARY CARDS */
    .summary-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:1.2rem; margin-bottom:2.5rem; }
    .sum-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:1.3rem 1.5rem; }
    .sum-label { font-size:.78rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }
    .sum-value { font-size:1.8rem; font-weight:800; margin-top:.4rem; }
    .sum-value.green  { color:var(--success); }
    .sum-value.purple { color:var(--primary); }
    .sum-value.orange { color:var(--warning); }

    /* EVENT REVENUE CARDS */
    .event-card { background:var(--card); border:1px solid var(--border); border-radius:14px; margin-bottom:1.2rem; overflow:hidden; }
    .event-card-header { display:flex; justify-content:space-between; align-items:center; padding:1.2rem 1.5rem; cursor:pointer; gap:1rem; flex-wrap:wrap; }
    .event-title { font-size:1rem; font-weight:700; }
    .event-meta  { color:var(--muted); font-size:.83rem; margin-top:.2rem; }
    .event-totals { text-align:right; }
    .event-revenue { font-size:1.3rem; font-weight:800; color:var(--success); }
    .event-tickets { font-size:.82rem; color:var(--muted); margin-top:.2rem; }
    .chevron { color:var(--muted); font-size:.9rem; transition:transform .2s; }
    .chevron.open { transform:rotate(180deg); }

    .bookings-table-wrap { display:none; border-top:1px solid var(--border); padding:1rem 1.5rem 1.5rem; }
    .bookings-table-wrap.open { display:block; }
    table { width:100%; border-collapse:collapse; }
    th { text-align:left; padding:.6rem .8rem; font-size:.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; border-bottom:1px solid var(--border); }
    td { padding:.7rem .8rem; font-size:.88rem; border-bottom:1px solid var(--border); }
    tr:last-child td { border-bottom:none; }

    .empty-state { text-align:center; padding:4rem 1rem; color:var(--muted); }
    .empty-state .icon { font-size:3.5rem; margin-bottom:1rem; }
    /* ── Payout sections ── */
    .payout-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:20px 22px; margin-bottom:20px; }
    .payout-card h3 { font-size:1rem; font-weight:700; margin-bottom:14px; }
    .field-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
    @media(max-width:600px){ .field-row { grid-template-columns:1fr; } }
    .field-grp label { display:block; font-size:.73rem; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:5px; }
    .field-grp input,.field-grp select { width:100%; padding:8px 11px; background:rgba(255,255,255,.05); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:inherit; font-size:.9rem; }
    .field-grp input:focus,.field-grp select:focus { outline:none; border-color:var(--primary); }
    .method-tabs { display:flex; gap:8px; margin-bottom:14px; }
    .method-tab { padding:6px 16px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; font-size:.84rem; transition:all .2s; }
    .method-tab.active { background:rgba(108,99,255,.15); border-color:rgba(108,99,255,.4); color:var(--primary); font-weight:700; }
    .bank-fields,.upi-fields { display:none; }
    .bank-fields.show,.upi-fields.show { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media(max-width:600px){ .bank-fields.show,.upi-fields.show { grid-template-columns:1fr; } }
    .btn-action { padding:9px 22px; border-radius:9px; border:none; font-family:inherit; font-size:.9rem; font-weight:600; cursor:pointer; transition:opacity .2s; }
    .btn-action:hover { opacity:.85; } .btn-action:disabled { opacity:.45; cursor:not-allowed; }
    .btn-purple { background:var(--primary); color:#fff; }
    .btn-green-out { background:rgba(34,197,94,.12); color:var(--success); border:1px solid rgba(34,197,94,.3); }
    .p-alert { padding:9px 12px; border-radius:8px; font-size:.85rem; margin-top:10px; display:none; }
    .p-alert.ok  { background:rgba(34,197,94,.08); border:1px solid rgba(34,197,94,.25); color:var(--success); display:block; }
    .p-alert.err { background:rgba(239,68,68,.08); border:1px solid rgba(239,68,68,.25); color:var(--danger); display:block; }
    .p-table { width:100%; border-collapse:collapse; font-size:.87rem; }
    .p-table th { text-align:left; padding:.55rem .8rem; font-size:.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; border-bottom:1px solid var(--border); }
    .p-table td { padding:.7rem .8rem; border-bottom:1px solid rgba(255,255,255,.04); }
    .p-table tr:last-child td { border-bottom:none; }
    .p-badge { display:inline-block; padding:2px 10px; border-radius:999px; font-size:.7rem; font-weight:700; text-transform:uppercase; }
    .p-badge.requested  { background:rgba(245,200,66,.12); color:#f5c842; }
    .p-badge.processing { background:rgba(74,144,226,.12); color:#60a5fa; }
    .p-badge.paid       { background:rgba(34,197,94,.1);   color:var(--success); }
    .p-badge.rejected   { background:rgba(239,68,68,.1);   color:var(--danger); }
  </style>
</head>
<body>

<nav>
  <span class="nav-brand">🎟 Organizer Panel</span>
  <div class="nav-links">
    <a href="/organizer-dashboard">Dashboard</a>
    <a href="/organizer-events">My Events</a>
    <a href="/organizer-revenue" class="active">Revenue</a>
    <button class="btn-logout" id="logoutBtn">Logout</button>
  </div>
</nav>

<main class="page">
  <div class="page-header">
    <h1>Revenue Report</h1>
  </div>

  <!-- Summary totals -->
  <div class="summary-grid">
    <div class="sum-card">
      <div class="sum-label">Events with Sales</div>
      <div class="sum-value purple" id="sumEvents">—</div>
    </div>
    <div class="sum-card">
      <div class="sum-label">Total Bookings</div>
      <div class="sum-value orange" id="sumBookings">—</div>
    </div>
    <div class="sum-card">
      <div class="sum-label">Tickets Sold</div>
      <div class="sum-value orange" id="sumTickets">—</div>
    </div>
    <div class="sum-card">
      <div class="sum-label">Gross Revenue</div>
      <div class="sum-value green" id="sumRevenue">—</div>
    </div>
  </div>

  <!-- ══ Payment Settings ══ -->
  <div class="payout-card">
    <h3>💳 Payment Settings</h3>
    <div class="method-tabs">
      <button class="method-tab active" id="tabBank" onclick="switchMethod('bank')">🏦 Bank Transfer</button>
      <button class="method-tab" id="tabUpi"  onclick="switchMethod('upi')">📱 UPI</button>
    </div>
    <div class="bank-fields show" id="bankFields">
      <div class="field-grp"><label>Account Number</label><input type="text" id="bankAcc" placeholder="e.g. 1234567890" /></div>
      <div class="field-grp"><label>IFSC Code</label><input type="text" id="bankIfsc" placeholder="e.g. HDFC0001234" /></div>
    </div>
    <div class="upi-fields" id="upiFields">
      <div class="field-grp" style="grid-column:1/-1"><label>UPI ID</label><input type="text" id="upiId" placeholder="yourname@upi" /></div>
    </div>
    <button class="btn-action btn-purple" style="margin-top:8px" onclick="savePayoutSettings()">Save Payment Settings</button>
    <div class="p-alert" id="settingsAlert"></div>
  </div>

  <!-- ══ Request Payout ══ -->
  <div class="payout-card">
    <h3>💰 Request Payout</h3>
    <div class="field-row">
      <div class="field-grp"><label>From Date</label><input type="date" id="payFrom" /></div>
      <div class="field-grp"><label>To Date</label><input type="date" id="payTo" /></div>
    </div>
    <button class="btn-action btn-green-out" id="reqPayBtn" onclick="requestPayout()">Request Payout</button>
    <div class="p-alert" id="payReqAlert"></div>
  </div>

  <!-- ══ Payout History ══ -->
  <div class="payout-card">
    <h3>📋 Payout History</h3>
    <div id="payoutHistory"><p style="color:var(--muted);font-size:.88rem">Loading…</p></div>
  </div>

  <!-- Per-event breakdown -->
  <div id="revenueList">
    <p style="color:var(--muted);text-align:center;padding:2rem;">Loading…</p>
  </div>
</main>

<script>
  const token = sessionStorage.getItem("token");
  const role  = sessionStorage.getItem("role");
  if (!token || role !== "organizer") window.location.href = "/";

  const headers = { "Content-Type": "application/json", "Authorization": `Bearer ${token}` };

  /* ══ Payout JS ══ */
  let _payMethod = 'bank';

  function switchMethod(m) {
    _payMethod = m;
    document.getElementById('tabBank').classList.toggle('active', m==='bank');
    document.getElementById('tabUpi').classList.toggle('active',  m==='upi');
    document.getElementById('bankFields').classList.toggle('show', m==='bank');
    document.getElementById('upiFields').classList.toggle('show',  m==='upi');
  }

  async function loadPayoutProfile() {
    try {
      const res = await fetch('/organizer/profile', { headers });
      if (!res.ok) return;
      const p = await res.json();
      if (p.bank_account_number) document.getElementById('bankAcc').value  = p.bank_account_number;
      if (p.bank_ifsc)           document.getElementById('bankIfsc').value = p.bank_ifsc;
      if (p.upi_id)              document.getElementById('upiId').value    = p.upi_id;
      if (p.payout_method)       switchMethod(p.payout_method);
    } catch {}
  }

  async function savePayoutSettings() {
    const body = { payout_method: _payMethod };
    if (_payMethod === 'bank') {
      body.bank_account_number = document.getElementById('bankAcc').value.trim()||null;
      body.bank_ifsc = document.getElementById('bankIfsc').value.trim()||null;
    } else {
      body.upi_id = document.getElementById('upiId').value.trim()||null;
    }
    try {
      const res = await fetch('/organizer/profile', { method:'PUT', headers, body:JSON.stringify(body) });
      const d   = await res.json();
      if (!res.ok) throw new Error(d.error||'Save failed');
      showPAlert('settingsAlert', 'Payment settings saved!', 'ok');
    } catch(e) { showPAlert('settingsAlert', e.message, 'err'); }
  }

  async function requestPayout() {
    const from = document.getElementById('payFrom').value;
    const to   = document.getElementById('payTo').value;
    if (!from||!to) { showPAlert('payReqAlert','Please select a date range.','err'); return; }
    const btn = document.getElementById('reqPayBtn');
    btn.disabled = true;
    try {
      const res = await fetch('/payouts/request', { method:'POST', headers, body:JSON.stringify({from_date:from,to_date:to}) });
      const d   = await res.json();
      if (!res.ok) throw new Error(d.error||'Request failed');
      showPAlert('payReqAlert', `✅ Payout of ₹${Number(d.amount).toLocaleString('en-IN',{maximumFractionDigits:2})} requested for ${d.booking_count} booking(s)!`, 'ok');
      loadPayoutHistory();
    } catch(e) { showPAlert('payReqAlert', e.message, 'err'); }
    finally { btn.disabled = false; }
  }

  async function loadPayoutHistory() {
    try {
      const res = await fetch('/payouts/organizer', { headers });
      if (!res.ok) { document.getElementById('payoutHistory').innerHTML='<p style="color:var(--danger);font-size:.88rem">Failed to load.</p>'; return; }
      const payouts = await res.json();
      if (!payouts.length) { document.getElementById('payoutHistory').innerHTML='<p style="color:var(--muted);font-size:.88rem">No payout requests yet.</p>'; return; }
      document.getElementById('payoutHistory').innerHTML =
        `<table class="p-table"><thead><tr><th>#</th><th>Period</th><th>Amount</th><th>Bookings</th><th>Status</th><th>Requested</th></tr></thead>
        <tbody>${payouts.map(p=>`
          <tr>
            <td>#${p.id}</td>
            <td style="font-size:.82rem">${p.from_date} → ${p.to_date}</td>
            <td style="font-weight:700;color:var(--success)">₹${Number(p.amount).toLocaleString('en-IN',{maximumFractionDigits:2})}</td>
            <td>${p.booking_count}</td>
            <td><span class="p-badge ${p.status}">${p.status.toUpperCase()}</span></td>
            <td style="font-size:.82rem">${new Date(p.requested_at).toLocaleDateString('en-IN')}</td>
          </tr>`).join('')}
        </tbody></table>`;
    } catch { document.getElementById('payoutHistory').innerHTML='<p style="color:var(--danger);font-size:.88rem">Error loading history.</p>'; }
  }

  function showPAlert(id,msg,type) {
    const el=document.getElementById(id); el.textContent=msg; el.className='p-alert '+type;
    setTimeout(()=>{ el.className='p-alert'; },5000);
  }

  async function loadRevenue() {
    try {
      const res = await fetch("/organizer/revenue", { headers });
      if (res.status === 401) { sessionStorage.clear(); window.location.replace("/"); return; }
      if (res.status === 403) {
        document.getElementById("revenueList").innerHTML = "<p style='color:#fcd34d;text-align:center;padding:2rem;'>Your organizer account is pending admin approval. Revenue data will be available once approved.</p>";
        return;
      }
      let events;
      try { events = await res.json(); } catch(e) {
        document.getElementById("revenueList").innerHTML = "<p style='color:#fca5a5;text-align:center;padding:2rem;'>Failed to load revenue data. Check backend logs.</p>";
        return;
      }

      if (!events.length) {
        document.getElementById("revenueList").innerHTML = `
          <div class="empty-state">
            <div class="icon">💰</div>
            <p>No paid bookings yet. Revenue will appear here once tickets are sold.</p>
          </div>`;
        // Zero out summary
        ["sumEvents","sumBookings","sumTickets","sumRevenue"].forEach(id =>
          document.getElementById(id).textContent = id === "sumRevenue" ? "₹0" : "0"
        );
        return;
      }

      // Compute summary totals
      let totalRevenue = 0, totalBookings = 0, totalTickets = 0;
      events.forEach(ev => {
        (ev.bookings || []).forEach(b => {
          totalRevenue  += b.total_paid        || 0;
          totalBookings += 1;
          totalTickets  += b.tickets_booked    || 0;
        });
      });

      document.getElementById("sumEvents").textContent   = events.length;
      document.getElementById("sumBookings").textContent = totalBookings;
      document.getElementById("sumTickets").textContent  = totalTickets;
      document.getElementById("sumRevenue").textContent  = `₹${totalRevenue.toLocaleString("en-IN", { maximumFractionDigits: 2 })}`;

      // Per-event cards
      document.getElementById("revenueList").innerHTML = events.map((ev, i) => {
        const bookings    = ev.bookings || [];
        const evRevenue   = bookings.reduce((s, b) => s + (b.total_paid || 0), 0);
        const evTickets   = bookings.reduce((s, b) => s + (b.tickets_booked || 0), 0);
        const evDate      = new Date(ev.event_date).toLocaleDateString("en-IN", { day:"2-digit", month:"short", year:"numeric" });

        return `
          <div class="event-card">
            <div class="event-card-header" onclick="toggleBookings(${i})">
              <div>
                <div class="event-title">${escHtml(ev.title)}</div>
                <div class="event-meta">${evDate}${ev.location ? " · " + escHtml(ev.location) : ""} · ${ev.category}</div>
              </div>
              <div style="display:flex;align-items:center;gap:1.5rem;">
                <div class="event-totals">
                  <div class="event-revenue">₹${evRevenue.toLocaleString("en-IN", { maximumFractionDigits: 2 })}</div>
                  <div class="event-tickets">${evTickets} ticket(s) sold · ${bookings.length} booking(s)</div>
                </div>
                <span class="chevron" id="chevron-${i}">▼</span>
              </div>
            </div>
            <div class="bookings-table-wrap" id="bookings-${i}">
              <table>
                <thead>
                  <tr>
                    <th>Booking #</th>
                    <th>Tickets</th>
                    <th>Ticket Amount</th>
                    <th>Conv. Fee</th>
                    <th>GST</th>
                    <th>Total Paid</th>
                    <th>Date</th>
                  </tr>
                </thead>
                <tbody>
                  ${bookings.map(b => `
                    <tr>
                      <td>#${b.id}</td>
                      <td>${b.tickets_booked}</td>
                      <td>₹${Number(b.ticket_amount).toLocaleString("en-IN")}</td>
                      <td>₹${Number(b.convenience_fee).toLocaleString("en-IN")}</td>
                      <td>₹${Number(b.gst_amount).toLocaleString("en-IN")}</td>
                      <td style="font-weight:700;color:var(--success)">₹${Number(b.total_paid).toLocaleString("en-IN")}</td>
                      <td>${new Date(b.booking_date).toLocaleDateString("en-IN")}</td>
                    </tr>`).join("")}
                </tbody>
              </table>
            </div>
          </div>`;
      }).join("");

    } catch (err) {
      console.error(err);
      document.getElementById("revenueList").innerHTML = "<p style='color:#fca5a5;text-align:center;padding:2rem;'>Failed to load revenue data.</p>";
    }
  }

  function toggleBookings(i) {
    const wrap    = document.getElementById(`bookings-${i}`);
    const chevron = document.getElementById(`chevron-${i}`);
    const isOpen  = wrap.classList.contains("open");
    wrap.classList.toggle("open", !isOpen);
    chevron.classList.toggle("open", !isOpen);
  }

  function escHtml(str) {
    return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  document.getElementById("logoutBtn").addEventListener("click", async () => {
    await fetch("/auth/logout", { method: "POST", headers });
    sessionStorage.clear();
    window.location.href = "/";
  });

  loadRevenue();
  loadPayoutProfile();
  loadPayoutHistory();
</script>
</body>
</html>
