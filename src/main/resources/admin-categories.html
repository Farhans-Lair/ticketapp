<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TicketVerse — Category Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --gold:#f5c842; --bg:#0a0a14; --card:rgba(255,255,255,0.04);
      --border:rgba(255,255,255,0.09); --text:#f0eee8;
      --muted:rgba(240,238,232,0.5); --accent:#7c6af7;
      --green:#42e695; --red:#f74a6a; --input-bg:rgba(255,255,255,0.05);
    }
    html,body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100%; }
    #bg-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }
    .app { position:relative; z-index:1; max-width:900px; margin:0 auto; padding:36px 24px 80px; }

    /* TOPBAR */
    .topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:40px; padding-bottom:20px; border-bottom:1px solid var(--border); flex-wrap:wrap; gap:10px; }
    .logo-wrap { display:flex; align-items:center; gap:10px; }
    .logo { font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:900; color:var(--gold); }
    .admin-badge { padding:3px 10px; border-radius:20px; background:rgba(124,106,247,0.15); border:1px solid rgba(124,106,247,0.3); color:var(--accent); font-size:0.72rem; font-weight:700; letter-spacing:0.08em; }
    .nav-actions { display:flex; gap:8px; flex-wrap:wrap; }
    .btn-ghost { padding:8px 18px; background:var(--card); border:1px solid var(--border); border-radius:10px; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:0.84rem; cursor:pointer; transition:all .2s; text-decoration:none; display:inline-flex; align-items:center; }
    .btn-ghost:hover { background:rgba(255,255,255,.08); color:var(--text); }

    /* SECTION */
    .section-title { font-family:'Playfair Display',serif; font-size:1.3rem; font-weight:700; margin-bottom:6px; }
    .section-sub   { font-size:.84rem; color:var(--muted); margin-bottom:24px; }

    /* CREATE FORM */
    .create-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:22px 24px; margin-bottom:36px; }
    .create-card h3 { font-size:1rem; font-weight:700; margin-bottom:18px; color:var(--accent); }
    .form-row { display:grid; grid-template-columns:1fr 90px 1fr 80px; gap:12px; align-items:end; flex-wrap:wrap; }
    @media(max-width:640px){ .form-row { grid-template-columns:1fr 1fr; } }
    .fg label { display:block; font-size:.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; margin-bottom:6px; }
    .fg input  { width:100%; padding:10px 13px; background:var(--input-bg); border:1px solid var(--border); border-radius:9px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:.92rem; }
    .fg input:focus { outline:none; border-color:rgba(124,106,247,.5); }
    .btn-create { padding:10px 22px; background:var(--accent); border:none; border-radius:9px; color:#fff; font-family:'DM Sans',sans-serif; font-size:.9rem; font-weight:700; cursor:pointer; transition:opacity .2s; white-space:nowrap; }
    .btn-create:hover { opacity:.88; }
    .btn-create:disabled { opacity:.5; cursor:not-allowed; }

    /* ALERT */
    .alert { padding:10px 14px; border-radius:10px; font-size:.87rem; margin-bottom:18px; display:none; }
    .alert.success { background:rgba(66,230,149,.08); border:1px solid rgba(66,230,149,.25); color:var(--green); display:block; }
    .alert.error   { background:rgba(247,74,106,.08); border:1px solid rgba(247,74,106,.25); color:var(--red);   display:block; }

    /* TABLE */
    .table-card { background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
    .table-head { display:flex; align-items:center; justify-content:space-between; padding:18px 22px 14px; }
    .table-head h3 { font-size:1rem; font-weight:700; }
    .count-pill { background:rgba(124,106,247,.12); border:1px solid rgba(124,106,247,.25); color:var(--accent); padding:3px 12px; border-radius:20px; font-size:.72rem; font-weight:700; }
    table { width:100%; border-collapse:collapse; }
    th { padding:10px 16px; text-align:left; font-size:.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; border-bottom:1px solid var(--border); }
    td { padding:12px 16px; font-size:.9rem; border-bottom:1px solid rgba(255,255,255,.05); vertical-align:middle; }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:rgba(255,255,255,.02); }

    /* TOGGLE BADGE */
    .active-badge   { padding:3px 10px; border-radius:20px; font-size:.7rem; font-weight:700; background:rgba(66,230,149,.1); border:1px solid rgba(66,230,149,.25); color:var(--green); }
    .inactive-badge { padding:3px 10px; border-radius:20px; font-size:.7rem; font-weight:700; background:rgba(247,74,106,.1); border:1px solid rgba(247,74,106,.22); color:var(--red); }

    /* ACTION BUTTONS */
    .act-wrap { display:flex; gap:6px; flex-wrap:wrap; }
    .btn-sm { padding:5px 13px; border-radius:7px; font-family:'DM Sans',sans-serif; font-size:.78rem; font-weight:600; cursor:pointer; border:1px solid; transition:all .18s; }
    .btn-edit   { background:rgba(124,106,247,.1); border-color:rgba(124,106,247,.3); color:var(--accent); }
    .btn-edit:hover { background:rgba(124,106,247,.22); }
    .btn-toggle { background:rgba(245,200,66,.08); border-color:rgba(245,200,66,.25); color:var(--gold); }
    .btn-toggle:hover { background:rgba(245,200,66,.18); }
    .btn-del    { background:rgba(247,74,106,.1); border-color:rgba(247,74,106,.22); color:var(--red); }
    .btn-del:hover { background:rgba(247,74,106,.22); }

    /* INLINE EDIT ROW */
    .edit-row { display:none; background:rgba(124,106,247,.05); }
    .edit-row.open { display:table-row; }
    .edit-inner { padding:14px 16px; display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; }
    .edit-inner input { padding:8px 11px; background:var(--input-bg); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:.88rem; }
    .edit-inner input:focus { outline:none; border-color:rgba(124,106,247,.5); }
    .btn-save-edit { padding:8px 18px; background:var(--accent); border:none; border-radius:8px; color:#fff; font-size:.85rem; font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif; }
    .btn-cancel-edit { padding:8px 16px; background:var(--card); border:1px solid var(--border); border-radius:8px; color:var(--muted); font-size:.85rem; cursor:pointer; font-family:'DM Sans',sans-serif; }

    /* EMPTY */
    .empty-state { text-align:center; padding:52px 20px; color:var(--muted); }
    .empty-state .icon { font-size:3rem; margin-bottom:12px; }
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<div class="app">
  <div class="topbar">
    <div class="logo-wrap">
      <span class="logo">TicketVerse</span>
      <span class="admin-badge">ADMIN</span>
    </div>
    <div class="nav-actions">
      <a class="btn-ghost" href="/admin">← Dashboard</a>
      <a class="btn-ghost" href="/admin-revenue">💰 Revenue</a>
      <button class="btn-ghost" id="logoutBtn">Logout</button>
    </div>
  </div>

  <p class="section-title">🏷️ Category Management</p>
  <p class="section-sub">Create and manage event categories. Changes appear immediately in the organizer event form.</p>

  <div id="mainAlert" class="alert"></div>

  <!-- CREATE -->
  <div class="create-card">
    <h3>+ New Category</h3>
    <div class="form-row">
      <div class="fg">
        <label>Name *</label>
        <input id="newName" type="text" placeholder="e.g. Live Music" maxlength="100" />
      </div>
      <div class="fg">
        <label>Icon emoji</label>
        <input id="newEmoji" type="text" placeholder="🎵" maxlength="6" />
      </div>
      <div class="fg">
        <label>Image URL</label>
        <input id="newImage" type="url" placeholder="https://…" />
      </div>
      <div class="fg">
        <label>Sort order</label>
        <input id="newSort" type="number" value="0" min="0" />
      </div>
    </div>
    <div style="margin-top:14px; text-align:right;">
      <button class="btn-create" id="createBtn" onclick="createCategory()">Create Category</button>
    </div>
  </div>

  <!-- CATEGORY TABLE -->
  <div class="table-card">
    <div class="table-head">
      <h3>All Categories</h3>
      <span class="count-pill" id="count-pill">Loading…</span>
    </div>
    <div id="table-wrap">
      <p style="text-align:center;padding:40px;color:var(--muted);">Loading…</p>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth-channel.js"></script>
<script>
  const token = sessionStorage.getItem('token');
  if (!token) window.location.replace('/');
  const role  = sessionStorage.getItem('role');
  if (role !== 'admin') { alert('Admins only'); window.location.replace('/'); }
  const H = { 'Content-Type':'application/json', 'Authorization':`Bearer ${token}` };

  // ── Alert helper ────────────────────────────────────────────────────────────
  function showAlert(msg, type) {
    const el = document.getElementById('mainAlert');
    el.textContent = msg; el.className = 'alert ' + type;
    window.scrollTo({ top: 0, behavior: 'smooth' });
    setTimeout(() => { el.className = 'alert'; el.textContent = ''; }, 4500);
  }

  // ── Load & render categories ─────────────────────────────────────────────────
  async function loadCategories() {
    try {
      const res  = await fetch('/admin/categories', { headers: H });
      if (res.status === 401) { sessionStorage.clear(); window.location.replace('/'); return; }
      const cats = await res.json();
      document.getElementById('count-pill').textContent = cats.length + ' total';
      renderTable(cats);
    } catch (e) {
      document.getElementById('table-wrap').innerHTML =
        '<p style="text-align:center;padding:40px;color:var(--red);">Failed to load categories.</p>';
    }
  }

  function renderTable(cats) {
    const wrap = document.getElementById('table-wrap');
    if (!cats.length) {
      wrap.innerHTML = '<div class="empty-state"><div class="icon">🏷️</div><p>No categories yet. Create the first one above.</p></div>';
      return;
    }
    const tbody = cats.map(c => `
      <tr id="row-${c.id}">
        <td style="width:50px;font-size:1.4rem;text-align:center;">${esc(c.icon_emoji||'🎟️')}</td>
        <td><strong>${esc(c.name)}</strong><br><span style="font-size:.75rem;color:var(--muted);">${esc(c.slug)}</span></td>
        <td style="font-size:.8rem;color:var(--muted);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${c.image_url ? `<a href="${esc(c.image_url)}" target="_blank" style="color:var(--accent);">View</a>` : '—'}</td>
        <td style="text-align:center;">${c.sort_order ?? 0}</td>
        <td><span class="${c.is_active ? 'active-badge' : 'inactive-badge'}">${c.is_active ? 'Active' : 'Inactive'}</span></td>
        <td class="act-wrap">
          <button class="btn-sm btn-edit" onclick="openEdit(${c.id},'${esc(c.name)}','${esc(c.icon_emoji||'')}','${esc(c.image_url||'')}',${c.sort_order||0})">Edit</button>
          <button class="btn-sm btn-toggle" onclick="toggleActive(${c.id},${!c.is_active})">${c.is_active ? 'Deactivate' : 'Activate'}</button>
          <button class="btn-sm btn-del" onclick="deleteCategory(${c.id},'${esc(c.name)}')">Delete</button>
        </td>
      </tr>
      <tr class="edit-row" id="edit-row-${c.id}">
        <td colspan="6"><div class="edit-inner">
          <div><label style="font-size:.7rem;color:var(--muted);display:block;margin-bottom:4px;">Name</label>
               <input id="ename-${c.id}" type="text" maxlength="100" /></div>
          <div><label style="font-size:.7rem;color:var(--muted);display:block;margin-bottom:4px;">Icon emoji</label>
               <input id="eemoji-${c.id}" type="text" maxlength="6" style="width:70px;" /></div>
          <div><label style="font-size:.7rem;color:var(--muted);display:block;margin-bottom:4px;">Image URL</label>
               <input id="eimg-${c.id}" type="url" style="width:220px;" /></div>
          <div><label style="font-size:.7rem;color:var(--muted);display:block;margin-bottom:4px;">Sort order</label>
               <input id="esort-${c.id}" type="number" style="width:70px;" /></div>
          <button class="btn-save-edit" onclick="saveEdit(${c.id})">Save</button>
          <button class="btn-cancel-edit" onclick="closeEdit(${c.id})">Cancel</button>
        </div></td>
      </tr>`).join('');

    wrap.innerHTML = `<table>
      <thead><tr>
        <th style="width:50px;"></th>
        <th>Name / Slug</th>
        <th>Image</th>
        <th style="text-align:center;">Order</th>
        <th>Status</th>
        <th>Actions</th>
      </tr></thead>
      <tbody>${tbody}</tbody>
    </table>`;
  }

  // ── Create ──────────────────────────────────────────────────────────────────
  async function createCategory() {
    const name  = document.getElementById('newName').value.trim();
    const emoji = document.getElementById('newEmoji').value.trim() || '🎟️';
    const image = document.getElementById('newImage').value.trim() || null;
    const sort  = parseInt(document.getElementById('newSort').value) || 0;
    if (!name) { showAlert('Name is required.', 'error'); return; }
    const btn = document.getElementById('createBtn');
    btn.disabled = true; btn.textContent = 'Creating…';
    try {
      const res  = await fetch('/admin/categories', {
        method: 'POST', headers: H,
        body: JSON.stringify({ name, icon_emoji: emoji, image_url: image, sort_order: sort })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Create failed');
      showAlert(`Category "${name}" created!`, 'success');
      document.getElementById('newName').value  = '';
      document.getElementById('newEmoji').value = '';
      document.getElementById('newImage').value = '';
      document.getElementById('newSort').value  = '0';
      loadCategories();
    } catch (e) { showAlert(e.message || 'Failed.', 'error'); }
    finally { btn.disabled = false; btn.textContent = 'Create Category'; }
  }

  // ── Inline edit ──────────────────────────────────────────────────────────────
  function openEdit(id, name, emoji, image, sort) {
    document.getElementById(`ename-${id}`).value  = name;
    document.getElementById(`eemoji-${id}`).value = emoji;
    document.getElementById(`eimg-${id}`).value   = image;
    document.getElementById(`esort-${id}`).value  = sort;
    document.getElementById(`edit-row-${id}`).classList.add('open');
    document.getElementById(`ename-${id}`).focus();
  }
  function closeEdit(id) {
    document.getElementById(`edit-row-${id}`).classList.remove('open');
  }
  async function saveEdit(id) {
    const name  = document.getElementById(`ename-${id}`).value.trim();
    const emoji = document.getElementById(`eemoji-${id}`).value.trim() || '🎟️';
    const image = document.getElementById(`eimg-${id}`).value.trim() || null;
    const sort  = parseInt(document.getElementById(`esort-${id}`).value) || 0;
    if (!name) { showAlert('Name cannot be empty.', 'error'); return; }
    try {
      const res  = await fetch(`/admin/categories/${id}`, {
        method: 'PUT', headers: H,
        body: JSON.stringify({ name, icon_emoji: emoji, image_url: image, sort_order: sort })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Update failed');
      showAlert('Category updated!', 'success');
      loadCategories();
    } catch (e) { showAlert(e.message || 'Update failed.', 'error'); }
  }

  // ── Toggle active ────────────────────────────────────────────────────────────
  async function toggleActive(id, newState) {
    try {
      const res  = await fetch(`/admin/categories/${id}`, {
        method: 'PUT', headers: H,
        body: JSON.stringify({ is_active: newState })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Toggle failed');
      loadCategories();
    } catch (e) { showAlert(e.message || 'Toggle failed.', 'error'); }
  }

  // ── Delete ──────────────────────────────────────────────────────────────────
  async function deleteCategory(id, name) {
    if (!confirm(`Delete category "${name}"? This cannot be undone.`)) return;
    try {
      const res  = await fetch(`/admin/categories/${id}`, { method: 'DELETE', headers: H });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Delete failed');
      showAlert(`"${name}" deleted.`, 'success');
      loadCategories();
    } catch (e) { showAlert(e.message || 'Delete failed.', 'error'); }
  }

  // ── Logout ──────────────────────────────────────────────────────────────────
  document.getElementById('logoutBtn').addEventListener('click', () => {
    fetch('/auth/logout', { method:'POST', credentials:'include' })
      .finally(() => { sessionStorage.clear(); window.location.replace('/'); });
  });

  // ── XSS escape helper ────────────────────────────────────────────────────────
  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // ── Background canvas ────────────────────────────────────────────────────────
  const canvas=document.getElementById('bg-canvas'),ctx=canvas.getContext('2d');
  let W,H2;
  function resize(){W=canvas.width=window.innerWidth;H2=canvas.height=window.innerHeight;}
  window.addEventListener('resize',resize);resize();
  const stars=Array.from({length:140},()=>({x:Math.random()*5000,y:Math.random()*5000,r:Math.random()*1.1+.2,a:Math.random(),da:(Math.random()*.006+.002)*(Math.random()>.5?1:-1)}));
  (function draw(){ctx.clearRect(0,0,W,H2);ctx.fillStyle='#0a0a14';ctx.fillRect(0,0,W,H2);
    stars.forEach(s=>{s.a+=s.da;if(s.a>1||s.a<0)s.da*=-1;ctx.beginPath();ctx.arc(s.x%W,s.y%H2,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${Math.max(0,s.a)*.4})`;ctx.fill();});
    requestAnimationFrame(draw);})();

  loadCategories();
</script>
</body>
</html>
