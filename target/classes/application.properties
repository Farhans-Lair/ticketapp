# ── Server ──────────────────────────────────────────────────
server.port=8080
# Secondary HTTP port used by HttpsConfig.java when USE_HTTPS=true (local dev only)
# Maps to server.http.port in HttpsConfig @Value — must be present to avoid injection failure
server.http.port=${SERVER_HTTP_PORT:8080}

# Disable Spring Boot's default favicon handling.
# Without this, every page load triggers GET /favicon.ico which Spring cannot
# serve (no favicon.ico in static resources), causing a 500 Internal Server Error.
# That 500 corrupts Tomcat's response pipeline and triggers ERR_INCOMPLETE_CHUNKED_ENCODING
# on subsequent requests in the same connection. Disabling it returns 404 cleanly instead.
spring.mvc.favicon.enabled=false

# ── Database ─────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── JWT ───────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:changeme-use-a-long-random-secret-in-production}
jwt.expiration-ms=3600000

# ── Cookie ───────────────────────────────────────────────────
cookie.secure=${COOKIE_SECURE:false}

# ── Mail ─────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USER:}
spring.mail.password=${EMAIL_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Admin Email ───────────────────────────────────────────────
# Receives a notification whenever a new organizer application is submitted.
# Leave blank (default) to disable admin notifications.
# Set ADMIN_EMAIL=admin@yoursite.com in production .env
admin.email=${ADMIN_EMAIL:}

# ── AWS S3 ───────────────────────────────────────────────────
aws.region=${AWS_REGION:ap-south-1}
aws.access-key=${AWS_ACCESS_KEY_ID:}
aws.secret-key=${AWS_SECRET_ACCESS_KEY:}
aws.s3.bucket=${S3_BUCKET_NAME:}

# ── Redis (OTP store) ─────────────────────────────────────────
# OTPs are now stored in Redis instead of an in-memory ConcurrentHashMap.
# Redis fixes two problems with the old approach:
#   1. OTPs were lost on every application restart.
#   2. Multiple running instances each had isolated maps — OTPs generated on
#      instance A could not be verified on instance B (AWS ASG / ECS).
# Local dev: Redis runs as a Docker Compose service (see docker-compose.yml).
# Production: point REDIS_HOST at your ElastiCache endpoint.
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
# Default to null (not empty string) so Lettuce never sends AUTH "" to a
# password-free Redis instance. Some Redis 7+ builds reject empty-string AUTH.
spring.data.redis.password=${REDIS_PASSWORD:#{null}}

# ── Razorpay ─────────────────────────────────────────────────
razorpay.key-id=${RAZORPAY_KEY_ID:}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:}

# ── CORS / Frontend ──────────────────────────────────────────
frontend.url=${FRONTEND_URL:http://localhost:8080}

# ── Jackson ──────────────────────────────────────────────────
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false
spring.jackson.default-property-inclusion=non_null
# Dates as ISO-8601 strings, not timestamps
spring.jackson.serialization.write-dates-as-timestamps=false

# ── Logging ──────────────────────────────────────────────────
logging.level.com.ticketapp=INFO
logging.level.org.springframework.security=WARN
# Enable this to see the exact exception causing ERR_INCOMPLETE_CHUNKED_ENCODING:
# logging.level.org.springframework.web.servlet.mvc.support=DEBUG

# ── Structured JSON Logging ───────────────────────────────────
# Activate the "json" Spring profile to switch from plain-text console output
# to structured JSON logs (one JSON object per line).
# In production (EC2 / Docker): set SPRING_PROFILES_ACTIVE=json in .env
# Locally: leave unset — plain readable logs are used by default.
# JSON fields emitted: timestamp, level, logger, thread, message,
#   correlationId, userId, method, path, traceId, spanId
# See: src/main/resources/logback-spring.xml

spring.config.import=optional:file:.env

# ── Rate Limiting (Bucket4j) ──────────────────────────────────
# Token-bucket rate limiting is applied to all /auth/* endpoints.
# Limits: 10 requests per 60 seconds per client IP.
# Configured in: com.ticketapp.config.RateLimitFilter
# Response on breach: HTTP 429 with Retry-After header.
# For multi-instance deployments, replace the in-memory ConcurrentHashMap
# with a Bucket4j + Redisson (Redis / ElastiCache) backend.


# ── HTTPS / SSL ───────────────────────────────────────────────────────────────
# Set USE_HTTPS=true in .env for local dev with mkcert certificates.
# On AWS (behind ALB), leave as false — TLS is terminated at the ALB.
# When true, Spring Boot's embedded Tomcat serves HTTPS on server.ssl.port.
server.ssl.enabled=${USE_HTTPS:false}
server.ssl.key-store-type=${SSL_KEYSTORE_TYPE:PKCS12}
server.ssl.key-store=${SSL_KEYSTORE_PATH:classpath:certs/keystore.p12}
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD:changeit}
server.ssl.key-alias=${SSL_KEY_ALIAS:1}

# ── Cancellation / Refund ─────────────────────────────────────────────────────

# 5% cancellation fee rate (of ticket + convenience fee)
cancellation.fee-rate=0.05
# 5% GST on cancellation fee
cancellation.fee-gst-rate=0.05
# Hours cutoff for high-tier (full) refund
cancellation.high-tier-hours=72

# ── Multipart (event image upload) ───────────────────────────
# Used by POST /api/images/upload in ImageController.
# 5 MB per file is generous for any reasonably-compressed event photo.
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
