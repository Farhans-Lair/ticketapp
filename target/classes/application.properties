# ── Server ──────────────────────────────────────────────────
server.port=3000

# ── Database ─────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ticketdb}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────
# validate: checks schema matches entities (safe for production)
# update:  auto-alters schema to match entities (handy for dev)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── JWT ───────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:changeme-use-a-long-random-secret-in-production}
jwt.expiration-ms=3600000

# ── Cookie ───────────────────────────────────────────────────
cookie.secure=${COOKIE_SECURE:false}

# ── Mail ─────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USER:}
spring.mail.password=${EMAIL_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── AWS S3 ───────────────────────────────────────────────────
aws.region=${AWS_REGION:ap-south-1}
aws.access-key=${AWS_ACCESS_KEY_ID:}
aws.secret-key=${AWS_SECRET_ACCESS_KEY:}
aws.s3.bucket=${S3_BUCKET_NAME:}

# ── Razorpay ─────────────────────────────────────────────────
razorpay.key-id=${RAZORPAY_KEY_ID:}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:}

# ── CORS / Frontend ──────────────────────────────────────────
frontend.url=${FRONTEND_URL:http://localhost:3000}

# ── Jackson ──────────────────────────────────────────────────
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false
spring.jackson.default-property-inclusion=non_null

# ── Logging ──────────────────────────────────────────────────
logging.level.com.ticketapp=INFO
logging.level.org.springframework.security=WARN
