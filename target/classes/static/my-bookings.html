<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TicketVerse — My Bookings</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --gold:#f5c842; --bg:#0a0a14;
      --card:rgba(255,255,255,0.04); --border:rgba(255,255,255,0.09);
      --text:#f0eee8; --muted:rgba(240,238,232,0.5);
      --accent:#7c6af7; --red:#f74a6a; --green:#42e695; --orange:#ff9f43;
    }
    html,body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100%; }
    #bg-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }
    .app { position:relative; z-index:1; max-width:820px; margin:0 auto; padding:36px 28px 80px; }

    /* TOPBAR */
    .topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:44px; padding-bottom:20px; border-bottom:1px solid var(--border); }
    .logo { font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:900; color:var(--gold); }
    .nav-actions { display:flex; gap:10px; }
    .btn-ghost { padding:9px 20px; background:var(--card); border:1px solid var(--border); border-radius:10px; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:0.85rem; cursor:pointer; transition:all 0.2s; backdrop-filter:blur(8px); }
    .btn-ghost:hover { background:rgba(255,255,255,0.09); color:var(--text); }

    /* PAGE HEADER */
    .page-header { margin-bottom:36px; }
    .page-header h1 { font-family:'Playfair Display',serif; font-size:clamp(2rem,4vw,2.8rem); font-weight:900; margin-bottom:8px; }
    .page-header h1 em { font-style:normal; background:linear-gradient(135deg,var(--gold),var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .page-header p { font-size:0.92rem; color:var(--muted); }

    /* BOOKING CARDS — no padding so image bleeds to edges */
    #bookings-list { display:flex; flex-direction:column; gap:20px; }
    .booking-card {
      background:var(--card); border:1px solid var(--border);
      border-radius:18px; overflow:hidden;
      backdrop-filter:blur(16px);
      box-shadow:0 8px 32px rgba(0,0,0,0.25);
      animation:card-in 0.45s cubic-bezier(0.16,1,0.3,1) both;
      transition:transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    .booking-card:hover { transform:translateY(-3px); box-shadow:0 16px 44px rgba(0,0,0,0.35); border-color:rgba(255,255,255,0.15); }
    @keyframes card-in { from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);} }

    /* Colored left border by status */
    .booking-card.status-paid    { border-left:3px solid var(--green); }
    .booking-card.status-pending { border-left:3px solid var(--orange); }
    .booking-card.status-failed  { border-left:3px solid var(--red); }

    /* ── MAIN EVENT IMAGE ── */
    .booking-main-img {
      width:100%; height:180px; overflow:hidden;
      position:relative; flex-shrink:0;
    }
    .booking-main-img img {
      width:100%; height:100%; object-fit:cover; display:block;
      transition:transform 0.4s ease;
    }
    .booking-card:hover .booking-main-img img { transform:scale(1.04); }
    /* gradient fade at bottom so header text is readable */
    .booking-main-img::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(to bottom, transparent 40%, rgba(10,10,20,0.75) 100%);
    }
    /* no-image placeholder */
    .booking-main-img .no-img {
      width:100%; height:100%;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:8px; background:rgba(255,255,255,0.03); color:var(--muted); font-size:0.82rem;
    }
    .booking-main-img .no-img span { font-size:2rem; opacity:0.3; }

    .card-header {
      display:flex; align-items:flex-start; justify-content:space-between;
      padding:18px 24px 14px; flex-wrap:wrap; gap:10px;
      border-bottom:1px solid var(--border);
    }
    .event-name { font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:700; margin-bottom:4px; }
    .event-date { font-size:0.82rem; color:var(--muted); }

    .status-badge { padding:5px 14px; border-radius:20px; font-size:0.75rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; }
    .status-badge.paid    { background:rgba(66,230,149,0.12); color:var(--green); border:1px solid rgba(66,230,149,0.25); }
    .status-badge.pending { background:rgba(255,159,67,0.12); color:var(--orange); border:1px solid rgba(255,159,67,0.25); }
    .status-badge.failed  { background:rgba(247,74,106,0.1); color:var(--red); border:1px solid rgba(247,74,106,0.22); }

    .card-body { padding:20px 24px; }

    .info-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px; margin-bottom:18px; }
    .info-item { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); border-radius:10px; padding:10px 14px; }
    .info-item .label { font-size:0.7rem; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:0.07em; margin-bottom:4px; }
    .info-item .value { font-size:0.92rem; font-weight:600; color:var(--text); }
    .info-item .value.gold { color:var(--gold); }

    .seats-row { margin-bottom:16px; }
    .seats-row .label { font-size:0.72rem; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:0.07em; margin-bottom:8px; }
    .seat-tags { display:flex; flex-wrap:wrap; gap:6px; }
    .seat-tag { padding:4px 12px; border-radius:8px; background:rgba(124,106,247,0.12); border:1px solid rgba(124,106,247,0.22); color:var(--accent); font-size:0.8rem; font-weight:600; }

    .payment-id { font-size:0.78rem; color:var(--muted); font-family:monospace; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:8px; padding:8px 12px; margin-bottom:16px; word-break:break-all; }

    .download-btn { display:inline-flex; align-items:center; gap:8px; padding:11px 22px; border-radius:11px; background:linear-gradient(135deg,var(--green),#3bb78f); color:#0a0a14; font-family:'DM Sans',sans-serif; font-size:0.88rem; font-weight:700; text-decoration:none; cursor:pointer; border:none; transition:transform 0.15s, box-shadow 0.2s; box-shadow:0 4px 16px rgba(66,230,149,0.25); }
    .download-btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(66,230,149,0.38); }

    .empty-state { text-align:center; padding:80px 20px; }
    .empty-state .emoji { font-size:3.5rem; margin-bottom:16px; }
    .empty-state h3 { font-family:'Playfair Display',serif; font-size:1.4rem; margin-bottom:8px; }
    .empty-state p { color:var(--muted); font-size:0.9rem; }

    @media(max-width:500px){ .info-grid{grid-template-columns:1fr 1fr;} }
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<div class="app">
  <div class="topbar">
    <span class="logo">TicketVerse</span>
    <div class="nav-actions">
      <button class="btn-ghost" onclick="goBack()">← Back to Events</button>
      <button class="btn-ghost" id="logoutBtn">Logout</button>
    </div>
  </div>

  <div class="page-header">
    <h1>My <em>Bookings</em></h1>
    <p>All your tickets and reservations in one place</p>
  </div>

  <div id="bookings-list"></div>
</div>

<script>
/* Canvas BG */
const canvas=document.getElementById('bg-canvas'),ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();
const stars=Array.from({length:200},()=>({x:Math.random()*5000,y:Math.random()*5000,r:Math.random()*1.1+.2,a:Math.random(),da:(Math.random()*.007+.002)*(Math.random()>.5?1:-1)}));
const pts=Array.from({length:70},()=>({x:Math.random()*W||600,y:Math.random()*H||400,r:Math.random()*1.8+.3,speed:Math.random()*.35+.12,dx:(Math.random()-.5)*.25,alpha:Math.random()*.35+.1,fadeDir:1,col:['rgba(245,200,66,','rgba(124,106,247,','rgba(66,230,149,'][Math.floor(Math.random()*3)]}));
function draw(){
  ctx.clearRect(0,0,W,H);
  const g=ctx.createLinearGradient(0,0,W,H);g.addColorStop(0,'#0a0a14');g.addColorStop(1,'#0d0d22');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  [[.8,.2,300,'rgba(124,106,247,0.06)'],[.15,.75,280,'rgba(245,200,66,0.04)'],[.5,.4,200,'rgba(66,230,149,0.03)']].forEach(([ox,oy,r,c])=>{const rg=ctx.createRadialGradient(ox*W,oy*H,0,ox*W,oy*H,r);rg.addColorStop(0,c);rg.addColorStop(1,'transparent');ctx.fillStyle=rg;ctx.fillRect(0,0,W,H);});
  stars.forEach(s=>{s.a+=s.da;if(s.a>1||s.a<0)s.da*=-1;ctx.beginPath();ctx.arc(s.x%W,s.y%H,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${Math.max(0,s.a)*.45})`;ctx.fill();});
  ctx.strokeStyle='rgba(255,255,255,0.016)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=64){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=64){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  pts.forEach(p=>{p.y-=p.speed;p.x+=p.dx;p.alpha+=.003*p.fadeDir;if(p.alpha>.55||p.alpha<.07)p.fadeDir*=-1;if(p.y<-10){p.x=Math.random()*W;p.y=H+10;}ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.col+p.alpha+')';ctx.fill();});
  requestAnimationFrame(draw);
}
draw();
</script>

<script src="/js/api.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  let cookieConflict = false;

  try {
    const session = await apiRequest("/auth/me", "GET");

    // Always store userId from the server — required by auth-channel.js
    // to match logout broadcasts on tabs opened without the login form.
    sessionStorage.setItem("userId", String(session.userId));

    const myUserId = sessionStorage.getItem("userId");

    if (myUserId && String(session.userId) !== myUserId) {
      // Cookie overwritten by another user on a different tab.
      // Do NOT redirect — serve from sessionStorage cache instead.
      cookieConflict = true;
    } else {
      sessionStorage.setItem("role", session.role);
    }
  } catch (err) {
    return; // api.js 401 handler redirects to "/"
  }
  document.getElementById("logoutBtn").addEventListener("click", logout);
  loadBookings(cookieConflict);
});

function _bookingsCacheKey() {
  return 'bookingsCache_' + (sessionStorage.getItem('userId') || 'unknown');
}

function _showConflictBanner() {
  if (document.getElementById('session-conflict-banner')) return;
  const banner = document.createElement('div');
  banner.id = 'session-conflict-banner';
  banner.style.cssText = [
    'background:rgba(245,200,66,0.12)',
    'border:1px solid rgba(245,200,66,0.35)',
    'border-radius:10px',
    'padding:12px 18px',
    'margin-bottom:18px',
    'font-size:0.85rem',
    'color:#f5c842',
    'display:flex',
    'align-items:center',
    'gap:10px',
  ].join(';');
  banner.innerHTML = `
    <span style="font-size:1.1rem">⚠️</span>
    <span>Another user is active in a different tab. Showing your saved bookings —
    they are <strong>your bookings</strong> and have not changed.</span>`;
  const list = document.getElementById('bookings-list');
  list.parentNode.insertBefore(banner, list);
}

async function loadBookings(fromCache = false) {
  const container = document.getElementById('bookings-list');
  const cacheKey  = _bookingsCacheKey();

  if (fromCache) {
    _showConflictBanner();
    const cached = sessionStorage.getItem(cacheKey);
    if (cached) {
      renderBookings(JSON.parse(cached), container);
    } else {
      container.innerHTML = `
        <div class="empty-state">
          <div class="emoji">⚠️</div>
          <h3>Session conflict</h3>
          <p>Another user logged in on a different tab before your bookings could
             be loaded. Please log out and log back in to view your bookings.</p>
        </div>`;
    }
    return;
  }

  try {
    const bookings = await apiRequest("/bookings/my-bookings", "GET", null, true);
    // Cache for this tab — cleared on logout via sessionStorage.clear()
    sessionStorage.setItem(cacheKey, JSON.stringify(bookings));
    renderBookings(bookings, container);
  } catch (err) {
    alert(err.message || "Error loading bookings");
  }
}

function renderBookings(bookings, container) {
  container.innerHTML = "";

  if (!bookings.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="emoji">🎟️</div>
        <h3>No bookings yet</h3>
        <p>Book your first event and it'll appear here.</p>
      </div>`;
    return;
  }

  bookings.forEach((b, i) => {
    const statusClass = b.payment_status === "paid"   ? "paid"
                      : b.payment_status === "failed" ? "failed"
                      : "pending";

    let seatsDisplay = [];
    if (b.selected_seats) {
      try { seatsDisplay = JSON.parse(b.selected_seats); }
      catch (e) { seatsDisplay = [b.selected_seats]; }
    }

    const imgs    = b.Event.images || [];
    const mainImg = imgs[0] || null;
    const imgHTML = mainImg
      ? `<div class="booking-main-img"><img src="${mainImg}" alt="${b.Event.title}" loading="lazy"/></div>`
      : `<div class="booking-main-img"><div class="no-img"><span>🎟️</span>No event image</div></div>`;

    const card = document.createElement("div");
    card.className = `booking-card status-${statusClass}`;
    card.style.animationDelay = `${i * 0.07}s`;

    card.innerHTML = `
      ${imgHTML}
      <div class="card-header">
        <div>
          <div class="event-name">${b.Event.title}</div>
          <div class="event-date">📅 ${new Date(b.Event.event_date).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})}</div>
        </div>
        <span class="status-badge ${statusClass}">${b.payment_status}</span>
      </div>
      <div class="card-body">
        <div class="info-grid">
          <div class="info-item"><div class="label">🎟 Tickets</div><div class="value">${b.tickets_booked}</div></div>
          <div class="info-item"><div class="label">💰 Price/Ticket</div><div class="value">₹${b.Event.price}</div></div>
          <div class="info-item"><div class="label">🏷 Conv. Fee</div><div class="value">₹${b.convenience_fee.toFixed(2)}</div></div>
          <div class="info-item"><div class="label">📊 GST (18%)</div><div class="value">₹${b.gst_amount.toFixed(2)}</div></div>
          <div class="info-item"><div class="label">💳 Total Paid</div><div class="value gold">₹${b.total_paid.toFixed(2)}</div></div>
          <div class="info-item"><div class="label">🕐 Booked On</div><div class="value">${new Date(b.booking_date).toLocaleDateString('en-IN')}</div></div>
        </div>
        ${seatsDisplay.length > 0 ? `
        <div class="seats-row">
          <div class="label">🪑 Seats</div>
          <div class="seat-tags">${seatsDisplay.map(s => `<span class="seat-tag">${s}</span>`).join('')}</div>
        </div>` : ''}
        ${b.razorpay_payment_id && b.razorpay_payment_id !== 'N/A'
          ? `<div class="payment-id">Payment ID: ${b.razorpay_payment_id}</div>` : ''}
        ${b.payment_status === "paid" ? `
        <a href="/bookings/${b.id}/download-ticket"
           onclick="downloadTicket(event,${b.id})"
           class="download-btn">⬇ Download Ticket PDF</a>` : ''}
      </div>`;

    container.appendChild(card);
  });
}

async function downloadTicket(e, bookingId) {
  e.preventDefault();
  try {
    // Direct fetch — must manually attach Authorization header so the backend
    // middleware uses this tab's own JWT, not the shared cookie (which may
    // belong to a different user logged in on another tab).
    const tabToken = sessionStorage.getItem("token");
    const response = await fetch(`/bookings/${bookingId}/download-ticket`, {
      credentials: "include",
      headers: tabToken ? { "Authorization": `Bearer ${tabToken}` } : {}
    });
    if (!response.ok) throw new Error("Failed to download ticket");
    const blob = await response.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = `ticket-${bookingId}.pdf`; a.click();
    URL.revokeObjectURL(url);
  } catch (err) {
    alert("Could not download ticket: " + err.message);
  }
}

function goBack()  { window.location.replace("/events-page"); }
function logout() {
  const userId = sessionStorage.getItem('userId');
  if (window._authChannel && userId) {
    window._authChannel.postMessage({ type: 'LOGOUT', userId });
  }
  fetch("/auth/logout", { method: "POST", credentials: "include" })
    .finally(() => { sessionStorage.clear(); window.location.replace("/"); });
}
</script>
<script src="/js/auth-channel.js"></script>
</body>
</html>
