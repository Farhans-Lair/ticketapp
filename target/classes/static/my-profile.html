<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile — TicketVerse</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0a0a14; --card:rgba(255,255,255,0.04); --border:rgba(255,255,255,0.09);
      --text:#f0eee8; --muted:rgba(240,238,232,0.5); --accent:#7c6af7;
      --green:#42e695; --red:#f74a6a; --gold:#f5c842;
      --input-bg:rgba(255,255,255,0.05);
    }
    html,body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100%; }
    #bg-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }
    .app { position:relative; z-index:1; max-width:560px; margin:0 auto; padding:36px 22px 80px; }

    /* TOPBAR */
    .topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:40px; padding-bottom:20px; border-bottom:1px solid var(--border); flex-wrap:wrap; gap:10px; }
    .logo { font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:900; color:var(--gold); }
    .nav-actions { display:flex; gap:8px; flex-wrap:wrap; }
    .btn-ghost { padding:8px 18px; background:var(--card); border:1px solid var(--border); border-radius:10px; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:0.84rem; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; transition:all .2s; }
    .btn-ghost:hover { background:rgba(255,255,255,.08); color:var(--text); }

    /* AVATAR */
    .avatar-section { display:flex; flex-direction:column; align-items:center; margin-bottom:36px; }
    .avatar-wrap { position:relative; width:96px; height:96px; margin-bottom:12px; }
    .avatar-circle { width:96px; height:96px; border-radius:50%; background:rgba(124,106,247,.2); border:2px solid rgba(124,106,247,.4); display:flex; align-items:center; justify-content:center; font-size:2.4rem; font-weight:700; color:var(--accent); overflow:hidden; }
    .avatar-circle img { width:100%; height:100%; object-fit:cover; border-radius:50%; display:block; }
    .avatar-upload-btn { position:absolute; bottom:0; right:0; width:28px; height:28px; border-radius:50%; background:var(--accent); border:2px solid var(--bg); color:#fff; font-size:.75rem; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:opacity .2s; }
    .avatar-upload-btn:hover { opacity:.85; }
    #avatarFile { display:none; }
    .avatar-hint { font-size:.75rem; color:var(--muted); }

    /* INFO CARD */
    .info-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px 20px; margin-bottom:28px; }
    .info-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); }
    .info-row:last-child { border-bottom:none; }
    .info-row label { font-size:.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; }
    .info-row span  { font-size:.9rem; }
    .role-badge { padding:3px 12px; border-radius:999px; font-size:.72rem; font-weight:700; background:rgba(124,106,247,.12); border:1px solid rgba(124,106,247,.3); color:var(--accent); text-transform:uppercase; }

    /* FORM */
    .section-title { font-family:'Playfair Display',serif; font-size:1.25rem; font-weight:700; margin-bottom:18px; }
    .form-group { margin-bottom:18px; }
    .form-group label { display:block; font-size:.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; margin-bottom:7px; }
    .form-group input { width:100%; padding:11px 14px; background:var(--input-bg); border:1px solid var(--border); border-radius:10px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:.95rem; transition:border-color .2s; }
    .form-group input:focus { outline:none; border-color:rgba(124,106,247,.5); }
    .input-note { font-size:.72rem; color:var(--muted); margin-top:5px; }
    .btn-save { width:100%; padding:13px; background:var(--accent); border:none; border-radius:12px; color:#fff; font-family:'DM Sans',sans-serif; font-size:1rem; font-weight:600; cursor:pointer; transition:opacity .2s; margin-top:8px; }
    .btn-save:hover { opacity:.88; }
    .btn-save:disabled { opacity:.5; cursor:not-allowed; }

    /* ALERT */
    .alert { padding:10px 14px; border-radius:10px; font-size:.88rem; margin-bottom:18px; display:none; }
    .alert.success { background:rgba(66,230,149,.08); border:1px solid rgba(66,230,149,.25); color:var(--green); display:block; }
    .alert.error   { background:rgba(247,74,106,.08); border:1px solid rgba(247,74,106,.25); color:var(--red);   display:block; }
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<div class="app">
  <div class="topbar">
    <span class="logo">TicketVerse</span>
    <div class="nav-actions">
      <a class="btn-ghost" href="/events-page">← Events</a>
      <a class="btn-ghost" href="/my-bookings">🎟 My Bookings</a>
      <button class="btn-ghost" id="logoutBtn">Logout</button>
    </div>
  </div>

  <!-- Avatar -->
  <div class="avatar-section">
    <div class="avatar-wrap">
      <div class="avatar-circle" id="avatarCircle">
        <span id="avatarInitial">?</span>
      </div>
      <label class="avatar-upload-btn" for="avatarFile" title="Change photo">✏</label>
      <input type="file" id="avatarFile" accept="image/jpeg,image/png,image/webp" />
    </div>
    <div class="avatar-hint">Click ✏ to upload a profile photo</div>
  </div>

  <div id="profileAlert" class="alert"></div>

  <!-- Read-only account info -->
  <div class="info-card">
    <div class="info-row"><label>Email</label><span id="infoEmail">—</span></div>
    <div class="info-row"><label>Role</label><span><span class="role-badge" id="infoRole">—</span></span></div>
    <div class="info-row"><label>Member since</label><span id="infoJoined">—</span></div>
  </div>

  <!-- Editable fields -->
  <p class="section-title">Edit Profile</p>

  <div class="form-group">
    <label>Display Name</label>
    <input type="text" id="fieldName" placeholder="Your name" maxlength="100" />
  </div>
  <div class="form-group">
    <label>Phone Number</label>
    <input type="tel" id="fieldPhone" placeholder="+91 98765 43210" maxlength="20" />
  </div>
  <div class="form-group">
    <label>Date of Birth</label>
    <input type="date" id="fieldDob" />
    <div class="input-note">Used for birthday perks and age verification.</div>
  </div>

  <button class="btn-save" id="saveBtn" onclick="saveProfile()">Save Changes</button>
</div>

<script>
  /* Background canvas */
  const canvas=document.getElementById('bg-canvas'),ctx=canvas.getContext('2d');
  let W,H;
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  window.addEventListener('resize',resize);resize();
  const stars=Array.from({length:160},()=>({x:Math.random()*5000,y:Math.random()*5000,r:Math.random()*1.1+.2,a:Math.random(),da:(Math.random()*.006+.002)*(Math.random()>.5?1:-1)}));
  (function draw(){ctx.clearRect(0,0,W,H);ctx.fillStyle='#0a0a14';ctx.fillRect(0,0,W,H);
    stars.forEach(s=>{s.a+=s.da;if(s.a>1||s.a<0)s.da*=-1;ctx.beginPath();ctx.arc(s.x%W,s.y%H,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${Math.max(0,s.a)*.45})`;ctx.fill();});
    requestAnimationFrame(draw);})();

  const token = sessionStorage.getItem('token');
  if (!token) { window.location.replace('/'); }
  const headers = { 'Content-Type':'application/json', 'Authorization':`Bearer ${token}` };

  function showAlert(msg, type) {
    const el = document.getElementById('profileAlert');
    el.textContent = msg; el.className = 'alert ' + type;
    setTimeout(() => { el.className = 'alert'; el.textContent = ''; }, 4500);
  }

  async function loadProfile() {
    try {
      const res  = await fetch('/user/profile', { headers });
      if (res.status === 401) { sessionStorage.clear(); window.location.replace('/'); return; }
      const data = await res.json();

      document.getElementById('fieldName').value  = data.name         || '';
      document.getElementById('fieldPhone').value = data.phone        || '';
      document.getElementById('fieldDob').value   = data.date_of_birth ? data.date_of_birth.slice(0,10) : '';
      document.getElementById('infoEmail').textContent = data.email   || '—';
      document.getElementById('infoRole').textContent  = (data.role   || 'user').toUpperCase();
      document.getElementById('infoJoined').textContent = data.created_at
        ? new Date(data.created_at).toLocaleDateString('en-IN',{day:'2-digit',month:'long',year:'numeric'})
        : '—';

      const circle = document.getElementById('avatarCircle');
      if (data.avatar_url) {
        circle.innerHTML = `<img src="${data.avatar_url}" alt="Avatar" />`;
      } else {
        document.getElementById('avatarInitial').textContent = (data.name||'?').charAt(0).toUpperCase();
      }
    } catch(e) { showAlert('Failed to load profile.', 'error'); }
  }

  async function saveProfile() {
    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      const res = await fetch('/user/profile', {
        method: 'PUT', headers,
        body: JSON.stringify({
          name:          document.getElementById('fieldName').value.trim() || null,
          phone:         document.getElementById('fieldPhone').value.trim() || null,
          date_of_birth: document.getElementById('fieldDob').value || null,
        })
      });
      if (!res.ok) { const d=await res.json(); throw new Error(d.error||'Save failed'); }
      showAlert('Profile saved successfully!', 'success');
      await loadProfile();
    } catch(e) { showAlert(e.message||'Failed to save.', 'error'); }
    finally { btn.disabled = false; btn.textContent = 'Save Changes'; }
  }

  /* Avatar upload */
  document.getElementById('avatarFile').addEventListener('change', async function() {
    const file = this.files[0]; if (!file) return;
    if (file.size > 5*1024*1024) { showAlert('Image must be under 5 MB.', 'error'); return; }
    const form = new FormData(); form.append('file', file);
    try {
      const res = await fetch('/user/avatar', {
        method: 'POST', headers: { 'Authorization':`Bearer ${token}` }, body: form
      });
      if (!res.ok) { const j=await res.json(); throw new Error(j.error||'Upload failed'); }
      const data = await res.json();
      if (data.avatar_url) {
        document.getElementById('avatarCircle').innerHTML = `<img src="${data.avatar_url}" alt="Avatar" />`;
      }
      showAlert('Profile photo updated!', 'success');
    } catch(e) { showAlert(e.message||'Upload failed.', 'error'); }
    this.value = '';
  });

  /* Logout */
  document.getElementById('logoutBtn').addEventListener('click', () => {
    fetch('/auth/logout', { method:'POST', credentials:'include' })
      .finally(() => { sessionStorage.clear(); window.location.replace('/'); });
  });

  loadProfile();
</script>
</body>
</html>
