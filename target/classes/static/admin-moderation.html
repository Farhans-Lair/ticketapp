<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TicketVerse — Event Moderation</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/admin-theme.css">
  <style>
    /* ── EVENT CARDS (page-specific status border tints) ── */
    .ev-card.pending{border-color:rgba(245,158,11,.25)}
    .ev-card.approved{border-color:rgba(34,197,94,.2)}
    .ev-card.rejected{border-color:rgba(239,68,68,.2);opacity:.8}
    .ev-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  </style>
</head>
<body>

<nav class="admin-nav">
  <span class="nav-brand">TicketVerse Admin</span>
  <div class="nav-links">
    <a href="/admin">Dashboard</a>
    <a href="/admin/organizers">Organizers</a>
    <a href="/admin-moderation" class="active">Moderation</a>
    <a href="/admin-categories">Categories</a>
    <a href="/admin-payouts">Payouts</a>
    <a href="/admin-revenue">Revenue</a>
    <button class="btn-logout" id="logoutBtn">Logout</button>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div>
      <h1>Event Moderation</h1>
      <p>Review and approve or reject organizer-submitted events.</p>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat"><div class="val" id="statPending" style="color:var(--warning)">—</div><div class="lbl">Pending Review</div></div>
    <div class="stat"><div class="val" id="statApproved" style="color:var(--success)">—</div><div class="lbl">Approved</div></div>
    <div class="stat"><div class="val" id="statRejected" style="color:var(--danger)">—</div><div class="lbl">Rejected</div></div>
    <div class="stat"><div class="val" id="statTotal">—</div><div class="lbl">Total Events</div></div>
  </div>

  <!-- Filter tabs -->
  <div class="tabs">
    <button class="tab active" onclick="filterEvents('all', this)">All</button>
    <button class="tab" onclick="filterEvents('pending_review', this)">Pending</button>
    <button class="tab" onclick="filterEvents('published', this)">Approved</button>
    <button class="tab" onclick="filterEvents('rejected', this)">Rejected</button>
  </div>

  <div id="eventsList"><div class="empty"><div class="icon">⏳</div><p>Loading…</p></div></div>
</div>

<div class="toast" id="toast"></div>

<script src="/js/api.js"></script>
<script src="/js/auth-channel.js"></script>
<script>
  var token = sessionStorage.getItem('token');
  var role  = sessionStorage.getItem('role');
  if (!token || role !== 'admin') window.location.replace('/');
  var H = { 'Content-Type':'application/json', 'Authorization':'Bearer ' + token };

  var _allEvents   = [];
  var _activeFilter = 'all';

  function toast(msg, type) {
    var el = document.getElementById('toast');
    el.textContent = msg; el.className = 'toast ' + type + ' show';
    setTimeout(function(){ el.className = 'toast'; }, 3500);
  }
  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  // ── Load all events ─────────────────────────────────────────────────────────
  async function loadEvents() {
    try {
      var res  = await fetch('/events', { headers: H });
      var data = await res.json();
      _allEvents = Array.isArray(data) ? data : (data.events || data.content || []);

      // Update stats
      var pending  = _allEvents.filter(function(e){ return (e.event_status||e.eventStatus) === 'pending_review'; }).length;
      var approved = _allEvents.filter(function(e){ return (e.event_status||e.eventStatus) === 'published'; }).length;
      var rejected = _allEvents.filter(function(e){ return (e.event_status||e.eventStatus) === 'rejected'; }).length;
      document.getElementById('statPending').textContent  = pending;
      document.getElementById('statApproved').textContent = approved;
      document.getElementById('statRejected').textContent = rejected;
      document.getElementById('statTotal').textContent    = _allEvents.length;

      renderEvents(_allEvents);
    } catch(e) {
      document.getElementById('eventsList').innerHTML =
        '<div class="empty"><p style="color:var(--danger)">Failed to load events.</p></div>';
    }
  }

  function filterEvents(status, btn) {
    _activeFilter = status;
    document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
    btn.classList.add('active');
    var filtered = status === 'all'
      ? _allEvents
      : _allEvents.filter(function(e){ return (e.event_status||e.eventStatus) === status; });
    renderEvents(filtered);
  }

  function renderEvents(events) {
    var el = document.getElementById('eventsList');
    if (!events.length) {
      el.innerHTML = '<div class="empty"><div class="icon">✅</div><p>No events in this category.</p></div>';
      return;
    }
    el.innerHTML = events.map(function(ev) {
      var status   = ev.event_status || ev.eventStatus || 'draft';
      var dateStr  = ev.event_date ? new Date(ev.event_date).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}) : 'TBA';
      var price    = 'Rs.' + Number(ev.price||0).toLocaleString('en-IN');
      var actions  = '';

      if (status === 'pending_review') {
        actions = '<button class="btn-approve" onclick="approveEvent(' + ev.id + ')">✓ Approve</button>'
                + '<button class="btn-reject"  onclick="toggleReject(' + ev.id + ')">✗ Reject</button>';
      } else if (status === 'published') {
        actions = '<button class="btn-revoke"  onclick="revokeEvent(' + ev.id + ')">✕ Revoke</button>';
      } else if (status === 'rejected') {
        actions = '<button class="btn-approve" onclick="approveEvent(' + ev.id + ')">↩ Re-approve</button>';
      }

      return '<div class="ev-card ' + status + '" id="evCard-' + ev.id + '">'
        + '<div class="ev-top">'
        +   '<div>'
        +     '<div class="ev-title">' + esc(ev.title||'Untitled') + '</div>'
        +     '<div class="ev-meta">'
        +       dateStr + ' &middot; ' + esc(ev.location||'No venue') + ' &middot; ' + esc(ev.category||'Other')
        +       ' &middot; ' + price + ' &middot; ' + (ev.total_tickets||0) + ' tickets'
        +       (ev.organizer_id ? ' &middot; <span style="color:var(--primary)">Organizer #' + ev.organizer_id + '</span>' : '')
        +     '</div>'
        +   '</div>'
        +   '<div class="ev-actions"><span class="badge ' + status + '">' + status.replace('_',' ').toUpperCase() + '</span>' + actions + '</div>'
        + '</div>'
        + '<div class="rej-row" id="rejRow-' + ev.id + '">'
        +   '<input id="rejReason-' + ev.id + '" type="text" placeholder="Rejection reason (optional)…" />'
        +   '<button class="btn-confirm-rej" onclick="confirmReject(' + ev.id + ')">Confirm Reject</button>'
        + '</div>'
        + '</div>';
    }).join('');
  }

  // ── Actions ──────────────────────────────────────────────────────────────────
  async function approveEvent(id) {
    try {
      var res = await fetch('/events/' + id + '/approve', { method:'PUT', headers:H });
      var d   = await res.json();
      if (!res.ok) throw new Error(d.error || 'Failed');
      toast('Event approved and published!', 'ok');
      loadEvents();
    } catch(e) { toast(e.message, 'err'); }
  }

  function toggleReject(id) {
    var row = document.getElementById('rejRow-' + id);
    row.classList.toggle('open');
    if (row.classList.contains('open')) document.getElementById('rejReason-' + id).focus();
  }

  async function confirmReject(id) {
    var reason = document.getElementById('rejReason-' + id).value.trim() || null;
    try {
      var res = await fetch('/events/' + id + '/reject', {
        method:'PUT', headers:H,
        body: JSON.stringify({ reason: reason })
      });
      var d = await res.json();
      if (!res.ok) throw new Error(d.error || 'Failed');
      toast('Event rejected.', 'ok');
      loadEvents();
    } catch(e) { toast(e.message, 'err'); }
  }

  async function revokeEvent(id) {
    if (!confirm('Revoke this event? It will be unpublished immediately.')) return;
    try {
      var res = await fetch('/events/' + id + '/revoke', { method:'PUT', headers:H });
      var d   = await res.json();
      if (!res.ok) throw new Error(d.error || 'Failed');
      toast('Event revoked and unpublished.', 'ok');
      loadEvents();
    } catch(e) { toast(e.message, 'err'); }
  }

  // ── Logout ────────────────────────────────────────────────────────────────────
  document.getElementById('logoutBtn').addEventListener('click', function() {
    fetch('/auth/logout', { method:'POST', credentials:'include' })
      .finally(function(){ sessionStorage.clear(); window.location.replace('/'); });
  });

  loadEvents();
</script>
</body>
</html>
