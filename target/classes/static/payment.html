<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TicketVerse — Complete Payment</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--bg:#0a0a14;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.09);--text:#f0eee8;--muted:rgba(240,238,232,0.5);--gold:#f5c842;--gold-dark:#d4a520;--accent:#7c6af7;--green:#42e695;--red:#f74a6a;}
    html,body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100%;}
    #bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
    .app{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
    .payment-card{width:100%;max-width:480px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:22px;padding:36px;backdrop-filter:blur(24px);box-shadow:0 32px 80px rgba(0,0,0,0.5);}
    .card-logo{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:900;color:var(--gold);margin-bottom:22px;}
    .card-title{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:900;margin-bottom:20px;}
    #summary{margin-bottom:22px;}
    #summary h3{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;margin-bottom:14px;color:var(--text);}
    .summary-table{width:100%;border-collapse:collapse;}
    .summary-table tr td{padding:8px 2px;border-bottom:1px solid rgba(255,255,255,0.06);font-size:0.92rem;color:var(--text);}
    .summary-table tr td:last-child{text-align:right;font-weight:600;}
    .summary-table tr.total-row td{border-top:1px solid rgba(255,255,255,0.15);border-bottom:none;padding-top:12px;font-size:1.05rem;}
    .summary-table tr.total-row td:last-child{color:var(--gold);font-size:1.1rem;}
    .summary-table .discount-row td{color:var(--green);}
    /* Coupon section */
    .coupon-section{margin-bottom:20px;}
    .coupon-section label{display:block;font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:8px;}
    .coupon-row{display:flex;gap:8px;}
    .coupon-input{flex:1;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:11px;padding:11px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;text-transform:uppercase;transition:border-color 0.2s;}
    .coupon-input:focus{border-color:var(--gold);}
    .coupon-input::placeholder{color:rgba(240,238,232,0.25);text-transform:none;}
    .btn-apply-coupon{padding:11px 18px;background:rgba(245,200,66,0.12);border:1px solid rgba(245,200,66,0.3);border-radius:11px;color:var(--gold);font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:all 0.2s;}
    .btn-apply-coupon:hover{background:rgba(245,200,66,0.22);}
    .coupon-feedback{margin-top:8px;font-size:0.82rem;min-height:18px;}
    .coupon-feedback.ok{color:var(--green);}
    .coupon-feedback.err{color:var(--red);}
    /* Pay button */
    #pay-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border:none;border-radius:13px;color:#0a0a14;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:transform 0.15s,box-shadow 0.2s;box-shadow:0 4px 22px rgba(245,200,66,0.28);margin-bottom:14px;}
    #pay-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 32px rgba(245,200,66,0.44);}
    #pay-btn:disabled{background:rgba(255,255,255,0.1);color:var(--muted);cursor:not-allowed;box-shadow:none;}
    #status-msg{text-align:center;font-size:0.92rem;min-height:24px;margin-bottom:10px;}
    .back-link{display:inline-block;color:var(--muted);font-size:0.85rem;text-decoration:none;padding:8px 0;}
    .back-link:hover{color:var(--text);}
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="app">
  <div class="payment-card">
    <div class="card-logo">TicketVerse</div>
    <div class="card-title">🎟️ Order Summary</div>
    <div id="summary"></div>

    <!-- Feature 7: Coupon code input -->
    <div class="coupon-section">
      <label>Promo / Coupon Code</label>
      <div class="coupon-row">
        <input class="coupon-input" type="text" id="coupon-input" placeholder="Enter code (e.g. SAVE20)" maxlength="30"/>
        <button class="btn-apply-coupon" onclick="applyCoupon()">Apply</button>
      </div>
      <div class="coupon-feedback" id="coupon-feedback"></div>
    </div>

    <div id="status-msg"></div>
    <button id="pay-btn">Pay with Razorpay</button>
    <a class="back-link" href="/events-page">← Back to Events</a>
  </div>
</div>
<script>
/* canvas bg */
const canvas=document.getElementById('bg-canvas'),ctx=canvas.getContext('2d');let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();
const stars=Array.from({length:160},()=>({x:Math.random()*5000,y:Math.random()*5000,r:Math.random()*1.1+.2,a:Math.random(),da:(Math.random()*.006+.002)*(Math.random()>.5?1:-1)}));
const pts=Array.from({length:50},()=>({x:Math.random()*600,y:Math.random()*400,r:Math.random()*1.6+.3,speed:Math.random()*.3+.1,dx:(Math.random()-.5)*.2,alpha:Math.random()*.3+.08,fadeDir:1,col:['rgba(245,200,66,','rgba(124,106,247,','rgba(66,230,149,'][Math.floor(Math.random()*3)]}));
function draw(){ctx.clearRect(0,0,W,H);const g=ctx.createLinearGradient(0,0,W,H);g.addColorStop(0,'#0a0a14');g.addColorStop(1,'#0d0d22');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);stars.forEach(s=>{s.a+=s.da;if(s.a>1||s.a<0)s.da*=-1;ctx.beginPath();ctx.arc(s.x%W,s.y%H,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${Math.max(0,s.a)*.4})`;ctx.fill();});pts.forEach(p=>{p.y-=p.speed;p.x+=p.dx;p.alpha+=.003*p.fadeDir;if(p.alpha>.45||p.alpha<.06)p.fadeDir*=-1;if(p.y<-10){p.x=Math.random()*W;p.y=H+10;}ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.col+p.alpha+')';ctx.fill();});requestAnimationFrame(draw);}
draw();
</script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth-channel.js"></script>
<script src="/js/payment.js"></script>
</body>
</html>
