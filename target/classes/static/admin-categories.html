<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TicketVerse — Event Categories</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#0d0d1a; --surface:#161625; --card:#1e1e35; --border:rgba(255,255,255,0.08);
      --text:#e8e6f0; --muted:#7b7a96; --primary:#7c6af7; --success:#22c55e;
      --danger:#ef4444; --warning:#f59e0b; --input-bg:rgba(255,255,255,0.05);
    }
    body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

    /* ── NAV ── */
    nav { background:var(--surface); border-bottom:1px solid var(--border); padding:14px 28px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; position:sticky; top:0; z-index:10; }
    .nav-brand { font-size:1.1rem; font-weight:700; color:var(--primary); }
    .nav-links { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
    .nav-links a { color:var(--muted); text-decoration:none; font-size:.84rem; padding:6px 12px; border-radius:8px; transition:all .2s; }
    .nav-links a:hover { color:var(--text); background:rgba(255,255,255,.05); }
    .nav-links a.active { color:var(--primary); background:rgba(124,106,247,.12); font-weight:600; }
    .btn-logout { background:transparent; border:1px solid var(--border); color:var(--muted); padding:6px 14px; border-radius:8px; cursor:pointer; font-size:.84rem; transition:all .2s; font-family:inherit; }
    .btn-logout:hover { border-color:var(--danger); color:var(--danger); }

    /* ── PAGE ── */
    .page { max-width:1100px; margin:0 auto; padding:36px 24px 80px; }
    .page-header { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:28px; flex-wrap:wrap; gap:12px; }
    .page-header h1 { font-size:1.6rem; font-weight:700; }
    .page-header p  { color:var(--muted); font-size:.88rem; margin-top:4px; }

    /* ── ALERT ── */
    .alert { padding:11px 16px; border-radius:10px; font-size:.87rem; margin-bottom:18px; display:none; }
    .alert.ok  { background:rgba(34,197,94,.08); border:1px solid rgba(34,197,94,.25); color:var(--success); display:block; }
    .alert.err { background:rgba(239,68,68,.08); border:1px solid rgba(239,68,68,.25); color:var(--danger);  display:block; }

    /* ── ADD CATEGORY BUTTON + MODAL ── */
    .btn-add { background:var(--primary); color:#fff; border:none; padding:10px 22px; border-radius:10px; font-size:.9rem; font-weight:600; cursor:pointer; font-family:inherit; transition:opacity .2s; }
    .btn-add:hover { opacity:.85; }

    /* Modal overlay */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:100; display:none; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:28px; width:100%; max-width:460px; }
    .modal h3 { font-size:1.1rem; font-weight:700; margin-bottom:20px; }
    .fg { margin-bottom:14px; }
    .fg label { display:block; font-size:.73rem; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:6px; }
    .fg input  { width:100%; padding:10px 13px; background:var(--input-bg); border:1px solid var(--border); border-radius:9px; color:var(--text); font-family:inherit; font-size:.92rem; }
    .fg input:focus { outline:none; border-color:rgba(124,106,247,.5); }
    .modal-actions { display:flex; gap:10px; margin-top:20px; justify-content:flex-end; }
    .btn-save   { background:var(--primary); color:#fff; border:none; padding:10px 22px; border-radius:9px; font-family:inherit; font-size:.9rem; font-weight:600; cursor:pointer; }
    .btn-cancel { background:var(--input-bg); color:var(--muted); border:1px solid var(--border); padding:10px 18px; border-radius:9px; font-family:inherit; font-size:.9rem; cursor:pointer; }

    /* ── CATEGORIES GRID (TBA2 card style) ── */
    .cat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:16px; }

    .cat-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:20px 16px; position:relative; transition:border-color .2s; }
    .cat-card:hover { border-color:rgba(124,106,247,.3); }
    .cat-card.inactive { opacity:.55; }

    /* Active dot indicator */
    .active-dot { position:absolute; top:12px; right:12px; width:8px; height:8px; border-radius:50%; background:var(--success); }
    .inactive-dot { position:absolute; top:12px; right:12px; width:8px; height:8px; border-radius:50%; background:var(--muted); }

    /* Large emoji / image icon */
    .cat-icon { width:64px; height:64px; border-radius:14px; background:rgba(124,106,247,.1); display:flex; align-items:center; justify-content:center; margin-bottom:12px; font-size:2.2rem; overflow:hidden; }
    .cat-icon img { width:100%; height:100%; object-fit:cover; border-radius:14px; }

    .cat-name { font-size:1rem; font-weight:700; margin-bottom:2px; }
    .cat-meta { font-size:.74rem; color:var(--muted); margin-bottom:14px; line-height:1.5; }

    .cat-actions { display:flex; gap:6px; flex-wrap:wrap; }
    .btn-sm { padding:5px 13px; border-radius:7px; font-family:inherit; font-size:.76rem; font-weight:600; cursor:pointer; border:1px solid; transition:all .18s; }
    .btn-edit   { background:rgba(124,106,247,.1); border-color:rgba(124,106,247,.3); color:var(--primary); }
    .btn-edit:hover { background:rgba(124,106,247,.22); }
    .btn-toggle-on  { background:rgba(245,158,11,.08); border-color:rgba(245,158,11,.25); color:var(--warning); }
    .btn-toggle-on:hover { background:rgba(245,158,11,.18); }
    .btn-toggle-off { background:rgba(34,197,94,.08); border-color:rgba(34,197,94,.25); color:var(--success); }
    .btn-toggle-off:hover { background:rgba(34,197,94,.18); }
    .btn-del    { background:rgba(239,68,68,.08); border-color:rgba(239,68,68,.2); color:var(--danger); }
    .btn-del:hover { background:rgba(239,68,68,.18); }

    .empty-state { text-align:center; padding:60px 20px; color:var(--muted); }
    .empty-state .icon { font-size:3rem; margin-bottom:12px; }

    /* Toast */
    .toast { position:fixed; bottom:28px; right:28px; padding:12px 18px; border-radius:10px; font-size:.87rem; z-index:200; opacity:0; transform:translateY(8px); transition:all .25s; pointer-events:none; background:var(--card); border:1px solid var(--border); }
    .toast.show { opacity:1; transform:translateY(0); }
    .toast.ok  { border-color:rgba(34,197,94,.4); color:var(--success); }
    .toast.err { border-color:rgba(239,68,68,.4); color:var(--danger); }
  </style>
</head>
<body>

<nav>
  <span class="nav-brand">TicketVerse Admin</span>
  <div class="nav-links">
    <a href="/admin">Dashboard</a>
    <a href="/admin/organizers">Organizers</a>
    <a href="/admin">Moderation</a>
    <a href="/admin-categories" class="active">Categories</a>
    <a href="/admin-payouts">Payouts</a>
    <a href="/admin-revenue">Revenue</a>
    <button class="btn-logout" id="logoutBtn">Logout</button>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div>
      <h1>Event Categories</h1>
      <p>Manage categories shown to organizers and users. Changes reflect in real time.</p>
    </div>
    <button class="btn-add" onclick="openAddModal()">+ Add Category</button>
  </div>

  <div class="alert" id="mainAlert"></div>
  <div class="cat-grid" id="catGrid"><div class="empty-state"><div class="icon">⏳</div><p>Loading…</p></div></div>
</div>

<!-- Add / Edit Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">Add Category</h3>
    <input type="hidden" id="editId" value="" />
    <div class="fg">
      <label>Name *</label>
      <input id="fieldName" type="text" maxlength="100" placeholder="e.g. Live Music" />
    </div>
    <div class="fg">
      <label>Icon Emoji</label>
      <input id="fieldEmoji" type="text" maxlength="6" placeholder="🎵" style="width:90px;" />
    </div>
    <div class="fg">
      <label>Image URL <span style="color:var(--muted);text-transform:none;font-weight:400;">(optional, overrides emoji)</span></label>
      <input id="fieldImage" type="url" placeholder="https://…" />
    </div>
    <div class="fg">
      <label>Sort Order</label>
      <input id="fieldSort" type="number" value="0" min="0" style="width:90px;" />
    </div>
    <div class="alert" id="modalAlert"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save"   id="saveBtn" onclick="saveCategory()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/js/api.js"></script>
<script src="/js/auth-channel.js"></script>
<script>
  const token = sessionStorage.getItem('token');
  const role  = sessionStorage.getItem('role');
  if (!token || role !== 'admin') window.location.replace('/');
  const H = { 'Content-Type':'application/json', 'Authorization':'Bearer ' + token };

  // ── Alert helpers ──────────────────────────────────────────────────────────
  function showAlert(id, msg, type) {
    var el = document.getElementById(id);
    el.textContent = msg; el.className = 'alert ' + type;
    setTimeout(function(){ el.className = 'alert'; }, 5000);
  }
  function toast(msg, type) {
    var el = document.getElementById('toast');
    el.textContent = msg; el.className = 'toast ' + type + ' show';
    setTimeout(function(){ el.className = 'toast'; }, 3500);
  }

  // ── Load & render categories (card layout) ─────────────────────────────────
  async function loadCategories() {
    try {
      var res  = await fetch('/admin/categories', { headers: H });
      if (res.status === 401) { sessionStorage.clear(); window.location.replace('/'); return; }
      var cats = await res.json();
      document.querySelector('.page-header h1').textContent =
        'Event Categories (' + cats.length + ')';
      renderCards(cats);
    } catch(e) {
      document.getElementById('catGrid').innerHTML =
        '<div class="empty-state"><p style="color:var(--danger)">Failed to load categories.</p></div>';
    }
  }

  function renderCards(cats) {
    var grid = document.getElementById('catGrid');
    if (!cats.length) {
      grid.innerHTML = '<div class="empty-state"><div class="icon">🏷️</div><p>No categories yet. Click + Add Category to create one.</p></div>';
      return;
    }
    grid.innerHTML = cats.map(function(c) {
      var iconHtml;
      if (c.image_url) {
        iconHtml = '<img src="' + esc(c.image_url) + '" alt="' + esc(c.name) + '" onerror="this.style.display=\'none\';this.parentNode.textContent=\'' + esc(c.icon_emoji||'\uD83C\uDFAB') + '\'" />';
      } else {
        // Render emoji directly — works after running fix-emoji-charset.sql
        iconHtml = c.icon_emoji || '\uD83C\uDFAB';
      }
      var dot = c.is_active
        ? '<div class="active-dot" title="Active"></div>'
        : '<div class="inactive-dot" title="Inactive"></div>';
      var toggleBtn = c.is_active
        ? '<button class="btn-sm btn-toggle-on" onclick="toggleActive(' + c.id + ',false)">Disable</button>'
        : '<button class="btn-sm btn-toggle-off" onclick="toggleActive(' + c.id + ',true)">Enable</button>';
      return '<div class="cat-card' + (c.is_active ? '' : ' inactive') + '" id="card-' + c.id + '">'
        + dot
        + '<div class="cat-icon">' + iconHtml + '</div>'
        + '<div class="cat-name">' + esc(c.name) + '</div>'
        + '<div class="cat-meta">slug: ' + esc(c.slug) + ' &middot; order: ' + (c.sort_order||0) + '</div>'
        + '<div class="cat-actions">'
        +   '<button class="btn-sm btn-edit" onclick="openEditModal(' + c.id + ',' + JSON.stringify(c.name) + ',' + JSON.stringify(c.icon_emoji||'') + ',' + JSON.stringify(c.image_url||'') + ',' + (c.sort_order||0) + ')">&#9998; Edit</button>'
        +   toggleBtn
        +   '<button class="btn-sm btn-del" onclick="deleteCategory(' + c.id + ',' + JSON.stringify(c.name) + ')">&#128465; Delete</button>'
        + '</div>'
        + '</div>';
    }).join('');
  }

  // ── Modal ──────────────────────────────────────────────────────────────────
  function openAddModal() {
    document.getElementById('modalTitle').textContent = 'Add Category';
    document.getElementById('editId').value = '';
    document.getElementById('fieldName').value  = '';
    document.getElementById('fieldEmoji').value = '';
    document.getElementById('fieldImage').value = '';
    document.getElementById('fieldSort').value  = '0';
    document.getElementById('saveBtn').textContent = 'Create Category';
    document.getElementById('modalAlert').className = 'alert';
    document.getElementById('modalOverlay').classList.add('open');
    document.getElementById('fieldName').focus();
  }
  function openEditModal(id, name, emoji, image, sort) {
    document.getElementById('modalTitle').textContent = 'Edit Category';
    document.getElementById('editId').value = id;
    document.getElementById('fieldName').value  = name;
    document.getElementById('fieldEmoji').value = emoji;
    document.getElementById('fieldImage').value = image;
    document.getElementById('fieldSort').value  = sort;
    document.getElementById('saveBtn').textContent = 'Save Changes';
    document.getElementById('modalAlert').className = 'alert';
    document.getElementById('modalOverlay').classList.add('open');
    document.getElementById('fieldName').focus();
  }
  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }
  // Close on backdrop click
  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // ── Save (create or update) ────────────────────────────────────────────────
  async function saveCategory() {
    var name  = document.getElementById('fieldName').value.trim();
    var emoji = document.getElementById('fieldEmoji').value.trim() || '\uD83C\uDFAB';
    var image = document.getElementById('fieldImage').value.trim() || null;
    var sort  = parseInt(document.getElementById('fieldSort').value) || 0;
    var editId= document.getElementById('editId').value;
    if (!name) { showAlert('modalAlert', 'Name is required.', 'err'); return; }

    var btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      var url    = editId ? '/admin/categories/' + editId : '/admin/categories';
      var method = editId ? 'PUT' : 'POST';
      var res    = await fetch(url, { method: method, headers: H,
        body: JSON.stringify({ name: name, icon_emoji: emoji, image_url: image, sort_order: sort }) });
      var data   = await res.json();
      if (!res.ok) throw new Error(data.error || 'Save failed');
      toast((editId ? 'Category updated!' : 'Category "' + name + '" created!'), 'ok');
      closeModal();
      loadCategories();
    } catch(e) { showAlert('modalAlert', e.message, 'err'); }
    finally { btn.disabled = false; btn.textContent = editId ? 'Save Changes' : 'Create Category'; }
  }

  // ── Toggle active ──────────────────────────────────────────────────────────
  async function toggleActive(id, newState) {
    try {
      var res  = await fetch('/admin/categories/' + id, { method:'PUT', headers:H,
        body: JSON.stringify({ is_active: newState }) });
      var data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Toggle failed');
      loadCategories();
    } catch(e) { toast(e.message, 'err'); }
  }

  // ── Delete ─────────────────────────────────────────────────────────────────
  async function deleteCategory(id, name) {
    if (!confirm('Delete category "' + name + '"? This cannot be undone.')) return;
    try {
      var res  = await fetch('/admin/categories/' + id, { method:'DELETE', headers:H });
      var data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Delete failed');
      toast('"' + name + '" deleted.', 'ok');
      loadCategories();
    } catch(e) { toast(e.message, 'err'); }
  }

  // ── XSS escape ─────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // ── Logout ─────────────────────────────────────────────────────────────────
  document.getElementById('logoutBtn').addEventListener('click', function() {
    fetch('/auth/logout', { method:'POST', credentials:'include' })
      .finally(function(){ sessionStorage.clear(); window.location.replace('/'); });
  });

  loadCategories();
</script>
</body>
</html>
