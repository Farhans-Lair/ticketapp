# =============================================================
#  nginx-rate-limit.conf
#
#  Per-client-IP rate limiting in front of the Spring Boot container.
#  ALB itself has no native rate-limiting capability outside AWS WAF,
#  so this reverse-proxy layer fills that gap without adding WAF.
#
#  Trust model: ec2_sg only allows inbound :8080 from alb_sg (see
#  security-groups.tf) — there is no direct-internet path to this
#  port, so trusting the ALB-supplied X-Forwarded-For header for the
#  rate-limit key is safe; nothing but the ALB can reach this nginx.
#
#  Deployed to each instance at $APP_DIR/nginx.conf and mounted into
#  an nginx:alpine container run with --network host, listening on
#  8080 (what the ALB target group talks to) and proxying to the
#  Spring Boot container, which binds only to 127.0.0.1:8081.
# =============================================================

worker_processes auto;
events { worker_connections 1024; }

http {
  # 10 req/s sustained per client IP, 10 MB zone (~160k tracked IPs).
  # Tune `rate` up/down per real traffic patterns; this is a starting
  # point, not a load-tested figure.
  limit_req_zone $http_x_forwarded_for zone=api_limit:10m rate=10r/s;
  limit_req_status 429;

  server {
    listen 8080;

    # Never rate-limit the ALB's own health check. A burst of
    # health-check traffic getting 429'd would falsely flip the
    # target unhealthy and could trigger an ASG replacement loop —
    # exactly the kind of self-inflicted outage this change must
    # not cause.
    location /health {
      proxy_pass http://127.0.0.1:8081;
      proxy_set_header Host $host;
    }

    location / {
      limit_req zone=api_limit burst=20 nodelay;
      proxy_http_version 1.1;
      proxy_pass http://127.0.0.1:8081;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $http_x_forwarded_for;
      proxy_set_header X-Real-IP $http_x_forwarded_for;
    }
  }
}
