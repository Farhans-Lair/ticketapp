version: "3.9"

services:

  # ── MySQL database ─────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: ticketapp_db
    restart: unless-stopped

    # ✅ FIX: Force MySQL to use caching_sha2_password
    command: --default-authentication-plugin=caching_sha2_password

    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE:      ${DB_NAME:-ticket_db}
      MYSQL_USER:          ${DB_USER:-ticket_user}
      MYSQL_PASSWORD:      ${DB_PASS:-ticketpass}

    ports:
      - "3306:3306"

    volumes:
      - db_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/organizer_migration.sql:/docker-entrypoint-initdb.d/02-organizer.sql:ro
      # ✅ OPTIONAL: ensure user plugin is correct
      - ./db/init-auth.sql:/docker-entrypoint-initdb.d/03-auth.sql:ro

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 5


  # ── Redis (OTP store) ──────────────────────────────────────────────────────
  # Replaces the in-memory ConcurrentHashMap used by OtpStore.
  # OTPs now survive restarts and are shared across multiple backend instances.
  redis:
    image: redis:7-alpine
    container_name: ticketapp_redis
    restart: unless-stopped
    # No auth in local dev. In production use REDIS_PASSWORD and pass
    # --requirepass to the redis command, or use ElastiCache with IAM auth.
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5


  # ── Spring Boot backend ────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticketapp_backend
    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    ports:
      - "3000:3000"

    environment:
      # Database
      DB_HOST:     db
      DB_PORT:     3306
      DB_NAME:     ${DB_NAME:-ticket_db}
      DB_USER:     ${DB_USER:-ticket_user}
      DB_PASS:     ${DB_PASS:-ticketpass}

      # JWT
      JWT_SECRET:  ${JWT_SECRET:-changeme-use-a-long-random-secret-in-production}

      # Cookie
      COOKIE_SECURE: ${COOKIE_SECURE:-false}

      # Email
      EMAIL_USER:  ${EMAIL_USER:-}
      EMAIL_PASS:  ${EMAIL_PASS:-}

      # AWS S3
      AWS_REGION:            ${AWS_REGION:-ap-south-1}
      AWS_ACCESS_KEY_ID:     ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      S3_BUCKET_NAME:        ${S3_BUCKET_NAME:-}

      # Razorpay
      RAZORPAY_KEY_ID:     ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}

      # Frontend URL (for CORS)
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}

      # Redis (OTP store)
      REDIS_HOST:     redis
      REDIS_PORT:     6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}

      # Admin notifications
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}

    volumes:
      # Serve frontend
      - ./frontend:/app/static-frontend:ro


volumes:
  db_data: