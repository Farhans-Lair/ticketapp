name: CI - Test, Build, Push & Deploy Spring Boot Backend

# ─────────────────────────────────────────────────────────────
#  push to main  → full pipeline: test → build → ECR push → SSM deploy
#  pull_request  → test + build only (no push, no deploy)
#
#  SELF-DETECTING BOOTSTRAP — no GitHub secrets or variables used
#  ─────────────────────────────────────────────────────────────
#  This workflow needs no GitHub Secrets (AWS auth is via OIDC,
#  app secrets live in SSM Parameter Store) and no GitHub Variables
#  either. Instead, the "Configure AWS credentials" step runs with
#  continue-on-error: true, and the step right after it checks
#  whether that role assumption actually succeeded
#  (steps.aws-creds.outcome). Every AWS-touching step downstream
#  is gated on that live result — not on any manually-set flag.
#
#  In practice: if the OIDC role doesn't exist yet (bootstrap not
#  done), the credentials step fails quietly, everything after it
#  is skipped automatically, and the job summary explains why.
#  Once the role exists, the exact same push behaves normally —
#  nothing to toggle, nothing to remember.
#
#  One-time bootstrap sequence:
#    1. Push code to main.
#       → build job runs tests only. The AWS credentials step fails
#         quietly (role doesn't exist yet) and everything after it
#         auto-skips. Job still shows ✅ overall — nothing failed
#         that was supposed to succeed at this point.
#    2. terraform apply -target=aws_iam_openid_connect_provider.github \
#         -target=aws_iam_role.github_actions_role \
#         -target=aws_iam_role_policy_attachment.github_ecr_full \
#         -target=aws_iam_role_policy.github_actions_deploy \
#         -target=aws_ecr_repository.backend \
#         -target=aws_ecr_lifecycle_policy.backend
#       → OIDC role + ECR repo now exist in AWS.
#    3. Re-run the workflow (Actions tab → latest run → "Re-run all jobs"),
#       or push a new commit. No settings to change first.
#       → build succeeds, AWS steps now run (role assumption succeeds
#         this time), image pushed to ECR.
#       → check-infra finds no EC2 instances yet → deploy shows Skipped
#         (expected — summary explains why).
#    4. terraform apply   (full, no -target)
#       → VPC/RDS/ALB/ASG created. First EC2 instance pulls the image
#         that's already in ECR on its first boot.
#    5. From here on: every push to main runs the full pipeline
#       automatically — build, push, check-infra (ready=true), deploy.
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ─────────────────────────────────────────────────────────────
#  Shared identifiers — used by all three jobs (build, check-infra,
#  deploy). Moved to workflow-level env so check-infra and deploy
#  (separate jobs = separate runners) can see them too; job-level
#  env: does not cross job boundaries in GitHub Actions.
#
#  These match exactly what terraform creates — see iam.tf,
#  ecr.tf, launch_template.tf:
#    Role ARN: "${var.project_name}-GitHubActions-Deploy-Role"
#    ECR repo: "${var.project_name}-backend"
#    ASG name: "${var.project_name}-backend-asg"
# ─────────────────────────────────────────────────────────────
env:
  AWS_ACCOUNT_ID:  "349744179793"         # aws_account_id in terraform.tfvars
  AWS_REGION:      "ap-south-1"           # aws_region in terraform.tfvars
  PROJECT_NAME:    "ticketapp"            # project_name in terraform.tfvars
  GITHUB_ORG:      "Farhans-Lair"         # github_org in terraform.tfvars
  GITHUB_REPO:     "ticketapp"            # github_repo in terraform.tfvars
  ECR_REPOSITORY:  "ticketapp-backend"            # ${project_name}-backend
  ASG_NAME:        "ticketapp-backend-asg"        # ${project_name}-backend-asg
  CONTAINER_NAME:  "ticketapp-backend"            # docker --name in user_data.sh
  APP_DIR:         "/home/ec2-user/ticketapp-backend"  # APP_DIR in user_data.sh

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      id-token: write   # required for GitHub OIDC token → AWS role assumption
      contents: read

    # ─────────────────────────────────────────────────────────
    #  CI-ONLY stub values below (job-level env, this job only).
    #  Shared AWS/project identifiers now live in workflow-level
    #  env above.
    # ─────────────────────────────────────────────────────────
    env:
      # ── CI Database credentials (local MySQL service only) ─────────────────
      # These values are ONLY used by the mvn build step (CI MySQL container).
      # The SSM deploy step does NOT use these — it fetches real prod values
      # from AWS SSM Parameter Store at deploy time (see step 13).
      # No prod secrets are stored in this file or in GitHub Secrets.
      DB_HOST: "127.0.0.1"
      DB_PORT: "3306"
      DB_NAME: "ticket_db"
      DB_USER: "ticket_user"
      DB_PASS: "ticket_password_ci"           # CI-only, not the real RDS password

      # ── CI stub values for mvn build (not used at runtime) ─────────────
      # mvn package -DskipTests compiles and packages the JAR but never
      # starts Spring Boot, so these values only need to satisfy Maven
      # property resolution — they are not real credentials.
      # The real prod values are stored in SSM Parameter Store and fetched
      # by the deploy step (step 13) via the OIDC role at deploy time.
      # No GitHub Secrets needed anywhere in this workflow.
      JWT_SECRET:          "ci-jwt-secret-placeholder-min-32-chars-x"
      RAZORPAY_KEY_ID:     "rzp_test_placeholder_ci"
      RAZORPAY_KEY_SECRET: "placeholder_razorpay_secret_ci"
      EMAIL_USER:          "ci-noreply@example.com"
      EMAIL_PASS:          "placeholder_email_pass_ci"
      S3_BUCKET_NAME:      "ticketapp-ticket-pdfs-prod"
      FRONTEND_URL:            "http://localhost:8080"
      # USE_HTTPS must be false in CI — there is no keystore.p12 in the CI container.
      # When USE_HTTPS=true, Spring Boot tries to load server.ssl.key-store
      # (classpath:certs/keystore.p12) which does not exist in CI → SSL init
      # fails before Hibernate can connect → "Unable to determine Dialect" error.
      # On EC2 behind ALB, user_data.sh always writes USE_HTTPS=false anyway.
      USE_HTTPS:               "false"
      COOKIE_SECURE:           "true"

    # ─────────────────────────────────────────────────────────
    #  MySQL service container
    #  Mirrors docker-compose.yml db service exactly:
    #    image: mysql:8.0
    #    --default-authentication-plugin=caching_sha2_password
    #    MYSQL_DATABASE / MYSQL_USER / MYSQL_PASSWORD
    # ─────────────────────────────────────────────────────────
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword_ci
          MYSQL_DATABASE:      ticket_db
          MYSQL_USER:          ticket_user
          MYSQL_PASSWORD:      ticket_password_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -prootpassword_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:

      # ── 1. Checkout ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 (matches eclipse-temurin:17 in Dockerfile) ─
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"   # caches ~/.m2 — faster subsequent runs

      # ── 3. MySQL client ────────────────────────────────────
      - name: Install MySQL client
        run: sudo apt-get update -qq && sudo apt-get install -y -qq mysql-client

      # ── 4. Wait for MySQL ──────────────────────────────────
      # Spring Boot Hibernate DDL will fail on startup if MySQL
      # isn't ready when mvn test starts the ApplicationContext.
      - name: Wait for MySQL to be ready
        run: |
          echo "Waiting for MySQL..."
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -u root -prootpassword_ci --silent && \
              echo "MySQL ready after ${i}x2s" && break
            echo "  attempt $i/30..."
            sleep 2
          done

      # ── 5. Load DB schema ──────────────────────────────────
      # CI always starts with a fresh empty database, so schema.sql
      # is sufficient — it is the complete up-to-date schema and already
      # includes the organizer_profiles table and events.organizer_id column.
      #
      # organizer_migration.sql is for upgrading EXISTING production databases
      # that were created before organizer support was added. It is NOT run
      # here because schema.sql already contains everything and running both
      # would cause "Table already exists" errors.
      #
      # spring.jpa.hibernate.ddl-auto=update creates any remaining JPA tables.
      - name: Load database schema
        run: |
          mysql -h 127.0.0.1 -u root -prootpassword_ci ticket_db < db/schema.sql
          echo "Schema loaded"

      # ── 6. Maven build + test ──────────────────────────────
      # mvn verify: compile → test → package
      # -D flags override application.properties for CI environment.
      # All env vars above are passed in so Spring Boot can start
      # its ApplicationContext for @SpringBootTest tests.
      # Produces: target/ticket-booking-backend-1.0.0.jar
      - name: Build and test with Maven
        run: |
          mvn package -DskipTests \
            -B \
            -Dspring.datasource.url="jdbc:mysql://127.0.0.1:3306/ticket_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true" \
            -Dspring.datasource.username="${DB_USER}" \
            -Dspring.datasource.password="${DB_PASS}" \
            -Djwt.secret="${JWT_SECRET}" \
            -Dfrontend.url="${FRONTEND_URL}" \
            -Daws.region="${AWS_REGION}" \
            -Daws.s3.bucket="${S3_BUCKET_NAME}" \
            -Drazorpay.key-id="${RAZORPAY_KEY_ID}" \
            -Drazorpay.key-secret="${RAZORPAY_KEY_SECRET}" \
            -Dspring.mail.username="${EMAIL_USER}" \
            -Dspring.mail.password="${EMAIL_PASS}" \
            -Dserver.ssl.enabled=false \
            --no-transfer-progress

      # ── 7. Upload test report ──────────────────────────────
      - name: Upload Maven Surefire test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-test-results
          path: target/surefire-reports/
          retention-days: 7
          if-no-files-found: ignore

      # ═══════════════════════════════════════════════════════
      #  Steps 8–12 run on push to main only.
      #  PRs get test + build validation without touching AWS.
      # ═══════════════════════════════════════════════════════

      # ── 8. AWS credentials via OIDC (keyless) ─────────────
      # Role ARN constructed from env vars — matches iam.tf exactly:
      #   "${var.project_name}-GitHubActions-Deploy-Role"
      # No AWS_ROLE_TO_ASSUME secret needed, and no manual GitHub
      # variable/flag needed either — this step SELF-DETECTS whether
      # the bootstrap terraform apply has run yet.
      #
      # continue-on-error: true means if the OIDC role doesn't exist
      # yet (fresh environment, bootstrap not done), this step fails
      # quietly instead of aborting the job. The next step reads
      # steps.aws-creds.outcome and gates everything after it on
      # whether the role assumption actually succeeded.
      - name: Configure AWS credentials (OIDC — no secrets)
        id: aws-creds
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        continue-on-error: true
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: "arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/${{ env.PROJECT_NAME }}-GitHubActions-Deploy-Role"
          aws-region: ${{ env.AWS_REGION }}

      # ── 8b. Detect whether AWS auth actually worked ────────
      - name: Check AWS auth result
        id: aws-check
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          if [ "${{ steps.aws-creds.outcome }}" = "success" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            {
              echo "## ⏸️ AWS/ECR steps skipped — OIDC role not found yet"
              echo ""
              echo "Could not assume \`${PROJECT_NAME}-GitHubActions-Deploy-Role\`."
              echo "This is expected before the Terraform bootstrap apply has run."
              echo ""
              echo "**Next step:** run the bootstrap \`terraform apply -target=...\`"
              echo "(see terraform/ecr.tf comment header), then push again or"
              echo "re-run this workflow."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      # ── 9. Verify AWS identity ─────────────────────────────
      - name: Verify AWS identity
        if: steps.aws-check.outputs.configured == 'true'
        run: aws sts get-caller-identity

      # ── 10. Ensure ECR repository exists ───────────────────
      # ECR repo is now managed by Terraform (terraform/ecr.tf) and
      # created in the bootstrap -target apply — see README. This step
      # is now just a defensive fallback in case the workflow ever runs
      # against an environment where the bootstrap apply hasn't
      # happened yet, or the repo was deleted out-of-band.
      # Repository name: ticketapp-backend (matches ECR_REPOSITORY env var)
      - name: Ensure ECR repository exists
        if: steps.aws-check.outputs.configured == 'true'
        run: |
          aws ecr describe-repositories \
            --repository-names "$ECR_REPOSITORY" \
            --region "$AWS_REGION" \
          || aws ecr create-repository \
            --repository-name "$ECR_REPOSITORY" \
            --image-scanning-configuration scanOnPush=true \
            --region "$AWS_REGION"
          echo "ECR repository: $ECR_REPOSITORY"

      # ── 11. Login to Amazon ECR ────────────────────────────
      - name: Login to Amazon ECR
        if: steps.aws-check.outputs.configured == 'true'
        uses: aws-actions/amazon-ecr-login@v2

      # ── 12. Build Docker image and push to ECR ─────────────
      # Dockerfile (two-stage):
      #   Stage 1: maven:3.9.6-eclipse-temurin-17
      #     → mvn package -DskipTests
      #     → target/ticket-booking-backend-1.0.0.jar
      #   Stage 2: eclipse-temurin:17-jre-alpine
      #     → COPY app.jar → java -XX:+UseContainerSupport -jar app.jar
      #
      # Tagged with both :latest (for user_data.sh on new instances)
      # and :<git-sha> (for SSM deploy command — pinned, safe to rollback).
      #
      # NOTE: Dockerfile has EXPOSE 3000 but server.port=8080.
      # This is cosmetic — Spring Boot binds to 8080 correctly.
      # Consider updating EXPOSE 8080 in your Dockerfile for clarity.
      - name: Build and push Docker image to ECR
        if: steps.aws-check.outputs.configured == 'true'
        run: |
          IMAGE_BASE="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}"
          IMAGE_LATEST="${IMAGE_BASE}:latest"
          IMAGE_SHA="${IMAGE_BASE}:${{ github.sha }}"

          echo "Building image..."
          docker build \
            -f Dockerfile \
            -t "$IMAGE_LATEST" \
            -t "$IMAGE_SHA" \
            .

          echo "Pushing :latest..."
          docker push "$IMAGE_LATEST"

          echo "Pushing :${{ github.sha }}..."
          docker push "$IMAGE_SHA"

          # Export for use in subsequent steps
          echo "IMAGE_SHA_URI=${IMAGE_SHA}" >> "$GITHUB_ENV"
          echo "IMAGE_LATEST_URI=${IMAGE_LATEST}" >> "$GITHUB_ENV"

          echo "✅ Pushed: $IMAGE_LATEST"
          echo "✅ Pushed: $IMAGE_SHA"

  # ═══════════════════════════════════════════════════════════
  #  check-infra
  #
  #  Runs after build succeeds. Checks whether the ASG has any
  #  running EC2 instances yet. This is the "ensure ordering"
  #  gate — it decides, visibly, whether the deploy job below
  #  runs or is skipped.
  #
  #  On a fresh bootstrap (repo + OIDC created, but full
  #  `terraform apply` not run yet): this job finds no instances,
  #  writes a job summary explaining that, and sets ready=false.
  #  The deploy job then shows as "Skipped" in the Actions UI —
  #  not a red X, not a buried log line, just an unmistakable
  #  status right on the PR/commit checks list.
  # ═══════════════════════════════════════════════════════════
  check-infra:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    outputs:
      ready: ${{ steps.check.outputs.ready }}

    steps:
      - name: Configure AWS credentials (OIDC — no secrets)
        id: aws-creds
        continue-on-error: true
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: "arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/${{ env.PROJECT_NAME }}-GitHubActions-Deploy-Role"
          aws-region: ${{ env.AWS_REGION }}

      - name: Check whether ASG/EC2 instances exist yet
        id: check
        run: |
          if [ "${{ steps.aws-creds.outcome }}" != "success" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            {
              echo "## ⏸️ Deploy skipped — OIDC role not found yet"
              echo ""
              echo "Could not assume \`${PROJECT_NAME}-GitHubActions-Deploy-Role\` — the bootstrap"
              echo "terraform apply hasn't run yet, so the build job's ECR push was skipped too."
              echo ""
              echo "**Next step:** run the bootstrap \`terraform apply -target=...\` (see"
              echo "terraform/ecr.tf), then push again or re-run this workflow."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          INSTANCE_IDS=$(aws ec2 describe-instances \
            --region "$AWS_REGION" \
            --filters \
              "Name=tag:Name,Values=${PROJECT_NAME}-backend" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[*].Instances[*].InstanceId" \
            --output text | tr '\t' ' ')

          if [ -z "$INSTANCE_IDS" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            {
              echo "## ⏸️ Deploy skipped — infrastructure not created yet"
              echo ""
              echo "The image built in the **build** job above was pushed to ECR successfully."
              echo "No running EC2 instances were found tagged \`Name=${PROJECT_NAME}-backend\`,"
              echo "so the **deploy** job will be skipped — expected on a fresh bootstrap."
              echo ""
              echo "**Next step:** run \`terraform apply\` (full, no \`-target\`) locally to create"
              echo "the VPC/RDS/ALB/ASG. The first EC2 instance will pull the image that's"
              echo "already sitting in ECR on its very first boot — no second CI/CD run needed."
              echo ""
              echo "If you expected running instances here (this is NOT a fresh bootstrap),"
              echo "check that \`terraform apply\` has completed and the ASG has a healthy"
              echo "instance before investigating further."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
            {
              echo "## ✅ Infrastructure ready — proceeding to deploy"
              echo "Found running instance(s): \`$INSTANCE_IDS\`"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  # ═══════════════════════════════════════════════════════════
  #  deploy
  #
  #  Only runs if check-infra found running EC2 instances.
  #  Separate job = separate runner, so AWS credentials are
  #  configured fresh here (OIDC role assumption is per-job).
  # ═══════════════════════════════════════════════════════════
  deploy:
    needs: [build, check-infra]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.check-infra.outputs.ready == 'true'
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials (OIDC — no secrets)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: "arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/${{ env.PROJECT_NAME }}-GitHubActions-Deploy-Role"
          aws-region: ${{ env.AWS_REGION }}

      # ── 13. Deploy to EC2 via SSM ──────────────────────────
      # Strategy: write the full deploy script to a temp file on the
      # GitHub Actions runner, base64-encode it, then send ONE SSM
      # command that decodes and executes it via `bash -s`.
      #
      # This permanently avoids ALL multi-level quoting issues:
      #   • No jq array elements split across lines (which broke loops)
      #   • No shell arithmetic $((…)) or subshell (…) inside jq strings
      #   • No YAML→bash→jq→JSON→SSM→bash quoting chains to debug
      #
      # The deploy script is written as plain bash here — readable,
      # testable, and correct. It is base64-encoded so it survives
      # SSM's JSON wire format without any escaping.
      - name: Deploy to EC2 instances via SSM
        run: |
          # ── Find all running ASG instances by Name tag ─────────────────────
          INSTANCE_IDS=$(aws ec2 describe-instances \
            --region "$AWS_REGION" \
            --filters \
              "Name=tag:Name,Values=${PROJECT_NAME}-backend" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[*].Instances[*].InstanceId" \
            --output text | tr '\t' ' ')

          if [ -z "$INSTANCE_IDS" ]; then
            echo "No running EC2 instances found with Name=${PROJECT_NAME}-backend."
            echo ""
            echo "This is expected if you're on the bootstrap flow: the image above"
            echo "was pushed to ECR successfully — that's all this phase needs to do."
            echo "Run 'terraform apply' (full, no -target) to create the VPC/RDS/ALB/ASG,"
            echo "and the first EC2 instance will pull this image on its first boot."
            echo ""
            echo "If you expected a running instance here (i.e. this is NOT the first"
            echo "bootstrap run), check that terraform apply has completed and the ASG"
            echo "has a healthy instance before investigating further."
            exit 0
          fi

          echo "Deploying to instances: $INSTANCE_IDS"

          # ── Fetch all secrets from SSM Parameter Store ─────────────────────
          fetch_ssm() {
            aws ssm get-parameter \
              --region "$AWS_REGION" \
              --name "$1" \
              --with-decryption \
              --query Parameter.Value \
              --output text
          }

          SSM_DB_HOST=$(fetch_ssm /ticketapp/DB_HOST)
          SSM_DB_NAME=$(fetch_ssm /ticketapp/DB_NAME)
          SSM_DB_USER=$(fetch_ssm /ticketapp/DB_USER)
          SSM_DB_PASS=$(fetch_ssm /ticketapp/DB_PASS)
          SSM_JWT=$(fetch_ssm /ticketapp/JWT_SECRET)
          SSM_RZ_ID=$(fetch_ssm /ticketapp/RAZORPAY_KEY_ID)
          SSM_RZ_SEC=$(fetch_ssm /ticketapp/RAZORPAY_KEY_SECRET)
          SSM_EMAIL_U=$(fetch_ssm /ticketapp/EMAIL_USER)
          SSM_EMAIL_P=$(fetch_ssm /ticketapp/EMAIL_PASS)
          SSM_S3=$(fetch_ssm /ticketapp/S3_BUCKET_NAME)
          SSM_ALB=$(fetch_ssm /ticketapp/ALB_DNS)

          # Export for the "Verify deployment via ALB health endpoint" step
          # later in this same job — avoids needing a GitHub Variable for
          # ALB_DNS, since it's already available here from SSM.
          echo "ALB_DNS=${SSM_ALB}" >> "$GITHUB_ENV"

          echo "SSM secrets fetched OK"

          # ── Write the deploy script to a temp file ─────────────────────────
          # This is plain bash — no escaping layers, no jq string juggling.
          # Values with special characters are safe because they are written
          # into the script file as single-quoted printf arguments before
          # base64 encoding.
          DEPLOY_SCRIPT=$(mktemp /tmp/deploy_XXXXXX.sh)

          cat > "$DEPLOY_SCRIPT" << 'SCRIPT_EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          REGION="__REGION__"
          ACCOUNT="__ACCOUNT__"
          IMAGE_URI="__IMAGE_URI__"
          CONTAINER="__CONTAINER__"
          APP_DIR="__APP_DIR__"

          echo "== ECR Login =="
          aws ecr get-login-password --region "$REGION" \
            | docker login --username AWS --password-stdin \
                "${ACCOUNT}.dkr.ecr.${REGION}.amazonaws.com"

          echo "== Pull new image =="
          docker pull "$IMAGE_URI"

          echo "== Stop old container =="
          docker rm -f "$CONTAINER" || true

          echo "== Rewriting .env from SSM values =="
          mkdir -p "${APP_DIR}/logs"
          ENV_FILE="${APP_DIR}/.env"

          printf 'SERVER_PORT=8080\n'                                    > "$ENV_FILE"
          printf 'SERVER_HTTP_PORT=8080\n'                               >> "$ENV_FILE"
          printf 'USE_HTTPS=false\n'                                     >> "$ENV_FILE"
          printf 'COOKIE_SECURE=true\n'                                  >> "$ENV_FILE"
          printf 'FRONTEND_URL=https://__ALB_DNS__\n'                    >> "$ENV_FILE"
          printf 'DB_HOST=__DB_HOST__\n'                                 >> "$ENV_FILE"
          printf 'DB_PORT=3306\n'                                        >> "$ENV_FILE"
          printf 'DB_NAME=__DB_NAME__\n'                                 >> "$ENV_FILE"
          printf 'DB_USER=__DB_USER__\n'                                 >> "$ENV_FILE"
          printf 'DB_PASS=__DB_PASS__\n'                                 >> "$ENV_FILE"
          printf 'JWT_SECRET=__JWT__\n'                                  >> "$ENV_FILE"
          printf 'EMAIL_USER=__EMAIL_U__\n'                              >> "$ENV_FILE"
          printf 'EMAIL_PASS=__EMAIL_P__\n'                              >> "$ENV_FILE"
          printf 'AWS_REGION=__REGION__\n'                               >> "$ENV_FILE"
          printf 'S3_BUCKET_NAME=__S3_BUCKET__\n'                       >> "$ENV_FILE"
          printf 'AWS_ACCESS_KEY_ID=\n'                                  >> "$ENV_FILE"
          printf 'AWS_SECRET_ACCESS_KEY=\n'                              >> "$ENV_FILE"
          printf 'RAZORPAY_KEY_ID=__RZ_ID__\n'                          >> "$ENV_FILE"
          printf 'RAZORPAY_KEY_SECRET=__RZ_SEC__\n'                     >> "$ENV_FILE"
          printf 'SSL_KEYSTORE_TYPE=PKCS12\n'                            >> "$ENV_FILE"
          printf 'SSL_KEYSTORE_PATH=classpath:certs/keystore.p12\n'     >> "$ENV_FILE"
          printf 'SSL_KEYSTORE_PASSWORD=changeit\n'                      >> "$ENV_FILE"
          printf 'SSL_KEY_ALIAS=1\n'                                     >> "$ENV_FILE"
          chmod 600 "$ENV_FILE"
          echo ".env rewritten OK"

          echo "== Start new container =="
          docker run -d \
            --name "$CONTAINER" \
            --restart always \
            --env-file "$ENV_FILE" \
            -p 8080:8080 \
            -v "${APP_DIR}/logs:/app/logs" \
            --memory=900m \
            --memory-swap=900m \
            "$IMAGE_URI"

          echo "== Wait for /health =="
          MAX=120
          WAITED=0
          until curl -sf http://localhost:8080/health > /dev/null 2>&1; do
            if [ "$WAITED" -ge "$MAX" ]; then
              echo "health check timed out after ${MAX}s"
              docker logs "$CONTAINER" --tail 40
              exit 1
            fi
            sleep 5
            WAITED=$((WAITED + 5))
            echo "  waited ${WAITED}s..."
          done
          echo "Spring Boot is healthy"
          docker logs "$CONTAINER" --tail 10
          SCRIPT_EOF

          # ── Substitute all placeholder values ──────────────────────────────
          # sed is safe here: values go through base64 after substitution,
          # so no shell expansion happens on EC2.
          sed -i "s|__REGION__|${AWS_REGION}|g"       "$DEPLOY_SCRIPT"
          sed -i "s|__ACCOUNT__|${AWS_ACCOUNT_ID}|g"  "$DEPLOY_SCRIPT"
          sed -i "s|__IMAGE_URI__|${IMAGE_SHA_URI}|g"  "$DEPLOY_SCRIPT"
          sed -i "s|__CONTAINER__|${CONTAINER_NAME}|g" "$DEPLOY_SCRIPT"
          sed -i "s|__APP_DIR__|${APP_DIR}|g"          "$DEPLOY_SCRIPT"
          sed -i "s|__ALB_DNS__|${SSM_ALB}|g"         "$DEPLOY_SCRIPT"
          sed -i "s|__DB_HOST__|${SSM_DB_HOST}|g"     "$DEPLOY_SCRIPT"
          sed -i "s|__DB_NAME__|${SSM_DB_NAME}|g"     "$DEPLOY_SCRIPT"
          sed -i "s|__DB_USER__|${SSM_DB_USER}|g"     "$DEPLOY_SCRIPT"
          sed -i "s|__DB_PASS__|${SSM_DB_PASS}|g"     "$DEPLOY_SCRIPT"
          sed -i "s|__JWT__|${SSM_JWT}|g"             "$DEPLOY_SCRIPT"
          sed -i "s|__EMAIL_U__|${SSM_EMAIL_U}|g"     "$DEPLOY_SCRIPT"
          sed -i "s|__EMAIL_P__|${SSM_EMAIL_P}|g"     "$DEPLOY_SCRIPT"
          sed -i "s|__S3_BUCKET__|${SSM_S3}|g"        "$DEPLOY_SCRIPT"
          sed -i "s|__RZ_ID__|${SSM_RZ_ID}|g"         "$DEPLOY_SCRIPT"
          sed -i "s|__RZ_SEC__|${SSM_RZ_SEC}|g"       "$DEPLOY_SCRIPT"

          # ── Base64-encode and build SSM JSON ───────────────────────────────
          # The entire script is one base64 string → one SSM commands element.
          # bash -s <<< <(base64 -d) runs it as a complete script on EC2,
          # so loops, if-blocks, and arithmetic work exactly as written.
          SCRIPT_B64=$(base64 -w 0 "$DEPLOY_SCRIPT")

          jq -n --arg script "$SCRIPT_B64" \
            '{ commands: [ ("echo " + $script + " | base64 -d | bash -s") ] }' \
            > /tmp/ssm-params.json

          echo "SSM params JSON built OK"

          # ── Send SSM command ────────────────────────────────────────────────
          COMMAND_ID=$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids $INSTANCE_IDS \
            --document-name "AWS-RunShellScript" \
            --parameters file:///tmp/ssm-params.json \
            --comment "Deploy ${{ github.sha }}" \
            --timeout-seconds 300 \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # ── Poll each instance until the command completes (300s ceiling) ───
          for INSTANCE_ID in $INSTANCE_IDS; do
            echo "Waiting for SSM command on $INSTANCE_ID (up to 300s)..."
            ELAPSED=0
            STATUS="InProgress"
            while [ "$ELAPSED" -lt 300 ]; do
              STATUS=$(aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --region "$AWS_REGION" \
                --query "Status" --output text 2>/dev/null || echo "Pending")
              case "$STATUS" in
                Success|Failed|Cancelled|TimedOut|Undeliverable|Terminated)
                  break ;;
                *)
                  echo "  status: $STATUS - waited ${ELAPSED}s..."
                  sleep 10
                  ELAPSED=$((ELAPSED + 10)) ;;
              esac
            done

            echo "--- SSM output for $INSTANCE_ID ---"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --region "$AWS_REGION" \
              --query "[StandardOutputContent, StandardErrorContent]" \
              --output text

            if [ "$STATUS" != "Success" ]; then
              echo "Deploy failed on $INSTANCE_ID (status: $STATUS)"
              exit 1
            fi
            echo "Deploy succeeded on $INSTANCE_ID"
          done
      # ── 14. Final health check via ALB ─────────────────────
      # Hits the ALB HTTPS endpoint (self-signed cert → -k flag).
      # ALB_DNS comes from $GITHUB_ENV, set by the deploy step above
      # (it already fetches this from SSM Parameter Store — no GitHub
      # Variable or Secret needed here at all).
      # GET /health → HealthController.java → {"status":"ok"} → 200
      - name: Verify deployment via ALB health endpoint
        run: |
          if [ -z "${ALB_DNS:-}" ]; then
            echo "⚠️  ALB_DNS not available — the deploy step above didn't run"
            echo "   (or didn't reach the SSM fetch), so there's nothing to check yet."
            exit 0
          fi

          ALB_URL="https://${ALB_DNS}/health"
          echo "Checking ALB health at: $ALB_URL"

          for i in {1..12}; do
            STATUS=$(curl -sk -o /dev/null -w "%{http_code}" "$ALB_URL") || true
            if [ "$STATUS" = "200" ]; then
              echo "✅ ALB health check passed (HTTP $STATUS) after ${i}x5s"
              exit 0
            fi
            echo "  attempt $i/12 — HTTP $STATUS, retrying in 5s..."
            sleep 5
          done

          echo "❌ ALB health check failed after 60s"
          echo "   Check CloudWatch: /ticketapp/backend and /ticketapp/errors"
          exit 1
