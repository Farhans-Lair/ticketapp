name: CI - Test, Build, Push & Deploy Spring Boot Backend

# ─────────────────────────────────────────────────────────────
#  push to main  → full pipeline: test → build → ECR push → SSM deploy
#  pull_request  → test + build only (no push, no deploy)
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      id-token: write   # required for GitHub OIDC token → AWS role assumption
      contents: read

    # ─────────────────────────────────────────────────────────
    #  All AWS config and project identifiers are hardcoded here
    #  from terraform.tfvars values. No GitHub Secrets needed.
    #
    #  The GitHub Actions IAM role ARN is constructed at runtime
    #  from aws_account_id + project_name — matching exactly what
    #  iam.tf creates:
    #    "${var.project_name}-GitHubActions-Deploy-Role"
    #
    #  ECR repository name matches ecr.tf / outputs.tf:
    #    "${var.project_name}-backend"  →  "ticketapp-backend"
    #
    #  ASG name matches launch_template.tf:
    #    "${var.project_name}-backend-asg"  →  "ticketapp-backend-asg"
    # ─────────────────────────────────────────────────────────
    env:
      # ── From terraform.tfvars ── update these if you change tfvars ──
      AWS_ACCOUNT_ID:  "453551850734"         # aws_account_id in terraform.tfvars
      AWS_REGION:      "ap-south-1"           # aws_region in terraform.tfvars
      PROJECT_NAME:    "ticketapp"            # project_name in terraform.tfvars
      GITHUB_ORG:      "Farhans-Lair"      # github_org in terraform.tfvars
      GITHUB_REPO:     "ticketapp"            # github_repo in terraform.tfvars

      # ── Derived values (do not change — matches iam.tf / launch_template.tf) ──
      ECR_REPOSITORY:  "ticketapp-backend"            # ${project_name}-backend
      ASG_NAME:        "ticketapp-backend-asg"         # ${project_name}-backend-asg
      CONTAINER_NAME:  "ticketapp-backend"             # docker --name in user_data.sh
      APP_DIR:         "/home/ec2-user/ticketapp-backend"  # APP_DIR in user_data.sh

      # ── Database credentials ──────────────────────────────────────────────
      # CI build (mvn package) uses 127.0.0.1 via -Dspring.datasource.url override
      # and CI MySQL service — the env-block DB_HOST/DB_PASS below are only used
      # by the SSM deploy step to write the real .env on EC2.
      #
      # DB_HOST: paste the RDS endpoint from: terraform output rds_endpoint
      #   Format: ticketapp-mysql-db.xxxxxxxxx.ap-south-1.rds.amazonaws.com
      #   (no port — port is always 3306, written separately)
      # DB_PASS: your real RDS master password from terraform.tfvars db_password
      #
      # These are hardcoded here the same way AWS_ACCOUNT_ID is hardcoded —
      # they live in terraform.tfvars which is already on your local machine
      # and never committed to git (.gitignore excludes terraform.tfvars).
      # The workflow file itself should also be in .gitignore if it contains
      # sensitive values, or use a private repository.
      DB_HOST: "ticketapp-mysql-db.REPLACE_WITH_RDS_ENDPOINT.ap-south-1.rds.amazonaws.com"
      DB_PORT: "3306"
      DB_NAME: "ticket_db"                    # matches db_name in terraform.tfvars
      DB_USER: "ticket_user"                  # matches db_username in terraform.tfvars
      DB_PASS: "Pat#3r*$57f"                  # matches db_password in terraform.tfvars

      # ── Stub values so Spring Boot ApplicationContext starts in CI ──
      # Without these, @Value injections fail and mvn test cannot run.
      JWT_SECRET:          ${{ secrets.JWT_SECRET }} 
      RAZORPAY_KEY_ID:     ${{ secrets.RAZORPAY_KEY_ID }}
      RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
      EMAIL_USER:          ${{ secrets.EMAIL_USER }}
      EMAIL_PASS:          ${{ secrets.EMAIL_PASS }}
      S3_BUCKET_NAME:      "ticketapp-ticket-pdfs-prod"
      FRONTEND_URL:            "http://localhost:8080"
      # USE_HTTPS must be false in CI — there is no keystore.p12 in the CI container.
      # When USE_HTTPS=true, Spring Boot tries to load server.ssl.key-store
      # (classpath:certs/keystore.p12) which does not exist in CI → SSL init
      # fails before Hibernate can connect → "Unable to determine Dialect" error.
      # On EC2 behind ALB, user_data.sh always writes USE_HTTPS=false anyway.
      USE_HTTPS:               "false"
      COOKIE_SECURE:           "true"

    # ─────────────────────────────────────────────────────────
    #  MySQL service container
    #  Mirrors docker-compose.yml db service exactly:
    #    image: mysql:8.0
    #    --default-authentication-plugin=caching_sha2_password
    #    MYSQL_DATABASE / MYSQL_USER / MYSQL_PASSWORD
    # ─────────────────────────────────────────────────────────
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword_ci
          MYSQL_DATABASE:      ticket_db
          MYSQL_USER:          ticket_user
          MYSQL_PASSWORD:      ticket_password_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -prootpassword_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:

      # ── 1. Checkout ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 (matches eclipse-temurin:17 in Dockerfile) ─
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"   # caches ~/.m2 — faster subsequent runs

      # ── 3. MySQL client ────────────────────────────────────
      - name: Install MySQL client
        run: sudo apt-get update -qq && sudo apt-get install -y -qq mysql-client

      # ── 4. Wait for MySQL ──────────────────────────────────
      # Spring Boot Hibernate DDL will fail on startup if MySQL
      # isn't ready when mvn test starts the ApplicationContext.
      - name: Wait for MySQL to be ready
        run: |
          echo "Waiting for MySQL..."
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -u root -prootpassword_ci --silent && \
              echo "MySQL ready after ${i}x2s" && break
            echo "  attempt $i/30..."
            sleep 2
          done

      # ── 5. Load DB schema ──────────────────────────────────
      # CI always starts with a fresh empty database, so schema.sql
      # is sufficient — it is the complete up-to-date schema and already
      # includes the organizer_profiles table and events.organizer_id column.
      #
      # organizer_migration.sql is for upgrading EXISTING production databases
      # that were created before organizer support was added. It is NOT run
      # here because schema.sql already contains everything and running both
      # would cause "Table already exists" errors.
      #
      # spring.jpa.hibernate.ddl-auto=update creates any remaining JPA tables.
      - name: Load database schema
        run: |
          mysql -h 127.0.0.1 -u root -prootpassword_ci ticket_db < db/schema.sql
          echo "Schema loaded"

      # ── 6. Maven build + test ──────────────────────────────
      # mvn verify: compile → test → package
      # -D flags override application.properties for CI environment.
      # All env vars above are passed in so Spring Boot can start
      # its ApplicationContext for @SpringBootTest tests.
      # Produces: target/ticket-booking-backend-1.0.0.jar
      - name: Build and test with Maven
        run: |
          mvn package -DskipTests \
            -B \
            -Dspring.datasource.url="jdbc:mysql://127.0.0.1:3306/ticket_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true" \
            -Dspring.datasource.username="${DB_USER}" \
            -Dspring.datasource.password="${DB_PASS}" \
            -Djwt.secret="${JWT_SECRET}" \
            -Dfrontend.url="${FRONTEND_URL}" \
            -Daws.region="${AWS_REGION}" \
            -Daws.s3.bucket="${S3_BUCKET_NAME}" \
            -Drazorpay.key-id="${RAZORPAY_KEY_ID}" \
            -Drazorpay.key-secret="${RAZORPAY_KEY_SECRET}" \
            -Dspring.mail.username="${EMAIL_USER}" \
            -Dspring.mail.password="${EMAIL_PASS}" \
            -Dserver.ssl.enabled=false \
            --no-transfer-progress

      # ── 7. Upload test report ──────────────────────────────
      - name: Upload Maven Surefire test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-test-results
          path: target/surefire-reports/
          retention-days: 7
          if-no-files-found: ignore

      # ═══════════════════════════════════════════════════════
      #  Steps 8–12 run on push to main only.
      #  PRs get test + build validation without touching AWS.
      # ═══════════════════════════════════════════════════════

      # ── 8. AWS credentials via OIDC (keyless) ─────────────
      # Role ARN constructed from env vars — matches iam.tf exactly:
      #   "${var.project_name}-GitHubActions-Deploy-Role"
      # No AWS_ROLE_TO_ASSUME secret needed.
      - name: Configure AWS credentials (OIDC — no secrets)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: "arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/${{ env.PROJECT_NAME }}-GitHubActions-Deploy-Role"
          aws-region: ${{ env.AWS_REGION }}

      # ── 9. Verify AWS identity ─────────────────────────────
      - name: Verify AWS identity
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: aws sts get-caller-identity

      # ── 10. Ensure ECR repository exists ───────────────────
      # ECR repo is typically created by Terraform (ecr.tf is removed
      # per requirements) so this step creates it if missing — e.g.
      # on first run before terraform apply, or after a destroy.
      # Repository name: ticketapp-backend (matches ECR_REPOSITORY env var)
      - name: Ensure ECR repository exists
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          aws ecr describe-repositories \
            --repository-names "$ECR_REPOSITORY" \
            --region "$AWS_REGION" \
          || aws ecr create-repository \
            --repository-name "$ECR_REPOSITORY" \
            --image-scanning-configuration scanOnPush=true \
            --region "$AWS_REGION"
          echo "ECR repository: $ECR_REPOSITORY"

      # ── 11. Login to Amazon ECR ────────────────────────────
      - name: Login to Amazon ECR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: aws-actions/amazon-ecr-login@v2

      # ── 12. Build Docker image and push to ECR ─────────────
      # Dockerfile (two-stage):
      #   Stage 1: maven:3.9.6-eclipse-temurin-17
      #     → mvn package -DskipTests
      #     → target/ticket-booking-backend-1.0.0.jar
      #   Stage 2: eclipse-temurin:17-jre-alpine
      #     → COPY app.jar → java -XX:+UseContainerSupport -jar app.jar
      #
      # Tagged with both :latest (for user_data.sh on new instances)
      # and :<git-sha> (for SSM deploy command — pinned, safe to rollback).
      #
      # NOTE: Dockerfile has EXPOSE 3000 but server.port=8080.
      # This is cosmetic — Spring Boot binds to 8080 correctly.
      # Consider updating EXPOSE 8080 in your Dockerfile for clarity.
      - name: Build and push Docker image to ECR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          IMAGE_BASE="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}"
          IMAGE_LATEST="${IMAGE_BASE}:latest"
          IMAGE_SHA="${IMAGE_BASE}:${{ github.sha }}"

          echo "Building image..."
          docker build \
            -f Dockerfile \
            -t "$IMAGE_LATEST" \
            -t "$IMAGE_SHA" \
            .

          echo "Pushing :latest..."
          docker push "$IMAGE_LATEST"

          echo "Pushing :${{ github.sha }}..."
          docker push "$IMAGE_SHA"

          # Export for use in subsequent steps
          echo "IMAGE_SHA_URI=${IMAGE_SHA}" >> "$GITHUB_ENV"
          echo "IMAGE_LATEST_URI=${IMAGE_LATEST}" >> "$GITHUB_ENV"

          echo "✅ Pushed: $IMAGE_LATEST"
          echo "✅ Pushed: $IMAGE_SHA"

      # ── 13. Deploy to EC2 via SSM ──────────────────────────
      # Finds all running EC2 instances in the ASG by Name tag,
      # then sends a deploy shell command via SSM (no SSH needed).
      #
      # The command:
      #   1. ECR login on the EC2 instance
      #   2. docker pull the new SHA-tagged image
      #   3. docker rm old container
      #   4. docker run the new container from the pinned SHA image
      #   5. Health-check loop until /health returns 200
      #
      # EC2 IAM role (iam.tf: AmazonEC2ContainerRegistryReadOnly +
      # AmazonSSMManagedInstanceCore) authorises steps 1 and 2.
      - name: Deploy to EC2 instances via SSM
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          # ── Find all running ASG instances by Name tag ─────────────────────
          INSTANCE_IDS=$(aws ec2 describe-instances \
            --region "$AWS_REGION" \
            --filters \
              "Name=tag:Name,Values=${PROJECT_NAME}-backend" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[*].Instances[*].InstanceId" \
            --output text | tr '\t' ' ')

          if [ -z "$INSTANCE_IDS" ]; then
            echo "No running EC2 instances found with Name=${PROJECT_NAME}-backend"
            echo "Has terraform apply completed and the ASG launched an instance?"
            exit 1
          fi

          echo "Deploying to instances: $INSTANCE_IDS"

          # ── Build SSM parameters JSON using jq ─────────────────────────────
          #
          # WHY jq and not a heredoc:
          #
          #   Fix 1 — Indented heredoc produces invalid JSON:
          #     A `cat << SSMEOF` inside a YAML `run:` block is indented to
          #     match YAML structure. Bash keeps every leading space as content,
          #     so each JSON line arrives with 10+ leading spaces and AWS CLI
          #     rejects it: "Invalid JSON received."
          #
          #   Fix 2 — Unescaped double-quotes break JSON strings:
          #     Shell variables expanded inside a heredoc are NOT JSON-escaped.
          #     The health-wait line had:  echo "  waited ${WAITED}s..."
          #     The inner " characters landed verbatim inside the JSON string
          #     value, corrupting the JSON structure.
          #
          #   jq --arg passes each value through proper JSON string encoding
          #   automatically — no quoting issues, no leading-space issues,
          #   no extra files or scripts needed. jq is pre-installed on every
          #   GitHub Actions ubuntu-latest runner.
          #
          # Note: single-quoted strings inside the command values are safe
          # because jq encodes them correctly in the output JSON.
          # Pass all runtime values as --arg so jq JSON-encodes them safely.
          # The SSM command rewrites the .env on EC2 before starting the
          # container — this self-heals any stale .env from user_data.sh.
          # Values come from the workflow env block above (hardcoded from tfvars).
          jq -n \
            --arg region    "$AWS_REGION" \
            --arg account   "$AWS_ACCOUNT_ID" \
            --arg image_uri "$IMAGE_SHA_URI" \
            --arg container "$CONTAINER_NAME" \
            --arg app_dir   "$APP_DIR" \
            --arg db_host   "$DB_HOST" \
            --arg db_port   "$DB_PORT" \
            --arg db_name   "$DB_NAME" \
            --arg db_user   "$DB_USER" \
            --arg db_pass   "$DB_PASS" \
            --arg jwt       "$JWT_SECRET" \
            --arg rz_id     "$RAZORPAY_KEY_ID" \
            --arg rz_sec    "$RAZORPAY_KEY_SECRET" \
            --arg email_u   "$EMAIL_USER" \
            --arg email_p   "$EMAIL_PASS" \
            --arg s3_bucket "$S3_BUCKET_NAME" \
            '{
              commands: [
                "set -e",
                "echo == ECR Login ==",
                ("aws ecr get-login-password --region " + $region + " | docker login --username AWS --password-stdin " + $account + ".dkr.ecr." + $region + ".amazonaws.com"),
                "echo == Pull new image ==",
                ("docker pull " + $image_uri),
                "echo == Stop old container ==",
                ("docker rm -f " + $container + " || true"),
                "echo == Rewriting .env with correct prod values ==",
                ("mkdir -p " + $app_dir + "/logs"),
                ("{ printf \'SERVER_PORT=8080\\n\'; printf \'SERVER_HTTP_PORT=8080\\n\'; printf \'USE_HTTPS=false\\n\'; printf \'COOKIE_SECURE=true\\n\'; printf \'DB_HOST=%s\\n\' \"" + $db_host + "\"; printf \'DB_PORT=%s\\n\' \"" + $db_port + "\"; printf \'DB_NAME=%s\\n\' \"" + $db_name + "\"; printf \'DB_USER=%s\\n\' \"" + $db_user + "\"; printf \'DB_PASS=%s\\n\' \"" + $db_pass + "\"; printf \'JWT_SECRET=%s\\n\' \"" + $jwt + "\"; printf \'EMAIL_USER=%s\\n\' \"" + $email_u + "\"; printf \'EMAIL_PASS=%s\\n\' \"" + $email_p + "\"; printf \'AWS_REGION=%s\\n\' \"" + $region + "\"; printf \'S3_BUCKET_NAME=%s\\n\' \"" + $s3_bucket + "\"; printf \'AWS_ACCESS_KEY_ID=\\n\'; printf \'AWS_SECRET_ACCESS_KEY=\\n\'; printf \'RAZORPAY_KEY_ID=%s\\n\' \"" + $rz_id + "\"; printf \'RAZORPAY_KEY_SECRET=%s\\n\' \"" + $rz_sec + "\"; printf \'SSL_KEYSTORE_TYPE=PKCS12\\n\'; printf \'SSL_KEYSTORE_PATH=classpath:certs/keystore.p12\\n\'; printf \'SSL_KEYSTORE_PASSWORD=changeit\\n\'; printf \'SSL_KEY_ALIAS=1\\n\'; } > " + $app_dir + "/.env"),
                ("chmod 600 " + $app_dir + "/.env"),
                "echo .env rewritten OK",
                "echo == Start new container ==",
                ("docker run -d --name " + $container + " --restart always --env-file " + $app_dir + "/.env -p 8080:8080 -v " + $app_dir + "/logs:/app/logs --memory=900m --memory-swap=900m " + $image_uri),
                "echo == Wait for /health ==",
                "MAX=120; WAITED=0",
                ("until curl -sf http://localhost:8080/health > /dev/null 2>&1; do if [ $WAITED -ge $MAX ]; then echo health check timed out; docker logs " + $container + " --tail 40; exit 1; fi; sleep 5; WAITED=$((WAITED+5)); echo waited $WAITED s; done"),
                "echo Spring Boot is healthy",
                ("docker logs " + $container + " --tail 10")
              ]
            }' > /tmp/ssm-params.json

          echo "SSM params JSON built OK"

          # ── Send SSM command ────────────────────────────────────────────────
          # --parameters file:// passes the jq-built commands array.
          # --timeout-seconds 300 covers ECR pull + Spring Boot JVM cold-start
          # which takes ~90-120s; the old default of 60s was too short.
          COMMAND_ID=$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids $INSTANCE_IDS \
            --document-name "AWS-RunShellScript" \
            --parameters file:///tmp/ssm-params.json \
            --comment "Deploy ${{ github.sha }}" \
            --timeout-seconds 300 \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # ── Poll each instance until the command completes (300s ceiling) ───
          # Fix 3: `aws ssm wait command-executed` has a hard-coded 60s timeout
          # built into the waiter. Spring Boot cold-start (ECR pull + JVM init)
          # takes ~90-120s, so the old waiter always timed out and reported a
          # false failure even on a successful deploy. Replaced with a manual
          # poll loop using get-command-invocation with a 300s ceiling.
          for INSTANCE_ID in $INSTANCE_IDS; do
            echo "Waiting for SSM command on $INSTANCE_ID (up to 300s)..."
            ELAPSED=0
            STATUS="InProgress"
            while [ $ELAPSED -lt 300 ]; do
              STATUS=$(aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --region "$AWS_REGION" \
                --query "Status" --output text 2>/dev/null || echo "Pending")
              case "$STATUS" in
                Success|Failed|Cancelled|TimedOut|Undeliverable|Terminated)
                  break ;;
                *)
                  echo "  status: $STATUS - waited ${ELAPSED}s..."
                  sleep 10; ELAPSED=$((ELAPSED+10)) ;;
              esac
            done

            echo "--- SSM output for $INSTANCE_ID ---"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --region "$AWS_REGION" \
              --query "[StandardOutputContent, StandardErrorContent]" \
              --output text

            if [ "$STATUS" != "Success" ]; then
              echo "Deploy failed on $INSTANCE_ID (status: $STATUS)"
              exit 1
            fi
            echo "Deploy succeeded on $INSTANCE_ID"
          done
      # ── 14. Final health check via ALB ─────────────────────
      # Hits the ALB HTTPS endpoint (self-signed cert → -k flag).
      # ALB DNS is constructed from env vars — same value as
      # terraform output alb_dns_name. No secret needed.
      # GET /health → HealthController.java → {"status":"ok"} → 200
      - name: Verify deployment via ALB health endpoint
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          # Construct ALB DNS: <project>-alb-<hash>.<region>.elb.amazonaws.com
          # After first terraform apply, copy the exact DNS from:
          #   terraform output alb_dns_name
          # and paste it below, or set ALB_DNS as the only env var you keep.
          #
          # Example: ticketapp-alb-1234567890.ap-south-1.elb.amazonaws.com
          ALB_DNS="${{ vars.ALB_DNS }}"   # set as repo Variable (not Secret) in GitHub

          if [ -z "$ALB_DNS" ]; then
            echo "⚠️  ALB_DNS not set — skipping ALB health check."
            echo "   After first terraform apply, set it as a GitHub Actions Variable:"
            echo "   Settings → Secrets and variables → Variables → ALB_DNS"
            echo "   Value: \$(terraform output -raw alb_dns_name)"
            exit 0
          fi

          ALB_URL="https://${ALB_DNS}/health"
          echo "Checking ALB health at: $ALB_URL"

          for i in {1..12}; do
            STATUS=$(curl -sk -o /dev/null -w "%{http_code}" "$ALB_URL") || true
            if [ "$STATUS" = "200" ]; then
              echo "✅ ALB health check passed (HTTP $STATUS) after ${i}x5s"
              exit 0
            fi
            echo "  attempt $i/12 — HTTP $STATUS, retrying in 5s..."
            sleep 5
          done

          echo "❌ ALB health check failed after 60s"
          echo "   Check CloudWatch: /ticketapp/backend and /ticketapp/errors"
          exit 1
